<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="GZ기획팀" />
<meta name="theme-color" content="#185FA5" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>업무 트래커 — 팀장 뷰</title>
<style>
/* ── 리셋 & 변수 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fff;       --bg2: #f5f5f3;   --bg3: #eaeae8;
  --text: #1a1a1a;  --text2: #6b6b6b; --text3: #a8a8a8;
  --border:  rgba(0,0,0,.09);
  --border2: rgba(0,0,0,.16);
  --border3: rgba(0,0,0,.30);
  --radius: 12px;  --radius-sm: 8px;  --pill: 999px;
  --blue: #378ADD; --blue-bg: #E6F1FB; --blue-t: #0C447C;
  --amber-bg: #FAEEDA; --amber-t: #633806;
  --green-bg: #EAF3DE; --green-t: #27500A;
  --red: #a32d2d;  --red-bg: #FCEBEB; --red-t: #791F1F;
  --orange: #EF9F27;
  --purple-bg: #EEEDFE; --purple-t: #3C3489;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e;  --bg2: #2c2c2e;   --bg3: #111110;
    --text: #f2f2f7; --text2: #aeaeb2; --text3: #636366;
    --border:  rgba(255,255,255,.08);
    --border2: rgba(255,255,255,.15);
    --border3: rgba(255,255,255,.30);
  }
}

/* ── 레이아웃 ── */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
  background: var(--bg3); color: var(--text); min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── 탑바 ── */
.topbar {
  background: var(--bg); border-bottom: .5px solid var(--border);
  padding: .85rem 1.5rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.topbar h1    { font-size: 16px; font-weight: 600; }
.tb-badge     { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--pill); background: var(--blue-bg); color: var(--blue-t); }
.sync-dot     { width: 7px; height: 7px; border-radius: 50%; background: #639922; display: inline-block; }
.sync-dot.syncing { background: var(--orange); animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
.tb-right     { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.icon-btn     { padding: 6px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; border: .5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; }
.icon-btn:hover { border-color: var(--border3); color: var(--text); }

/* ── 팀원 탭 ── */


/* ── 콘텐츠 ── */
.content { padding: 1.5rem; max-width: 1100px; margin: 0 auto; width: 100%; }

/* ── 통계 카드 ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.2rem; }
.stat-card   { background: var(--bg); border-radius: var(--radius); padding: .85rem 1rem; border: .5px solid var(--border); }
.stat-label  { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.stat-value  { font-size: 24px; font-weight: 600; }
.stat-value.warn   { color: #b97a15; }
.stat-value.danger { color: var(--red); }

/* ── 필터 칩 ── */
.filter-row { display: flex; gap: 7px; margin-bottom: 1.1rem; flex-wrap: wrap; align-items: center; }
.chip       { padding: 5px 15px; border-radius: var(--pill); font-size: 13px; border: .5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; transition: all .15s; }
.chip:hover { border-color: var(--border3); color: var(--text); }
.chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.add-btn    { margin-left: auto; padding: 6px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; background: var(--text); color: var(--bg); border: none; cursor: pointer; }
.add-btn:hover { opacity: .78; }

/* ── 목록 + 상세 패널 ── */
.layout      { display: flex; gap: 1.25rem; align-items: flex-start; }
.main        { flex: 1; min-width: 0; }
.task-list   { display: flex; flex-direction: column; gap: 8px; }
.empty       { text-align: center; padding: 3rem 0; color: var(--text3); font-size: 14px; }

/* ── 업무 카드 ── */
.task-card {
  background: var(--bg); border: .5px solid var(--border);
  border-radius: var(--radius); padding: .95rem 1.1rem;
  display: flex; align-items: flex-start; gap: 11px;
  cursor: pointer; transition: border-color .15s; position: relative;
}
.task-card:hover    { border-color: var(--border2); }
.task-card.selected { border-color: var(--border3); background: var(--bg2); }
.task-card.pinned   { border-left: 3px solid var(--blue); }
.task-card.stale    { border-left: 3px solid var(--orange); }
.task-card.overdue  { border-left: 3px solid #E24B4A; }

.task-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.task-check:hover { border-color: var(--border3); }
.task-check.done  { background: var(--text); border-color: var(--text); }
.task-check.done::after { content: ''; width: 6px; height: 4px; border-left: 1.5px solid var(--bg); border-bottom: 1.5px solid var(--bg); transform: rotate(-45deg) translateY(-1px); }

.task-body  { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 500; margin-bottom: 5px; }
.task-title.done-text { text-decoration: line-through; color: var(--text3); }
.task-meta  { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.badge              { font-size: 11px; padding: 2px 8px; border-radius: var(--pill); font-weight: 500; }
.badge-todo         { background: var(--blue-bg);  color: var(--blue-t); }
.badge-inprogress   { background: var(--amber-bg); color: var(--amber-t); }
.badge-done         { background: var(--green-bg); color: var(--green-t); }
.badge-status       { cursor: pointer; user-select: none; }
.badge-status:hover { opacity: .75; }

.task-date     { font-size: 12px; color: var(--text3); }
.task-date.ov  { color: var(--red); font-weight: 500; }
.member-badge  { font-size: 12px; font-weight: 600; color: var(--text); }

.card-right   { position: absolute; top: 10px; right: 12px; display: flex; gap: 5px; align-items: center; }
.flag         { font-size: 11px; padding: 2px 8px; border-radius: var(--pill); font-weight: 500; }
.flag-pinned  { background: var(--blue-bg);  color: var(--blue-t); }
.flag-stale   { background: var(--amber-bg); color: var(--amber-t); }
.flag-overdue { background: var(--red-bg);   color: var(--red-t); }

.pin-btn, .del-btn { width: 24px; height: 24px; border-radius: var(--radius-sm); border: none; background: transparent; cursor: pointer; font-size: 14px; color: var(--text3); display: flex; align-items: center; justify-content: center; transition: all .15s; }
.pin-btn:hover { background: var(--bg2); color: var(--text); }
.pin-btn.on    { color: #185FA5; }
.del-btn:hover { background: var(--red-bg); color: var(--red); }

/* ── 리사이저 ── */
.resizer { width: 16px; flex-shrink: 0; cursor: col-resize; display: flex; align-items: center; justify-content: center; }
.resizer::after { content: ''; width: 4px; height: 36px; background: var(--border2); border-radius: 999px; transition: all .15s; }
.resizer:hover::after { background: var(--border3); height: 52px; width: 5px; }

/* ── 상세 패널 ── */
.detail-panel { width: 300px; min-width: 220px; max-width: 560px; flex-shrink: 0; background: var(--bg); border: .5px solid var(--border); border-radius: var(--radius); display: none; position: sticky; top: 0; }
.detail-panel.open { display: block; }
.dp-head { padding: 1rem 1.1rem; border-bottom: .5px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.dp-title-input { font-size: 14px; font-weight: 500; border: none; background: transparent; color: var(--text); font-family: inherit; padding: 2px 4px; border-radius: 4px; border: .5px solid transparent; outline: none; width: 100%; line-height: 1.45; }
.dp-title-input:hover { border-color: var(--border2); background: var(--bg2); }
.dp-title-input:focus { border-color: var(--border3); background: var(--bg2); }
.dp-close { width: 24px; height: 24px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text3); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.dp-close:hover { background: var(--bg2); color: var(--text); }
.dp-meta { padding: .75rem 1.1rem; border-bottom: .5px solid var(--border); display: flex; flex-direction: column; gap: 7px; }
.dp-row  { display: flex; justify-content: space-between; align-items: center; }
.dp-lbl  { font-size: 12px; color: var(--text3); }
.dp-val  { font-size: 12px; font-weight: 500; }
.dp-edit { font-size: 12px; font-weight: 500; border: none; background: transparent; color: var(--text); font-family: inherit; padding: 2px 5px; border-radius: 4px; border: .5px solid transparent; outline: none; width: 140px; text-align: right; }
.dp-edit:hover { border-color: var(--border2); background: var(--bg2); }
.dp-edit:focus { border-color: var(--border3); background: var(--bg2); }
.dp-sec  { font-size: 11px; color: var(--text2); font-weight: 600; padding: .75rem 1.1rem .4rem; letter-spacing: .04em; text-transform: uppercase; }

/* ── 타임라인 ── */
.timeline  { padding: 0 1.1rem .75rem; display: flex; flex-direction: column; }
.tl-item   { display: flex; gap: 10px; position: relative; }
.tl-line   { position: absolute; left: 6px; top: 14px; bottom: -2px; width: 1px; background: var(--border2); }
.tl-dot    { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; border: 1.5px solid var(--border2); background: var(--bg); position: relative; z-index: 1; }
.tl-dot.create { background: var(--blue); border-color: var(--blue); }
.tl-dot.status { background: var(--orange); border-color: var(--orange); }
.tl-dot.done   { background: #639922; border-color: #639922; }
.tl-body   { flex: 1; padding-bottom: 13px; min-width: 0; }
.tl-row    { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
.tl-text   { font-size: 13px; line-height: 1.45; }
.tl-date   { font-size: 11px; color: var(--text3); margin-top: 2px; }
.tl-author { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 999px; background: var(--purple-bg); color: var(--purple-t); margin-right: 5px; vertical-align: middle; }
.tl-del    { width: 18px; height: 18px; border-radius: 4px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-size: 12px; flex-shrink: 0; margin-top: 1px; opacity: 0; transition: all .15s; display: flex; align-items: center; justify-content: center; }
.tl-item:hover .tl-del { opacity: 1; }
.tl-del:hover { background: var(--red-bg); color: var(--red); }

/* ── 메모 입력 ── */
.dp-note { padding: 0 1.1rem 1rem; }
.note-input   { width: 100%; padding: 8px 10px; font-size: 13px; border: .5px solid var(--border2); border-radius: var(--radius-sm); background: transparent; color: var(--text); font-family: inherit; resize: none; height: 62px; margin-bottom: 6px; }
.note-input:focus { outline: none; border-color: var(--border3); }
.note-submit  { width: 100%; padding: 7px; font-size: 13px; font-weight: 600; border: none; border-radius: var(--radius-sm); background: var(--text); color: var(--bg); cursor: pointer; }
.note-submit:hover { opacity: .78; }

/* ── 모달 ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.38); align-items: center; justify-content: center; z-index: 200; }
.overlay.show { display: flex; }
.modal  { background: var(--bg); border-radius: var(--radius); border: .5px solid var(--border2); padding: 1.5rem; width: 100%; max-width: 420px; margin: 1rem; }
.modal h3  { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
.fg        { margin-bottom: 1rem; }
.fg label  { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
.fg input, .fg select { width: 100%; padding: 8px 10px; font-size: 14px; border: .5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); font-family: inherit; outline: none; }
.fg input:focus, .fg select:focus { border-color: var(--border3); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
.btn-cancel { padding: 7px 18px; font-size: 13px; border: .5px solid var(--border2); border-radius: var(--radius-sm); background: transparent; color: var(--text2); cursor: pointer; }
.btn-ok     { padding: 7px 18px; font-size: 13px; font-weight: 600; border: none; border-radius: var(--radius-sm); background: var(--text); color: var(--bg); cursor: pointer; }

/* ── 중요도 배지 ── */
.priority-badge { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: var(--pill); display: inline-flex; align-items: center; gap: 3px; cursor: pointer; }
.priority-badge:hover { opacity: .8; }
.reporter-badge { font-size: 11px; font-weight: 500; padding: 2px 10px; border-radius: var(--pill); background: var(--purple-bg); color: var(--purple-t); cursor: pointer; }
.reporter-badge:hover { opacity: .8; }
.p1 { background: #f1f1f0; color: #888; }
.p2 { background: #E6F1FB; color: #0C447C; }
.p3 { background: #FAEEDA; color: #633806; }
.p4 { background: #FCEBEB; color: #a32d2d; }
.p5 { background: #a32d2d; color: #fff; }
.reporter-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--pill); background: var(--purple-bg); color: var(--purple-t); }

/* ── 진행 바 ── */
.progress-wrap { margin-top: 4px; }
.progress-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; display: flex; justify-content: space-between; }
.progress-bar-bg { height: 6px; background: var(--bg3); border-radius: 999px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 999px; background: var(--blue); transition: width .3s; }
.progress-bar-fill.done-bar { background: #639922; }
.progress-bar-fill.over-bar  { background: var(--red); }


/* ── 모바일 닫기 버튼 ── */
@media (max-width: 768px) {
  .dp-close {
    width: 36px !important;
    height: 36px !important;
    font-size: 20px !important;
    background: var(--bg2) !important;
    border-radius: var(--radius-sm) !important;
  }
  .dp-title-input {
    font-size: 16px !important;
  }
}

/* ── 모바일 상세 패널 → 모달 방식 ── */
@media (max-width: 768px) {
  .resizer { display: none; }
  .detail-panel {
    display: none;
    position: fixed !important;
    inset: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
    min-width: 100% !important;
    height: 100% !important;
    border-radius: 0 !important;
    border: none !important;
    z-index: 250;
    overflow-y: auto;
    background: var(--bg) !important;
  }
  .detail-panel.open {
    display: flex !important;
    flex-direction: column;
  }
  .dp-head {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
    padding: 1rem 1.1rem;
  }
  .dp-note { padding-bottom: 3rem; }
  .layout { display: block; }
}

/* ── 토스트 ── */
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: var(--bg); font-size: 13px; font-weight: 500; padding: 9px 20px; border-radius: var(--pill); opacity: 0; transition: all .25s; pointer-events: none; z-index: 300; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 모바일 디버그 (오류 확인용, 확인 후 제거) -->
<div id="debugBox" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;color:#ff6b6b;font-size:11px;padding:8px;z-index:9999;max-height:40vh;overflow-y:auto;font-family:monospace;white-space:pre-wrap"></div>

<!-- 탑바 -->
<div class="topbar">
  <h1>업무 트래커</h1>
  <span class="tb-badge">팀장 뷰</span>
  <span style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px">
    <span class="sync-dot" id="syncDot"></span>실시간
  </span>
  <div class="tb-right">
    <span id="tbUser" style="font-size:12px;color:var(--text2)"></span>
    <button class="icon-btn" onclick="location.href='memo.html'">📝 메모장</button>
    <button class="icon-btn" onclick="location.href='calendar.html'">📅 캘린더</button>
    <button class="icon-btn" onclick="logout()">로그아웃</button>
  </div>
</div>

<!-- 팀원 탭 -->


<!-- 콘텐츠 -->
<div class="content">
  <div class="stats-row" id="statsRow"></div>
  <div class="filter-row" id="memberFilterRow" style="margin-bottom:.5rem;flex-wrap:wrap"></div>
  <div class="filter-row">
    <button class="chip active" onclick="setFilter('active', this)">전체</button>
    <button class="chip" onclick="setFilter('todo', this)">대기</button>
    <button class="chip" onclick="setFilter('inprogress', this)">진행 중</button>
    <button class="chip" onclick="setFilter('done', this)">완료</button>
    <button class="chip" onclick="setFilter('stale', this)">⚠ 오래된 업무</button>
    <button class="add-btn" id="addBtn" onclick="openModal()" style="display:none">+ 업무 추가</button>
  </div>
  <div class="layout">
    <div class="main">
      <div class="task-list" id="taskList"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="dp-head">
        <input class="dp-title-input" id="dpTitle" onchange="changeTitle(selDocId, selMId, this.value)" />
        <button class="dp-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="dp-meta" id="dpMeta"></div>
      <div class="dp-sec">히스토리</div>
      <div class="timeline" id="dpTimeline"></div>
      <div class="dp-note">
        <textarea class="note-input" id="noteInput" placeholder="팀장 코멘트 입력..."></textarea>
        <button class="note-submit" onclick="addNote()">메모 추가</button>
      </div>
    </div>
  </div>
</div>

<!-- 업무 추가 모달 (팀원별 탭에서만 표시) -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>새 업무 추가 — <span id="modalMemberName" style="color:var(--text2);font-weight:500"></span></h3>
    <div class="fg">
      <label>업무명</label>
      <input id="iTitle" placeholder="업무 내용을 입력하세요" />
    </div>
    <div class="fg">
      <label>설명 <span style="color:var(--text3);font-weight:400">(선택)</span></label>
      <input id="iDesc" placeholder="상세 설명을 입력하세요" />
    </div>
    <div class="fg">
      <label>마감일</label>
      <input id="iDue" type="date" />
    </div>
    <div class="fg">
      <label>상태</label>
      <select id="iStatus">
        <option value="todo">대기</option>
        <option value="inprogress">진행 중</option>
      </select>
    </div>
    <div class="fg">
      <label>중요도</label>
      <select id="iPriority">
        <option value="3">3 — 보통</option>
        <option value="5">5 — 매우 긴급</option>
        <option value="4">4 — 긴급</option>
        <option value="2">2 — 낮음</option>
        <option value="1">1 — 매우 낮음</option>
      </select>
    </div>
    <div class="fg">
      <label>최종보고자 <span style="color:var(--text3);font-weight:400">(선택)</span></label>
      <select id="iReporter"><option value="">없음</option></select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-ok" onclick="addTask()">추가하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
// ════════════════════════════════════════════
// Firebase 설정
// ════════════════════════════════════════════
window.onerror = (msg, src, line, col, err) => {
  const box = document.getElementById('debugBox');
  if (box) {
    box.style.display = 'block';
    box.textContent += `오류: ${msg}\n라인: ${line}\n${err?.stack || ''}\n\n`;
  }
  return false;
};

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {

// ════════════════════════════════════════════
// 상수 — 팀원 목록
// 팀원 추가/삭제 시 이 배열만 수정하면 됩니다
// ════════════════════════════════════════════
const MEMBER_IDS = ["강신욱", "김용욱", "오문식", "이길우", "이도영", "이영찬", "이윤형"];
const DAY_MS     = 86400000;
const STALE_DAYS = 14;

// ════════════════════════════════════════════
// 보고자 목록
// ════════════════════════════════════════════
let REPORTERS = [];

async function loadReporters() {
  try {
    const snap = await getDoc(doc(db, 'settings', 'reporters'));
    REPORTERS = snap.exists() ? (snap.data().list || []) : ['CEO', '홀딩스', '본부장'];
  } catch {
    REPORTERS = ['CEO', '홀딩스', '본부장'];
  }
  const sel = document.getElementById('iReporter');
  sel.innerHTML = '<option value="">없음</option>' +
    REPORTERS.map(r => `<option value="${r}">${r}</option>`).join('');
}

// ════════════════════════════════════════════
// 초기화 & 인증
// ════════════════════════════════════════════
const db = getFirestore(initializeApp(FIREBASE_CONFIG));

const sess = localStorage.getItem('tt_user');
if (!sess) { location.href = 'index.html'; throw ''; }
const ME = JSON.parse(sess);
if (ME.role !== 'manager' && ME.role !== 'admin') { location.href = 'index.html'; throw ''; }

document.getElementById('tbUser').textContent = ME.displayName;
loadReporters();

window.logout = () => { localStorage.removeItem('tt_user'); location.href = 'index.html'; };

// ════════════════════════════════════════════
// Firestore 헬퍼
// ════════════════════════════════════════════
const col   = memberId => collection(db, 'tasks', memberId, 'items');
const dr    = (memberId, docId) => doc(db, 'tasks', memberId, 'items', docId);
const fsUpd = (memberId, docId, data) => { setSync(true); return updateDoc(dr(memberId, docId), data); };
const fsAdd = (memberId, data)        => { setSync(true); return addDoc(col(memberId), { ...data, createdAt: serverTimestamp() }); };
const fsDel = (memberId, docId)       => { setSync(true); return deleteDoc(dr(memberId, docId)); };

// ════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════
let mData       = {};
let curTab      = '__all__';
let selDocId    = null;
let selMId      = null;
let filter      = 'active';  // 기본값: 대기+진행중
let filterMember = 'all';  // 전체탭 팀원 필터

let unsubs      = [];

// ════════════════════════════════════════════
// 유틸 함수
// ════════════════════════════════════════════
const now     = () => new Date().toISOString();
const setSync = v  => document.getElementById('syncDot').classList.toggle('syncing', v);

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function fmtDate(s) {
  if (!s) return '-';
  const d = new Date(s);
  const isDateOnly = s.length <= 10;
  const base = `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}.`;
  if (isDateOnly) return base;
  return `${base} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

function fmtShort(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function timeAgo(s) {
  const diff = Date.now() - new Date(s).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1)  return '방금';
  if (mins < 60) return `${mins}분`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}시간`;
  return `${Math.floor(hrs / 24)}일`;
}

const isOverdue = t => t.due && t.status !== 'done' && new Date(t.due) < new Date();
const isStale   = t => {
  if (t.status === 'done') return false;
  return Date.now() - new Date(t.updated).getTime() >= STALE_DAYS * DAY_MS;
};

window.priorityCls = function(p) {
  const n = p || 3;
  return 'priority-badge ' + ['','p1','p2','p3','p4','p5'][n];
};

window.togglePriorityEdit = id => {
  const row  = document.getElementById('dp-priority-row-' + id);
  const edit = document.getElementById('dp-priority-edit-' + id);
  if (!row || !edit) return;
  const hide = row.style.display === 'none';
  row.style.display  = hide ? '' : 'none';
  edit.style.display = hide ? 'none' : '';
  if (!hide) edit.querySelector('select')?.focus();
};

window.toggleReporterEdit = id => {
  const row  = document.getElementById('dp-reporter-row-' + id);
  const edit = document.getElementById('dp-reporter-edit-' + id);
  if (!row || !edit) return;
  const hide = row.style.display === 'none';
  row.style.display  = hide ? '' : 'none';
  edit.style.display = hide ? 'none' : '';
  if (!hide) edit.querySelector('select')?.focus();
};

function priorityBadge(p) {
  const n = p || 3;
  const cls  = ['','p1','p2','p3','p4','p5'][n];
  const dots = '●'.repeat(n) + '○'.repeat(5 - n);
  return `<span class="priority-badge ${cls}" title="중요도 ${n}">${dots}</span>`;
}

function statusBadge(status, docId, memberId, isReadOnly) {
  const labels  = { todo: '대기 →', inprogress: '진행 중 →', done: '완료 →' };
  const classes = { todo: 'badge-todo', inprogress: 'badge-inprogress', done: 'badge-done' };
  if (isReadOnly) {
    return `<span class="badge ${classes[status]}">${labels[status].replace(' →', '')}</span>`;
  }
  return `<span class="badge ${classes[status]} badge-status"
    onclick="cycleStat('${docId}', '${memberId}', event)"
    title="클릭하면 상태 변경">${labels[status]}</span>`;
}

// ════════════════════════════════════════════
// 실시간 데이터 구독
// ════════════════════════════════════════════
function subscribe() {
  unsubs.forEach(u => u());
  unsubs = [];
  MEMBER_IDS.forEach(memberId => {
    mData[memberId] = { tasks: [] };
    const unsub = onSnapshot(query(col(memberId), orderBy('order', 'asc')), snap => {
      mData[memberId].tasks = snap.docs.map(d => ({ _id: d.id, _mid: memberId, ...d.data() }));
      if (selMId === memberId && selDocId) {
        const t = mData[memberId].tasks.find(t => t._id === selDocId);
        if (t) renderDetail(t);
      }
      render();
      setSync(false);
    });
    unsubs.push(unsub);
  });
}
subscribe();

// ════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════
function getAllTasks() {
  if (curTab !== '__all__') return mData[curTab]?.tasks || [];
  const all = Object.values(mData).flatMap(m => m.tasks);
  return filterMember === 'all' ? all : all.filter(t => t._mid === filterMember);
}

function render() {
  renderMemberFilter();
  renderStats();
  renderTaskList();
}

function renderMemberFilter() {
  const el = document.getElementById('memberFilterRow');
  if (!el) return;
  if (curTab !== '__all__') { el.innerHTML = ''; return; }
  let html = `<span style="font-size:12px;color:var(--text3);margin-right:4px">팀원</span>`;
  html += `<button class="chip achip${filterMember==='all'?' active':''}" data-m="all">전체</button>`;
  MEMBER_IDS.forEach(id => {
    const cnt = (mData[id]?.tasks||[]).filter(t => t.status !== 'done').length;
    html += `<button class="chip achip${filterMember===id?' active':''}" data-m="${id}">${id} <span style="font-size:10px">${cnt}</span></button>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.achip').forEach(btn => {
    btn.addEventListener('click', function() {
      filterMember = this.dataset.m;
      el.querySelectorAll('.achip').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      render();
    });
  });
}


function renderStats() {
  const all     = getAllTasks();
  const total   = all.length;
  const inprog  = all.filter(t => t.status === 'inprogress').length;
  const stale   = all.filter(isStale).length;
  const overdue = all.filter(isOverdue).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">전체 업무</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">진행 중</div><div class="stat-value">${inprog}</div></div>
    <div class="stat-card"><div class="stat-label">오래된 업무</div><div class="stat-value warn">${stale}</div></div>
    <div class="stat-card"><div class="stat-label">기한 초과</div><div class="stat-value danger">${overdue}</div></div>`;
}

function renderTaskList() {
  const all      = getAllTasks();
  const filtered = all.filter(t => {
    const byStatus = filter === 'active' ? t.status !== 'done' : filter === 'all' ? true : filter === 'stale' ? isStale(t) : t.status === filter;
    return byStatus;
  });
  filtered.sort((a, b) => {
    if (b.pinned !== a.pinned) return b.pinned ? 1 : -1;
    const pa = b.priority || 3, pb = a.priority || 3;
    if (pa !== pb) return pa - pb;
    if (a.due && b.due) return new Date(a.due) - new Date(b.due);
    if (a.due) return -1; if (b.due) return 1;
    return 0;
  });
  const list = [...filtered.filter(t => t.pinned), ...filtered.filter(t => !t.pinned)];
  const isAll = curTab === '__all__';

  const el = document.getElementById('taskList');
  if (!list.length) { el.innerHTML = '<div class="empty">업무가 없습니다</div>'; return; }

  let html = '';
  list.forEach(t => {
    const ov  = isOverdue(t);
    const st  = isStale(t);
    let cls = 'task-card';
    if (t.pinned)    cls += ' pinned';
    else if (ov)     cls += ' overdue';
    else if (st)     cls += ' stale';
    if (selDocId === t._id) cls += ' selected';

    let flag = '';
    if (t.pinned)    flag = '<span class="flag flag-pinned">📌 고정됨</span>';
    else if (ov)     flag = '<span class="flag flag-overdue">기한 초과</span>';
    else if (st)     flag = '<span class="flag flag-stale">업데이트 필요</span>';

    const ago     = timeAgo(t.updated);
    const agoText = ago === '방금' ? '방금 업데이트' : `${ago} 전 업데이트`;

    html += `
      <div class="${cls}" onclick="selTask('${t._id}', '${t._mid}')">
        <div class="task-check${t.status === 'done' ? ' done' : ''}" data-id="${t._id}" data-mid="${t._mid}" data-isall="${isAll}"></div>
        <div class="task-body">
          <div class="task-title${t.status === 'done' ? ' done-text' : ''}">${t.title}</div>
          <div class="task-meta">
            ${priorityBadge(t.priority)}
            ${statusBadge(t.status, t._id, t._mid, isAll)}
            ${isAll ? `<span class="member-badge">${t._mid}</span>` : ''}
            ${t.reporter ? `<span class="reporter-badge">${t.reporter}</span>` : ''}
            ${t.due ? `<span class="task-date${ov ? ' ov' : ''}">마감 ${fmtShort(t.due)}</span>` : ''}
            <span class="task-date">${agoText}</span>
          </div>
        </div>
        <div class="card-right">
          ${flag}
          ${!isAll ? `
            <button class="pin-btn${t.pinned ? ' on' : ''}" onclick="togglePin('${t._id}','${t._mid}',event)">
              ${t.pinned ? '📌' : '☆'}
            </button>
            <button class="del-btn" onclick="deleteTask('${t._id}','${t._mid}',event)">✕</button>` : ''}
        </div>
      </div>`;
  });
  el.innerHTML = html;
  // task-check 클릭 이벤트 위임
  el.querySelectorAll('.task-check').forEach(chk => {
    chk.addEventListener('click', e => {
      e.stopPropagation();
      const isAll = chk.dataset.isall === 'true';
      if (!isAll) cycleStat(chk.dataset.id, chk.dataset.mid, e);
    });
  });
}

function renderDetail(t) {
  document.getElementById('dpTitle').value = t.title;

  const isAll = curTab === '__all__';
  const statusLabel = { todo: '대기', inprogress: '진행 중', done: '완료' };
  const descRow = t.desc
    ? `<div class="dp-row" style="align-items:flex-start;gap:8px">
        <span class="dp-lbl" style="flex-shrink:0">설명</span>
        <span class="dp-val" style="text-align:right;word-break:break-all;line-height:1.5">${t.desc}</span>
       </div>`
    : '';

  const priorityOpts = [5,4,3,2,1].map(p =>
    `<option value="${p}" ${(t.priority||3)==p?'selected':''}>${p} — ${{5:'매우 긴급',4:'긴급',3:'보통',2:'낮음',1:'매우 낮음'}[p]}</option>`
  ).join('');
  const reporterOpts = ['', ...REPORTERS].map(r =>
    `<option value="${r}" ${(t.reporter||'')==r?'selected':''}>${r||'없음'}</option>`
  ).join('');

  // 진행 바 계산
  const progressBar = (() => {
    if (!t.startDate || !t.due) return '';
    const start   = new Date(t.startDate);
    const end     = new Date(t.due);
    const today   = new Date(); today.setHours(0,0,0,0);
    const total   = Math.ceil((end - start) / 86400000);
    const elapsed = Math.ceil((today - start) / 86400000);
    if (total <= 0) return '';
    const pct     = Math.min(100, Math.max(0, Math.round(elapsed / total * 100)));
    const isDone  = t.status === 'done';
    const isOver  = elapsed > total && !isDone;
    const fillCls = isDone ? 'done-bar' : isOver ? 'over-bar' : '';
    const label   = isDone ? '완료' : isOver
      ? `기한 초과 +${elapsed - total}일`
      : `${Math.max(0, elapsed)}일 / ${total}일 (${pct}%)`;
    return `<div class="progress-wrap">
      <div class="progress-label"><span>진행</span><span>${label}</span></div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill ${fillCls}" style="width:${pct}%"></div>
      </div>
    </div>`;
  })();

  document.getElementById('dpMeta').innerHTML = `
    ${descRow}
    <div class="dp-row" id="dp-priority-row-${t._id}">
      <span class="dp-lbl">중요도</span>
      ${isAll
        ? `<span class="${priorityCls(t.priority)}">${{5:'매우 긴급',4:'긴급',3:'보통',2:'낮음',1:'매우 낮음'}[t.priority||3]}</span>`
        : `<span class="${priorityCls(t.priority)}" onclick="togglePriorityEdit('${t._id}')">${{5:'매우 긴급',4:'긴급',3:'보통',2:'낮음',1:'매우 낮음'}[t.priority||3]} ✎</span>`}
    </div>
    ${!isAll ? `<div class="dp-row" id="dp-priority-edit-${t._id}" style="display:none">
      <span class="dp-lbl">중요도</span>
      <select class="dp-edit" style="width:160px;text-align:right"
        onchange="updatePriority('${t._id}','${t._mid}',this.value);togglePriorityEdit('${t._id}')">${priorityOpts}</select>
    </div>` : ''}
    <div class="dp-row">
      <span class="dp-lbl">시작일</span>
      ${isAll
        ? `<span class="dp-val">${t.startDate ? fmtDate(t.startDate) : '-'}</span>`
        : `<input class="dp-edit" type="date" value="${t.startDate || ''}"
             onchange="updateStartDate('${t._id}','${t._mid}',this.value)"
             style="width:140px;text-align:right" />`}
    </div>
    <div class="dp-row">
      <span class="dp-lbl">마감일</span>
      ${isAll
        ? `<span class="dp-val">${t.due ? fmtDate(t.due) : '-'}</span>`
        : `<input class="dp-edit" type="date" value="${t.due || ''}"
             onchange="updateDue('${t._id}','${t._mid}',this.value)"
             style="width:140px;text-align:right" />`}
    </div>
    <div class="dp-row">
      <span class="dp-lbl">마지막 업데이트</span>
      <span class="dp-val">${fmtDate(t.updated)}</span>
    </div>
    ${progressBar ? `<div style="padding:4px 0">${progressBar}</div>` : ''}
    <div class="dp-row">
      <span class="dp-lbl">상태</span>
      <span class="badge ${t.status==='todo'?'badge-todo':t.status==='inprogress'?'badge-inprogress':'badge-done'}">${statusLabel[t.status]||'-'}</span>
    </div>
    <div class="dp-row" id="dp-reporter-row-${t._id}">
      <span class="dp-lbl">최종보고자</span>
      ${isAll
        ? `<span class="reporter-badge">${t.reporter || '-'}</span>`
        : `<span class="reporter-badge" onclick="toggleReporterEdit('${t._id}')">${t.reporter || '없음'} ✎</span>`}
    </div>
    ${!isAll ? `<div class="dp-row" id="dp-reporter-edit-${t._id}" style="display:none">
      <span class="dp-lbl">최종보고자</span>
      <select class="dp-edit" style="width:160px;text-align:right"
        onchange="updateReporter('${t._id}','${t._mid}',this.value);toggleReporterEdit('${t._id}')">${reporterOpts}</select>
    </div>` : ''}
    <div class="dp-row">
      <span class="dp-lbl">팀원</span>
      <span class="dp-val">${t._mid}</span>
    </div>`;

  const history = [...(t.history || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
  document.getElementById('dpTimeline').innerHTML = history.map((h, i) => `
    <div class="tl-item">
      <div class="tl-dot ${h.type}"></div>
      ${i < history.length - 1 ? '<div class="tl-line"></div>' : ''}
      <div class="tl-body">
        <div class="tl-row">
          <div class="tl-text">
            ${h.author ? `<span class="tl-author">${h.author}</span>` : ''}
            ${h.text}
          </div>
          ${!isAll ? `<button class="tl-del" onclick="deleteHistory('${t._id}','${t._mid}','${h.id}')">✕</button>` : ''}
        </div>
        <div class="tl-date">${fmtDate(h.date)}</div>
      </div>
    </div>`).join('');
}

// ════════════════════════════════════════════
// 이벤트 핸들러 — 탭 & 필터
// ════════════════════════════════════════════
window.switchTab = id => {
  curTab = id;
  selDocId = null;
  selMId   = null;
  filter   = 'active';
  filterMember = 'all';
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('noteInput').value = '';
  document.querySelectorAll('.chip').forEach((c, i) => c.classList.toggle('active', i === 0));
  document.getElementById('addBtn').style.display = id === '__all__' ? 'none' : '';
  render();
};

window.setFilter = (f, el) => {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
};

// ════════════════════════════════════════════
// 이벤트 핸들러 — 상세 패널
// ════════════════════════════════════════════
window.selTask = (docId, memberId) => {
  selDocId = docId;
  selMId   = memberId;
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  document.getElementById('detailPanel').classList.add('open');
  renderDetail(t);
  render();
};

window.closeDetail = () => {
  selDocId = null;
  selMId   = null;
  document.getElementById('detailPanel').classList.remove('open');
  render();
};

// ════════════════════════════════════════════
// 이벤트 핸들러 — 업무 조작
// ════════════════════════════════════════════
window.togglePin = async (docId, memberId, e) => {
  e.stopPropagation();
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (t) await fsUpd(memberId, docId, { pinned: !t.pinned });
};

window.cycleStat = async (docId, memberId, e) => {
  e.stopPropagation();
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  const ts   = now();
  const next  = { todo: 'inprogress', inprogress: 'done', done: 'todo' };
  const label = { todo: '대기', inprogress: '진행 중', done: '완료' };
  const newStatus = next[t.status];
  await fsUpd(memberId, docId, {
    status: newStatus, updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'status',
      text: `상태 변경: ${label[t.status]} → ${label[newStatus]} (팀장)`,
      date: ts, author: '팀장'
    }]
  });
};

window.deleteTask = async (docId, memberId, e) => {
  e.stopPropagation();
  if (!confirm('이 업무를 삭제할까요?')) return;
  if (selDocId === docId) {
    selDocId = null; selMId = null;
    document.getElementById('detailPanel').classList.remove('open');
  }
  await fsDel(memberId, docId);
  toast('업무를 삭제했어요');
};

// ════════════════════════════════════════════
// 이벤트 핸들러 — 상세 편집 (팀장 권한)
// ════════════════════════════════════════════
window.changeTitle = async (docId, memberId, val) => {
  if (!val.trim() || !docId || !memberId) return;
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  const ts = now();
  await fsUpd(memberId, docId, {
    title: val.trim(), updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'status',
      text: `업무명 변경: ${t.title} → ${val.trim()}`,
      date: ts, author: '팀장'
    }]
  });
};

window.updatePriority = async (docId, memberId, val) => {
  const t = mData[memberId]?.tasks.find(t => t._id === docId);

  const ts = now();

  });
};

window.updateDue = async (docId, memberId, val) => {

    }]

window.addNote = async () => {
  const inp  = document.getElementById('noteInput');
  const text = inp.value.trim();
  if (!text || !selDocId || !selMId) return;
  const t = mData[selMId]?.tasks.find(t => t._id === selDocId);
  if (!t) return;
  const ts = now();
  inp.value = '';
  await fsUpd(selMId, selDocId, {
    updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'comment',
      text, date: ts, author: `${ME.displayName}(팀장)`
    }]
  });
};

window.deleteHistory = async (docId, memberId, histId) => {
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  await fsUpd(memberId, docId, { history: (t.history || []).filter(h => h.id !== histId) });
};

// ════════════════════════════════════════════
// 모달 — 업무 추가 (팀원 탭에서)
// ════════════════════════════════════════════
window.openModal = () => {
  document.getElementById('modalMemberName').textContent = curTab;
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('iTitle').focus(), 80);
};
window.closeModal = () => {
  document.getElementById('overlay').classList.remove('show');
  ['iTitle', 'iDesc', 'iStart', 'iDue'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('iPriority').value = '3';
  document.getElementById('iReporter').value = '';
};

window.addTask = async () => {
  if (curTab === '__all__') return;
  const title = document.getElementById('iTitle').value.trim();
  if (!title) { toast('업무명을 입력해주세요'); return; }
  const btn = document.querySelector('#overlay .btn-ok');
  btn.disabled = true;
  btn.textContent = '추가 중...';
  try {
    const ts = now();
    await fsAdd(curTab, {
      title,
      desc:     document.getElementById('iDesc').value.trim(),
      assignee: '',
      startDate: document.getElementById('iStart').value || '',
    due:      document.getElementById('iDue').value || '',
      status:   'todo',
      updated:  ts,
      pinned:   false,
      order:    Date.now(),
      history:  [{ id: Date.now() + '', type: 'create', text: '업무가 등록되었습니다. (팀장)', date: ts, author: '팀장' }]
    });
    window.closeModal();
    toast(`${curTab}에게 업무를 추가했어요 ✓`);
  } catch (e) {
    toast('오류: ' + (e.code || e.message));
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '추가하기';
  }
};

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) window.closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') window.closeModal();
});

// ════════════════════════════════════════════
// 상세 패널 리사이즈
// ════════════════════════════════════════════
(function initResizer() {
  const resizer = document.getElementById('resizer');
  const panel   = document.getElementById('detailPanel');
  let startX, startW;

  resizer.addEventListener('mousedown', e => {
    if (!panel.classList.contains('open')) return;
    startX = e.clientX;
    startW = panel.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const onMove = e => {
      panel.style.width = Math.min(560, Math.max(220, startW + (startX - e.clientX))) + 'px';
    };
    const onUp = () => {
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();
</script>
