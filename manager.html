<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="GZ기획팀" />
<meta name="theme-color" content="#ffffff" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GZ Plan — 팀 업무</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0f0ee;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a8a8a8;
  --border:#e5e5e3;--border2:#d0d0cc;
  --radius:10px;--radius-sm:6px;--pill:999px;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --green:#639922;--green-bg:#EAF3DE;--green-t:#27500A;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --orange:#EF9F27;
  --purple-bg:#EEEDFE;--purple-t:#3C3489;
  --sidebar-w:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;display:flex}
.app{display:flex;width:100%;min-height:100vh}

/* 사이드바 */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sb-brand{padding:20px 16px 16px;border-bottom:0.5px solid var(--bg3)}
.sb-brand-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.sb-brand-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--bg3)}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:#185FA5;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:500;color:var(--text)}
.sb-user-role{font-size:11px;color:#185FA5}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-section{padding:4px 16px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;margin:1px 8px;border-radius:var(--radius-sm);transition:background .12s}
.sb-item:hover{background:var(--bg2)}
.sb-item.active{background:var(--bg3)}
.sb-item.active .sb-label{color:var(--text);font-weight:500}
.sb-item.active .sb-icon{color:var(--text)}
.sb-icon{font-size:15px;width:20px;text-align:center;color:var(--text2)}
.sb-label{font-size:13px;color:var(--text2);flex:1}
.sb-bottom{padding:12px 16px;border-top:0.5px solid var(--bg3)}
.sb-sync{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--orange);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* 메인 */
.main-wrap{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn-ghost{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-solid{padding:6px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;background:var(--text);color:var(--bg);cursor:pointer}
.btn-solid:hover{opacity:.82}

/* 팀원 탭 */
.member-tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);padding:0 24px;overflow-x:auto;flex-shrink:0}
.member-tab{padding:10px 14px;font-size:12px;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:color .12s}
.member-tab:hover{color:var(--text2)}
.member-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.member-tab .cnt{font-size:10px;padding:1px 5px;border-radius:var(--pill);background:var(--bg3);color:var(--text3)}
.member-tab.active .cnt{background:var(--text);color:var(--bg)}

/* 콘텐츠 */
.content-area{flex:1;padding:20px 24px 80px;display:flex;gap:16px;align-items:flex-start}
.main-left{flex:1;min-width:0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:24px;font-weight:600;color:var(--text);line-height:1}
.stat-value.warn{color:#BA7517}
.stat-value.danger{color:var(--red)}

/* 필터 */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.chip{padding:4px 12px;border-radius:var(--pill);font-size:12px;border:0.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.chip.member-chip{border-left-width:3px}

/* 업무 카드 */
.task-list{display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.task-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s;position:relative}
.task-card:hover{border-color:var(--border2)}
.task-card.selected{border-color:var(--text)}
.task-card.stale{border-left:3px solid var(--orange)}
.task-card.overdue{border-left:3px solid var(--red)}
.priority-bar{width:3px;border-radius:var(--pill);align-self:stretch;flex-shrink:0;min-height:32px}
.task-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.task-check:hover{border-color:var(--text)}
.task-check.done{background:var(--text);border-color:var(--text)}
.task-check.done::after{content:'';width:5px;height:3px;border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600}
.badge-todo{background:var(--blue-bg);color:var(--blue-t)}
.badge-inprogress{background:var(--amber-bg);color:var(--amber-t)}
.badge-done{background:var(--green-bg);color:var(--green-t)}
.badge-status{cursor:pointer;user-select:none}
.badge-status:hover{opacity:.75}
.badge-reporter{background:var(--purple-bg);color:var(--purple-t)}
.member-badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;background:var(--bg3);color:var(--text2)}
.task-date{font-size:11px;color:var(--text3)}
.task-date.ov{color:var(--red);font-weight:600}
.card-right{position:absolute;top:10px;right:12px;display:flex;gap:4px}
.pin-btn,.del-btn{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.pin-btn:hover{background:var(--bg3);color:var(--text)}
.pin-btn.on{color:var(--blue)}
.del-btn:hover{background:var(--red-bg);color:var(--red)}

/* 상세 패널 */
.resizer{width:12px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center}
.resizer::after{content:'';width:3px;height:30px;background:var(--border);border-radius:var(--pill);transition:all .15s}
.resizer:hover::after{background:var(--border2);height:46px}
.detail-panel{width:300px;min-width:240px;max-width:480px;flex-shrink:0;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);display:none;position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto}
.detail-panel.open{display:block}
.dp-head{padding:14px 16px;border-bottom:0.5px solid var(--bg3);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;position:sticky;top:0;background:var(--bg);z-index:1}
.dp-member{font-size:11px;color:#185FA5;font-weight:600;margin-bottom:3px}
.dp-title-input{font-size:14px;font-weight:500;border:none;background:transparent;color:var(--text);font-family:inherit;padding:2px 4px;border-radius:4px;border:0.5px solid transparent;outline:none;width:100%;line-height:1.45}
.dp-title-input:hover{border-color:var(--border);background:var(--bg2)}
.dp-title-input:focus{border-color:var(--border2);background:var(--bg2)}
.dp-close{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.dp-close:hover{background:var(--bg2);color:var(--text)}
.dp-meta{padding:10px 16px;border-bottom:0.5px solid var(--bg3);display:flex;flex-direction:column}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--bg3)}
.dp-row:last-child{border-bottom:none}
.dp-lbl{font-size:11px;color:var(--text3)}
.dp-val{font-size:12px;font-weight:500;color:var(--text)}
.dp-edit{font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text);font-family:inherit;padding:2px 5px;border-radius:4px;border:0.5px solid transparent;outline:none;width:150px;text-align:right}
.dp-edit:hover{border-color:var(--border);background:var(--bg2)}
.dp-edit:focus{border-color:var(--border2);background:var(--bg2)}
.dp-sec{font-size:10px;font-weight:600;color:var(--text3);padding:12px 16px 6px;letter-spacing:.06em;text-transform:uppercase}
.progress-wrap{padding:0 16px 12px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:var(--pill);background:var(--text);transition:width .3s}
.progress-bar-fill.done-bar{background:var(--green)}
.progress-bar-fill.over-bar{background:var(--red)}
.timeline{padding:0 16px 12px;display:flex;flex-direction:column}
.tl-item{display:flex;gap:8px;position:relative}
.tl-line{position:absolute;left:5px;top:13px;bottom:-2px;width:1px;background:var(--border)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);background:var(--bg);position:relative;z-index:1}
.tl-dot.create{background:var(--blue);border-color:var(--blue)}
.tl-dot.status{background:var(--orange);border-color:var(--orange)}
.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-body{flex:1;padding-bottom:12px;min-width:0}
.tl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.tl-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;flex-shrink:0;opacity:0;transition:opacity .12s;display:flex;align-items:center;justify-content:center}
.tl-item:hover .tl-del{opacity:1}
.tl-del:hover{background:var(--red-bg);color:var(--red)}
.tl-author{font-size:10px;font-weight:600;padding:1px 5px;border-radius:var(--pill);background:var(--purple-bg);color:var(--purple-t);margin-right:4px}
.tl-text{font-size:12px;line-height:1.5;color:var(--text2)}
.tl-date{font-size:10px;color:var(--text3);margin-top:2px}
.dp-note{padding:12px 16px}
.note-input{width:100%;padding:8px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;resize:none;height:58px}
.note-input:focus{outline:none;border-color:var(--border2)}
.note-submit{width:100%;margin-top:6px;padding:7px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.note-submit:hover{opacity:.82}

/* 모달 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);align-items:center;justify-content:center;z-index:200}
.overlay.show{display:flex}
.modal{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:1.5rem;width:100%;max-width:420px;margin:1rem}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem;color:var(--text)}
.fg{margin-bottom:1rem}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--border2)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{padding:7px 16px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer}
.btn-ok{padding:7px 18px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);font-size:12px;font-weight:500;padding:8px 18px;border-radius:var(--pill);opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .main-wrap{margin-left:0}
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-panel{position:fixed;inset:0;width:100%;max-width:100%;border-radius:0;z-index:150;max-height:100vh}
  .resizer{display:none}
}
</style>
</head>
<body>
<div class="app">

<div class="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">GZ Plan</div><div class="sb-brand-sub">경영기획팀</div></div>
  <div class="sb-user">
    <div class="sb-avatar" id="sbUserInitial">팀</div>
    <div><div class="sb-user-name" id="sbUserName"></div><div class="sb-user-role">팀장</div></div>
  </div>
  <div class="sb-nav">
    <div class="sb-section">업무</div>
    <div class="sb-item active"><div class="sb-icon">☐</div><div class="sb-label">팀 업무 현황</div></div>
    <div class="sb-section">도구</div>
    <div class="sb-item" onclick="location.href='calendar.html'"><div class="sb-icon">▦</div><div class="sb-label">캘린더</div></div>
    <div class="sb-item" onclick="location.href='meeting.html'"><div class="sb-icon">◈</div><div class="sb-label">회의록</div></div>
    <div class="sb-item" onclick="location.href='memo.html'"><div class="sb-icon">◉</div><div class="sb-label">메모장</div></div>
    <div class="sb-section">관리</div>
    <div class="sb-item" onclick="location.href='admin.html'"><div class="sb-icon">◯</div><div class="sb-label">계정 관리</div></div>
  </div>
  <div class="sb-bottom">
    <div class="sb-sync"><div class="sync-dot" id="syncDot"></div><span>실시간 동기화</span></div>
    <div style="margin-top:10px">
      <button class="btn-ghost" onclick="logout()" style="font-size:11px;padding:4px 10px;width:100%">로그아웃</button>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="topbar">
    <div class="page-title">팀 업무 현황</div>
    <div class="topbar-right">
      <button class="btn-ghost" id="addBtn" onclick="openModal()" style="display:none">+ 업무 추가</button>
    </div>
  </div>

  <div class="member-tabs" id="memberTabs"></div>

  <div class="content-area">
    <div class="main-left">
      <div class="stats" id="statsRow"></div>
      <div class="filter-row" id="memberFilterRow"></div>
      <div class="filter-row">
        <button class="chip active" onclick="setFilter('active', this)">전체</button>
        <button class="chip" onclick="setFilter('todo', this)">대기</button>
        <button class="chip" onclick="setFilter('inprogress', this)">진행 중</button>
        <button class="chip" onclick="setFilter('done', this)">완료</button>
        <button class="chip" onclick="setFilter('stale', this)">⚠ 오래된 업무</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="dp-head">
        <div style="flex:1;min-width:0">
          <div class="dp-member" id="dpMember"></div>
          <input class="dp-title-input" id="dpTitle" onchange="changeTitle(selDocId, selMId, this.value)" />
        </div>
        <button class="dp-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="dp-meta" id="dpMeta"></div>
      <div class="dp-sec">히스토리</div>
      <div class="timeline" id="dpTimeline"></div>
      <div class="dp-note">
        <textarea class="note-input" id="noteInput" placeholder="팀장 코멘트 입력..."></textarea>
        <button class="note-submit" onclick="addNote()">메모 추가</button>
      </div>
    </div>
  </div>
</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>새 업무 추가 — <span id="modalMemberName" style="color:var(--text2);font-weight:400"></span></h3>
    <div class="fg"><label>업무명</label><input id="iTitle" placeholder="업무 내용을 입력하세요" /></div>
    <div class="fg"><label>설명 <span style="font-weight:400;text-transform:none;letter-spacing:0">(선택)</span></label><input id="iDesc" placeholder="상세 설명" /></div>
    <div class="fg"><label>중요도</label>
      <select id="iPriority">
        <option value="3">3 — 보통</option>
        <option value="5">5 — 매우 긴급</option>
        <option value="4">4 — 긴급</option>
        <option value="2">2 — 낮음</option>
        <option value="1">1 — 매우 낮음</option>
      </select>
    </div>
    <div class="fg"><label>시작일</label><input id="iStart" type="date" /></div>
    <div class="fg"><label>마감일</label><input id="iDue" type="date" /></div>
    <div class="fg"><label>최종보고자</label><select id="iReporter"><option value="">없음</option></select></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-ok" onclick="addTask()">추가하기</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc, getDoc,
  onSnapshot, addDoc, updateDoc, deleteDoc,
  serverTimestamp, query, orderBy
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
// ════════════════════════════════════════════
// Firebase 설정
// ════════════════════════════════════════════
window.onerror = (msg, src, line, col, err) => {
  const box = document.getElementById('debugBox');
  if (box) {
    box.style.display = 'block';
    box.textContent += `오류: ${msg}\n라인: ${line}\n${err?.stack || ''}\n\n`;
  }
  return false;
};

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc, getDoc,
  onSnapshot, addDoc, updateDoc, deleteDoc,
  serverTimestamp, query, orderBy

// ════════════════════════════════════════════
// 상수 — 팀원 목록
// 팀원 추가/삭제 시 이 배열만 수정하면 됩니다
// ════════════════════════════════════════════
const MEMBER_IDS = ["강신욱", "김용욱", "오문식", "이길우", "이도영", "이영찬", "이윤형"];
const DAY_MS     = 86400000;
const STALE_DAYS = 14;

// ════════════════════════════════════════════
// 보고자 목록
// ════════════════════════════════════════════
let REPORTERS = [];

async function loadReporters() {
  try {
    const snap = await getDoc(doc(db, 'settings', 'reporters'));
    REPORTERS = snap.exists() ? (snap.data().list || []) : ['CEO', '홀딩스', '본부장'];
  } catch {
    REPORTERS = ['CEO', '홀딩스', '본부장'];
  }
  const sel = document.getElementById('iReporter');
  sel.innerHTML = '<option value="">없음</option>' +
    REPORTERS.map(r => `<option value="${r}">${r}</option>`).join('');
}

// ════════════════════════════════════════════
// 초기화 & 인증
// ════════════════════════════════════════════
const db = getFirestore(initializeApp(FIREBASE_CONFIG));

const sess = localStorage.getItem('tt_user');
if (!sess) { location.href = 'index.html'; throw ''; }
const ME = JSON.parse(sess);
if (ME.role !== 'manager' && ME.role !== 'admin') { location.href = 'index.html'; throw ''; }

document.getElementById('sbUserName').textContent = ME.displayName;
  document.getElementById('sbUserInitial').textContent = ME.displayName.slice(0,2);
loadReporters();

window.logout = () => { localStorage.removeItem('tt_user'); location.href = 'index.html'; };

// ════════════════════════════════════════════
// Firestore 헬퍼
// ════════════════════════════════════════════
const col   = memberId => collection(db, 'tasks', memberId, 'items');
const dr    = (memberId, docId) => doc(db, 'tasks', memberId, 'items', docId);
const fsUpd = (memberId, docId, data) => { setSync(true); return updateDoc(dr(memberId, docId), data); };
const fsAdd = (memberId, data)        => { setSync(true); return addDoc(col(memberId), { ...data, createdAt: serverTimestamp() }); };
const fsDel = (memberId, docId)       => { setSync(true); return deleteDoc(dr(memberId, docId)); };

// ════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════
let mData       = {};
let curTab      = '__all__';
let selDocId    = null;
let selMId      = null;
let filter      = 'active';  // 기본값: 대기+진행중
let filterMember = 'all';  // 전체탭 팀원 필터

let unsubs      = [];

// ════════════════════════════════════════════
// 유틸 함수
// ════════════════════════════════════════════
const now     = () => new Date().toISOString();
const setSync = v  => const sd=document.getElementById('syncDot');if(sd)sd.classList.toggle('syncing',v);

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function fmtDate(s) {
  if (!s) return '-';
  const d = new Date(s);
  const isDateOnly = s.length <= 10;
  const base = `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}.`;
  if (isDateOnly) return base;
  return `${base} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

function fmtShort(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function timeAgo(s) {
  const diff = Date.now() - new Date(s).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1)  return '방금';
  if (mins < 60) return `${mins}분`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}시간`;
  return `${Math.floor(hrs / 24)}일`;
}

const isOverdue = t => t.due && t.status !== 'done' && new Date(t.due) < new Date();
const isStale   = t => {
  if (t.status === 'done') return false;
  return Date.now() - new Date(t.updated).getTime() >= STALE_DAYS * DAY_MS;
};

window.priorityCls = function(p) {
  const n = p || 3;
  return 'priority-badge ' + ['','p1','p2','p3','p4','p5'][n];
};

window.togglePriorityEdit = id => {
  const row  = document.getElementById('dp-priority-row-' + id);
  const edit = document.getElementById('dp-priority-edit-' + id);
  if (!row || !edit) return;
  const hide = row.style.display === 'none';
  row.style.display  = hide ? '' : 'none';
  edit.style.display = hide ? 'none' : '';
  if (!hide) edit.querySelector('select')?.focus();
};

window.toggleReporterEdit = id => {
  const row  = document.getElementById('dp-reporter-row-' + id);
  const edit = document.getElementById('dp-reporter-edit-' + id);
  if (!row || !edit) return;
  const hide = row.style.display === 'none';
  row.style.display  = hide ? '' : 'none';
  edit.style.display = hide ? 'none' : '';
  if (!hide) edit.querySelector('select')?.focus();
};

function priorityBadge(p) {
  const n = p || 3;
  const cls  = ['','p1','p2','p3','p4','p5'][n];
  const dots = '●'.repeat(n) + '○'.repeat(5 - n);
  return `<span class="priority-badge ${cls}" title="중요도 ${n}">${dots}</span>`;
}

function statusBadge(status, docId, memberId, isReadOnly) {
  const labels  = { todo: '대기 →', inprogress: '진행 중 →', done: '완료 →' };
  const classes = { todo: 'badge-todo', inprogress: 'badge-inprogress', done: 'badge-done' };
  if (isReadOnly) {
    return `<span class="badge ${classes[status]}">${labels[status].replace(' →', '')}</span>`;
  }
  return `<span class="badge ${classes[status]} badge-status"
    onclick="cycleStat('${docId}', '${memberId}', event)"
    title="클릭하면 상태 변경">${labels[status]}</span>`;
}

// ════════════════════════════════════════════
// 실시간 데이터 구독
// ════════════════════════════════════════════
function subscribe() {
  unsubs.forEach(u => u());
  unsubs = [];
  MEMBER_IDS.forEach(memberId => {
    mData[memberId] = { tasks: [] };
    const unsub = onSnapshot(query(col(memberId), orderBy('order', 'asc')), snap => {
      mData[memberId].tasks = snap.docs.map(d => ({ _id: d.id, _mid: memberId, ...d.data() }));
      if (selMId === memberId && selDocId) {
        const t = mData[memberId].tasks.find(t => t._id === selDocId);
        if (t) renderDetail(t);
      }
      render();
      setSync(false);
    });
    unsubs.push(unsub);
  });
}
subscribe();

// ════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════
function getAllTasks() {
  if (curTab !== '__all__') return mData[curTab]?.tasks || [];
  const all = Object.values(mData).flatMap(m => m.tasks);
  return filterMember === 'all' ? all : all.filter(t => t._mid === filterMember);
}

function render() {
  renderMemberFilter();
  renderStats();
  renderTaskList();
}

function renderMemberFilter() {
  const el = document.getElementById('memberFilterRow');
  if (!el) return;
  if (curTab !== '__all__') { el.innerHTML = ''; return; }
  let html = `<span style="font-size:12px;color:var(--text3);margin-right:4px">팀원</span>`;
  html += `<button class="chip achip${filterMember==='all'?' active':''}" data-m="all">전체</button>`;
  MEMBER_IDS.forEach(id => {
    const cnt = (mData[id]?.tasks||[]).filter(t => t.status !== 'done').length;
    html += `<button class="chip achip${filterMember===id?' active':''}" data-m="${id}">${id} <span style="font-size:10px">${cnt}</span></button>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.achip').forEach(btn => {
    btn.addEventListener('click', function() {
      filterMember = this.dataset.m;
      el.querySelectorAll('.achip').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      render();
    });
  });
}


function renderStats() {
  const all     = getAllTasks();
  const total   = all.length;
  const inprog  = all.filter(t => t.status === 'inprogress').length;
  const stale   = all.filter(isStale).length;
  const overdue = all.filter(isOverdue).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">전체 업무</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">진행 중</div><div class="stat-value">${inprog}</div></div>
    <div class="stat-card"><div class="stat-label">오래된 업무</div><div class="stat-value warn">${stale}</div></div>
    <div class="stat-card"><div class="stat-label">기한 초과</div><div class="stat-value danger">${overdue}</div></div>`;
}

function renderTaskList() {
  const all      = getAllTasks();
  const filtered = all.filter(t => {
    const byStatus = filter === 'active' ? t.status !== 'done' : filter === 'all' ? true : filter === 'stale' ? isStale(t) : t.status === filter;
    return byStatus;
  });
  filtered.sort((a, b) => {
    if (b.pinned !== a.pinned) return b.pinned ? 1 : -1;
    const pa = b.priority || 3, pb = a.priority || 3;
    if (pa !== pb) return pa - pb;
    if (a.due && b.due) return new Date(a.due) - new Date(b.due);
    if (a.due) return -1; if (b.due) return 1;
    return 0;
  });
  const list = [...filtered.filter(t => t.pinned), ...filtered.filter(t => !t.pinned)];
  const isAll = curTab === '__all__';

  const el = document.getElementById('taskList');
  if (!list.length) { el.innerHTML = '<div class="empty">업무가 없습니다</div>'; return; }

  let html = '';
  list.forEach(t => {
    const ov  = isOverdue(t);
    const st  = isStale(t);
    let cls = 'task-card';
    if (t.pinned)    cls += ' pinned';
    else if (ov)     cls += ' overdue';
    else if (st)     cls += ' stale';
    if (selDocId === t._id) cls += ' selected';

    let flag = '';
    if (t.pinned)    flag = '<span class="flag flag-pinned">📌 고정됨</span>';
    else if (ov)     flag = '<span class="flag flag-overdue">기한 초과</span>';
    else if (st)     flag = '<span class="flag flag-stale">업데이트 필요</span>';

    const ago     = timeAgo(t.updated);
    const agoText = ago === '방금' ? '방금 업데이트' : `${ago} 전 업데이트`;

    html += `
      <div class="${cls}" onclick="selTask('${t._id}', '${t._mid}')">
        <div class="priority-bar" style="background:${priorityColor(t.priority)}"></div>
        <div class="task-check${t.status === 'done' ? ' done' : ''}" data-id="${t._id}" data-mid="${t._mid}" data-isall="${isAll}"></div>
        <div class="task-body">
          <div class="task-title${t.status === 'done' ? ' done-text' : ''}">${t.title}</div>
          <div class="task-meta">
            ${priorityBadge(t.priority)}
            ${statusBadge(t.status, t._id, t._mid, isAll)}
            ${isAll ? `<span class="member-badge">${t._mid}</span>` : ''}
            ${t.reporter ? `<span class="reporter-badge">${t.reporter}</span>` : ''}
            ${t.due ? `<span class="task-date${ov ? ' ov' : ''}">마감 ${fmtShort(t.due)}</span>` : ''}
            <span class="task-date">${agoText}</span>
          </div>
        </div>
        <div class="card-right">
          ${flag}
          ${!isAll ? `
            <button class="pin-btn${t.pinned ? ' on' : ''}" onclick="togglePin('${t._id}','${t._mid}',event)">
              ${t.pinned ? '📌' : '☆'}
            </button>
            <button class="del-btn" onclick="deleteTask('${t._id}','${t._mid}',event)">✕</button>` : ''}
        </div>
      </div>`;
  });
  el.innerHTML = html;
  // task-check 클릭 이벤트 위임
  el.querySelectorAll('.task-check').forEach(chk => {
    chk.addEventListener('click', e => {
      e.stopPropagation();
      const isAll = chk.dataset.isall === 'true';
      if (!isAll) cycleStat(chk.dataset.id, chk.dataset.mid, e);
    });
  });
}

function renderDetail(t) {
  document.getElementById('dpTitle').value = t.title;

  const isAll = curTab === '__all__';
  const statusLabel = { todo: '대기', inprogress: '진행 중', done: '완료' };
  const descRow = t.desc
    ? `<div class="dp-row" style="align-items:flex-start;gap:8px">
        <span class="dp-lbl" style="flex-shrink:0">설명</span>
        <span class="dp-val" style="text-align:right;word-break:break-all;line-height:1.5">${t.desc}</span>
       </div>`
    : '';

  const priorityOpts = [5,4,3,2,1].map(p =>
    `<option value="${p}" ${(t.priority||3)==p?'selected':''}>${p} — ${{5:'매우 긴급',4:'긴급',3:'보통',2:'낮음',1:'매우 낮음'}[p]}</option>`
  ).join('');
  const reporterOpts = ['', ...REPORTERS].map(r =>
    `<option value="${r}" ${(t.reporter||'')==r?'selected':''}>${r||'없음'}</option>`
  ).join('');

  // 진행 바 계산
  const progressBar = (() => {
    if (!t.startDate || !t.due) return '';
    const start   = new Date(t.startDate);
    const end     = new Date(t.due);
    const today   = new Date(); today.setHours(0,0,0,0);
    const total   = Math.ceil((end - start) / 86400000);
    const elapsed = Math.ceil((today - start) / 86400000);
    if (total <= 0) return '';
    const pct     = Math.min(100, Math.max(0, Math.round(elapsed / total * 100)));
    const isDone  = t.status === 'done';
    const isOver  = elapsed > total && !isDone;
    const fillCls = isDone ? 'done-bar' : isOver ? 'over-bar' : '';
    const label   = isDone ? '완료' : isOver
      ? `기한 초과 +${elapsed - total}일`
      : `${Math.max(0, elapsed)}일 / ${total}일 (${pct}%)`;
    return `<div class="progress-wrap">
      <div class="progress-label"><span>진행</span><span>${label}</span></div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill ${fillCls}" style="width:${pct}%"></div>
      </div>
    </div>`;
  })();

  document.getElementById('dpMeta').innerHTML = `
    ${descRow}
    <div class="dp-row" id="dp-priority-row-${t._id}">
      <span class="dp-lbl">중요도</span>
      ${isAll
        ? `<span class="${priorityCls(t.priority)}">${{5:'매우 긴급',4:'긴급',3:'보통',2:'낮음',1:'매우 낮음'}[t.priority||3]}</span>`
        : `<span class="${priorityCls(t.priority)}" onclick="togglePriorityEdit('${t._id}')">${{5:'매우 긴급',4:'긴급',3:'보통',2:'낮음',1:'매우 낮음'}[t.priority||3]} ✎</span>`}
    </div>
    ${!isAll ? `<div class="dp-row" id="dp-priority-edit-${t._id}" style="display:none">
      <span class="dp-lbl">중요도</span>
      <select class="dp-edit" style="width:160px;text-align:right"
        onchange="updatePriority('${t._id}','${t._mid}',this.value);togglePriorityEdit('${t._id}')">${priorityOpts}</select>
    </div>` : ''}
    <div class="dp-row">
      <span class="dp-lbl">시작일</span>
      ${isAll
        ? `<span class="dp-val">${t.startDate ? fmtDate(t.startDate) : '-'}</span>`
        : `<input class="dp-edit" type="date" value="${t.startDate || ''}"
             onchange="updateStartDate('${t._id}','${t._mid}',this.value)"
             style="width:140px;text-align:right" />`}
    </div>
    <div class="dp-row">
      <span class="dp-lbl">마감일</span>
      ${isAll
        ? `<span class="dp-val">${t.due ? fmtDate(t.due) : '-'}</span>`
        : `<input class="dp-edit" type="date" value="${t.due || ''}"
             onchange="updateDue('${t._id}','${t._mid}',this.value)"
             style="width:140px;text-align:right" />`}
    </div>
    <div class="dp-row">
      <span class="dp-lbl">마지막 업데이트</span>
      <span class="dp-val">${fmtDate(t.updated)}</span>
    </div>
    ${progressBar ? `<div style="padding:4px 0">${progressBar}</div>` : ''}
    <div class="dp-row">
      <span class="dp-lbl">상태</span>
      <span class="badge ${t.status==='todo'?'badge-todo':t.status==='inprogress'?'badge-inprogress':'badge-done'}">${statusLabel[t.status]||'-'}</span>
    </div>
    <div class="dp-row" id="dp-reporter-row-${t._id}">
      <span class="dp-lbl">최종보고자</span>
      ${isAll
        ? `<span class="reporter-badge">${t.reporter || '-'}</span>`
        : `<span class="reporter-badge" onclick="toggleReporterEdit('${t._id}')">${t.reporter || '없음'} ✎</span>`}
    </div>
    ${!isAll ? `<div class="dp-row" id="dp-reporter-edit-${t._id}" style="display:none">
      <span class="dp-lbl">최종보고자</span>
      <select class="dp-edit" style="width:160px;text-align:right"
        onchange="updateReporter('${t._id}','${t._mid}',this.value);toggleReporterEdit('${t._id}')">${reporterOpts}</select>
    </div>` : ''}
    <div class="dp-row">
      <span class="dp-lbl">팀원</span>
      <span class="dp-val">${t._mid}</span>
    </div>`;

  const history = [...(t.history || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
  document.getElementById('dpTimeline').innerHTML = history.map((h, i) => `
    <div class="tl-item">
      <div class="tl-dot ${h.type}"></div>
      ${i < history.length - 1 ? '<div class="tl-line"></div>' : ''}
      <div class="tl-body">
        <div class="tl-row">
          <div class="tl-text">
            ${h.author ? `<span class="tl-author">${h.author}</span>` : ''}
            ${h.text}
          </div>
          ${!isAll ? `<button class="tl-del" onclick="deleteHistory('${t._id}','${t._mid}','${h.id}')">✕</button>` : ''}
        </div>
        <div class="tl-date">${fmtDate(h.date)}</div>
      </div>
    </div>`).join('');
}

// ════════════════════════════════════════════
// 이벤트 핸들러 — 탭 & 필터
// ════════════════════════════════════════════
window.switchTab = id => {
  curTab = id;
  selDocId = null;
  selMId   = null;
  filter   = 'active';
  filterMember = 'all';
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('noteInput').value = '';
  document.querySelectorAll('.chip').forEach((c, i) => c.classList.toggle('active', i === 0));
  document.getElementById('addBtn').style.display = id === '__all__' ? 'none' : '';
  render();
};

window.setFilter = (f, el) => {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
};

// ════════════════════════════════════════════
// 이벤트 핸들러 — 상세 패널
// ════════════════════════════════════════════
window.selTask = (docId, memberId) => {
  selDocId = docId;
  selMId   = memberId;
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  document.getElementById('detailPanel').classList.add('open');
  renderDetail(t);
  render();
};

window.closeDetail = () => {
  selDocId = null;
  selMId   = null;
  document.getElementById('detailPanel').classList.remove('open');
  render();
};

// ════════════════════════════════════════════
// 이벤트 핸들러 — 업무 조작
// ════════════════════════════════════════════
window.togglePin = async (docId, memberId, e) => {
  e.stopPropagation();
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (t) await fsUpd(memberId, docId, { pinned: !t.pinned });
};

window.cycleStat = async (docId, memberId, e) => {
  e.stopPropagation();
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  const ts   = now();
  const next  = { todo: 'inprogress', inprogress: 'done', done: 'todo' };
  const label = { todo: '대기', inprogress: '진행 중', done: '완료' };
  const newStatus = next[t.status];
  await fsUpd(memberId, docId, {
    status: newStatus, updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'status',
      text: `상태 변경: ${label[t.status]} → ${label[newStatus]} (팀장)`,
      date: ts, author: '팀장'
    }]
  });
};

window.deleteTask = async (docId, memberId, e) => {
  e.stopPropagation();
  if (!confirm('이 업무를 삭제할까요?')) return;
  if (selDocId === docId) {
    selDocId = null; selMId = null;
    document.getElementById('detailPanel').classList.remove('open');
  }
  await fsDel(memberId, docId);
  toast('업무를 삭제했어요');
};

// ════════════════════════════════════════════
// 이벤트 핸들러 — 상세 편집 (팀장 권한)
// ════════════════════════════════════════════
window.changeTitle = async (docId, memberId, val) => {
  if (!val.trim() || !docId || !memberId) return;
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  const ts = now();
  await fsUpd(memberId, docId, {
    title: val.trim(), updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'status',
      text: `업무명 변경: ${t.title} → ${val.trim()}`,
      date: ts, author: '팀장'
    }]
  });
};

window.updatePriority = async (docId, memberId, val) => {
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  const ts = now();
  await fsUpd(memberId, docId, {
    priority: Number(val), updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'status',
      text: `중요도 변경: ${t.priority || 3} → ${val}`,
      date: ts, author: '팀장'
    }]
  });
};

window.updateReporter = async (docId, memberId, val) => {
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  const ts = now();
  await fsUpd(memberId, docId, {
    reporter: val, updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'status',
      text: `최종보고자 변경: ${t.reporter || '없음'} → ${val || '없음'}`,
      date: ts, author: '팀장'

  });
};

window.updateStartDate = async (docId, memberId, val) => {
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  const ts = now();
  await fsUpd(memberId, docId, {
    startDate: val, updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'status',
      text: `시작일 변경: ${t.startDate ? fmtDate(t.startDate) : '없음'} → ${val ? fmtDate(val) : '없음'}`,
      date: ts, author: '팀장'
    }]
  });
};

window.updateDue = async (docId, memberId, val) => {
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  const ts = now();
  await fsUpd(memberId, docId, {
    due: val, updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'status',
      text: `마감일 변경: ${t.due ? fmtDate(t.due) : '없음'} → ${val ? fmtDate(val) : '없음'}`,
      date: ts, author: '팀장'
    }]
  });
};

window.addNote = async () => {
  const inp  = document.getElementById('noteInput');
  const text = inp.value.trim();
  if (!text || !selDocId || !selMId) return;
  const t = mData[selMId]?.tasks.find(t => t._id === selDocId);
  if (!t) return;
  const ts = now();
  inp.value = '';
  await fsUpd(selMId, selDocId, {
    updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'comment',
      text, date: ts, author: `${ME.displayName}(팀장)`
    }]
  });
};

window.deleteHistory = async (docId, memberId, histId) => {
  const t = mData[memberId]?.tasks.find(t => t._id === docId);
  if (!t) return;
  await fsUpd(memberId, docId, { history: (t.history || []).filter(h => h.id !== histId) });
};

// ════════════════════════════════════════════
// 모달 — 업무 추가 (팀원 탭에서)
// ════════════════════════════════════════════
window.openModal = () => {
  document.getElementById('modalMemberName').textContent = curTab;
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('iTitle').focus(), 80);
};
window.closeModal = () => {
  document.getElementById('overlay').classList.remove('show');
  ['iTitle', 'iDesc', 'iStart', 'iDue'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('iPriority').value = '3';
  document.getElementById('iReporter').value = '';
};

window.addTask = async () => {
  if (curTab === '__all__') return;
  const title = document.getElementById('iTitle').value.trim();
  if (!title) { toast('업무명을 입력해주세요'); return; }
  const btn = document.querySelector('#overlay .btn-ok');
  btn.disabled = true;
  btn.textContent = '추가 중...';
  try {
    const ts = now();
    await fsAdd(curTab, {
      title,
      desc:     document.getElementById('iDesc').value.trim(),
      assignee: '',
      startDate: document.getElementById('iStart').value || '',
    due:      document.getElementById('iDue').value || '',
      status:   'todo',
      updated:  ts,
      pinned:   false,
      order:    Date.now(),
      history:  [{ id: Date.now() + '', type: 'create', text: '업무가 등록되었습니다. (팀장)', date: ts, author: '팀장' }]
    });
    window.closeModal();
    toast(`${curTab}에게 업무를 추가했어요 ✓`);
  } catch (e) {
    toast('오류: ' + (e.code || e.message));
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '추가하기';
  }
};

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) window.closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') window.closeModal();
});
document.getElementById('addBtn')?.addEventListener('click', () => window.openModal());

// ════════════════════════════════════════════
// 상세 패널 리사이즈
// ════════════════════════════════════════════
(function initResizer() {
  const resizer = document.getElementById('resizer');
  const panel   = document.getElementById('detailPanel');
  let startX, startW;

  resizer.addEventListener('mousedown', e => {
    if (!panel.classList.contains('open')) return;
    startX = e.clientX;
    startW = panel.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const onMove = e => {
      panel.style.width = Math.min(560, Math.max(220, startW + (startX - e.clientX))) + 'px';
    };
    const onUp = () => {
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();


// 상세패널 팀원 표시
const origSelTask = window.selTask;
window.selTask = (docId, memberId) => {
  origSelTask(docId, memberId);
  const dpMember = document.getElementById('dpMember');
  if (dpMember) dpMember.textContent = memberId;
};
