<!DOCTYPE html>
<!--
  ⚽ 위닝일레븐 미니리그 관리앱
  Version: 1.0.0
  Date: 2026-03-31
  
  [기능 목록]
  - 리그 생성 / 목록 / 삭제
  - 참가 인원 3~8명, 라운드 1~10R 설정
  - 팀 중복 허용 / 불가 선택
  - 승점 동률 시 골득실 or 다득점 우선 선택
  - 라운드별 팀 선택 + 진행 중 팀명 수정
  - 팀명 미입력 시 토스트 알림 + 빨간 테두리
  - 홈/어웨이 랜덤 배정 (짝수 라운드 자동 반전)
  - 경기/매치 순서 랜덤
  - 스코어 입력 시 스크롤 위치 보존 (DOM in-place 업데이트)
  - 마지막 경기 입력 시 최종 결과 확인 모달
  - 순위표: 득 / 실 / 득실 / 승점 표시
  - 최종 결과: 트로피 애니메이션 + 컨페티 + 우승자 페이드인
  - localStorage 저장 (key: wl_v13)
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미니리그 v1.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body,#app{font-family:'Pretendard',sans-serif}
.screen{display:none}.screen.active{display:block}
:root{
  --blue:#3182F6;--blue-light:#EBF3FF;--blue-dark:#1B64DA;
  --green:#00B493;--green-light:#E6FAF6;
  --amber:#FF9500;--amber-light:#FFF4E0;
  --red:#F04452;--red-light:#FFF0F1;
  --surface:#F8F9FA;--card:#FFFFFF;
  --text1:#191F28;--text2:#8B95A1;--text3:#B0B8C1;
  --border:#E5E8EB;--radius:16px;--radius-sm:10px;
}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.t-head{font-size:22px;font-weight:700;color:var(--text1);letter-spacing:-0.5px}
.t-title{font-size:17px;font-weight:600;color:var(--text1);letter-spacing:-0.3px}
.t-sub{font-size:13px;color:var(--text2)}
.t-caption{font-size:12px;color:var(--text3)}
.btn-main{width:100%;padding:16px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-main:hover{opacity:0.88}
.btn-ghost{padding:8px 14px;background:transparent;color:var(--text2);border:none;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--radius-sm);font-family:inherit}
.btn-ghost:hover{background:var(--surface)}
.btn-outline{padding:10px 18px;background:transparent;color:var(--blue);border:1.5px solid var(--blue);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-outline:hover{background:var(--blue-light)}
.btn-danger-solid{padding:10px 18px;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm{padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm-gray{padding:7px 12px;background:var(--surface);color:var(--text2);border:0.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm-gray:hover{background:var(--blue-light);color:var(--blue);border-color:var(--blue)}
.input-field{width:100%;padding:14px 16px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--radius-sm);font-size:15px;color:var(--text1);font-family:inherit;outline:none}
.input-field:focus{border-color:var(--blue);background:var(--card)}
.input-field::placeholder{color:var(--text3)}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-blue{background:var(--blue-light);color:var(--blue-dark)}
.badge-green{background:var(--green-light);color:#007A65}
.badge-gray{background:var(--surface);color:var(--text2);border:0.5px solid var(--border)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 20px}
.tabs{display:flex;gap:0;margin-bottom:20px;background:var(--surface);border-radius:var(--radius-sm);padding:4px}
.tab{flex:1;padding:9px 0;text-align:center;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-radius:8px}
.tab.active{background:var(--card);color:var(--blue);font-weight:600;border:0.5px solid var(--border)}
.progress-wrap{margin-bottom:20px}
.progress-bar{height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width 0.4s}
.progress-row{display:flex;justify-content:space-between;margin-top:6px}
.league-row{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:0.5px solid var(--border)}
.league-row:last-child{border-bottom:none}
.league-row:hover{background:var(--surface)}
.league-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-new{background:#C9CDD2}.dot-active{background:var(--blue)}.dot-done{background:var(--green)}
.rank-table{width:100%;border-collapse:collapse;table-layout:fixed}
.rank-table th{font-size:11px;font-weight:500;color:var(--text2);text-align:center;padding:8px 2px;border-bottom:0.5px solid var(--border);white-space:nowrap}
.rank-table th:nth-child(1){width:32px}.rank-table th:nth-child(2){text-align:left;width:auto}
.rank-table th:nth-child(3){width:28px}.rank-table th:nth-child(4){width:28px}.rank-table th:nth-child(5){width:28px}.rank-table th:nth-child(6){width:28px}.rank-table th:nth-child(7){width:28px}.rank-table th:nth-child(8){width:28px}.rank-table th:nth-child(9){width:28px}.rank-table th:nth-child(10){width:36px}
.rank-table td{text-align:center;padding:10px 2px;border-bottom:0.5px solid var(--border);font-size:12px}
.rank-table td:nth-child(2){text-align:left}
.rank-table tr:last-child td{border-bottom:none}
.rank-num{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.r1{background:#FFF4E0;color:#B86A00}.r2{background:#F1EFE8;color:#5F5E5A}
.r3{background:#F5EBE0;color:#8B5E3C}.rX{background:var(--surface);color:var(--text2)}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.assign-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.assign-row:last-child{border-bottom:none}
.modal-wrap{min-height:200px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);border-radius:var(--radius);padding:16px}
.modal-box{background:var(--card);border-radius:var(--radius);padding:24px;width:100%;max-width:420px}
.section-label{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin:16px 0 8px}
.sel-grid{display:grid;gap:8px;margin-top:8px}
.sel-opt{padding:11px 0;text-align:center;background:var(--surface);border:1.5px solid transparent;border-radius:var(--radius-sm);font-size:14px;font-weight:600;color:var(--text2);cursor:pointer}
.sel-opt:hover{border-color:var(--blue);color:var(--blue)}
.sel-opt.sel{background:var(--blue-light);border-color:var(--blue);color:var(--blue-dark)}
.team-pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;margin:2px 2px 2px 0}
.banner-amber{background:var(--amber-light);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.round-divider{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
.round-divider span{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.round-divider::before,.round-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.set-block{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.set-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.set-header-left{font-size:15px;font-weight:700;color:var(--text1)}
.set-done{font-size:12px;font-weight:600;color:#007A65;background:var(--green-light);padding:3px 10px;border-radius:20px}
.set-locked-badge{font-size:12px;font-weight:600;color:var(--text2);background:var(--surface);border:0.5px solid var(--border);padding:3px 10px;border-radius:20px}
.match-wrap{padding:16px;border-bottom:0.5px solid var(--border)}
.match-wrap:last-child{border-bottom:none}
.match-wrap.locked{opacity:0.35;pointer-events:none}
.match-sub{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:10px}
.match-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.side-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.tag-home{background:var(--blue-light);color:var(--blue-dark)}
.tag-away{background:var(--surface);color:var(--text2);border:0.5px solid var(--border)}
.match-name-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px}
.home-name{font-size:15px;font-weight:700;color:var(--text1)}
.away-name{font-size:15px;font-weight:700;color:var(--text1);text-align:right}
.match-team-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
.home-team{font-size:12px;color:var(--text2)}
.away-team{font-size:12px;color:var(--text2);text-align:right}
.score-row{display:flex;align-items:center;gap:8px}
.score-input{flex:1;height:52px;text-align:center;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-size:22px;font-weight:700;color:var(--text1);font-family:'Pretendard',sans-serif;outline:none;-moz-appearance:textfield;min-width:0}
.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.score-input:focus{border-color:var(--blue);background:var(--card)}
.score-sep{font-size:20px;font-weight:700;color:var(--text3);flex-shrink:0}
.toggle-row{display:flex;gap:0;background:var(--surface);border-radius:var(--radius-sm);padding:4px;margin-top:8px}
.toggle-opt{flex:1;padding:11px 8px;text-align:center;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;line-height:1.3}
.toggle-opt.sel{background:var(--card);color:var(--blue);font-weight:600;border:0.5px solid var(--border)}
.opt-desc{margin-top:8px;padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500}
.desc-blue{background:var(--blue-light);color:var(--blue-dark)}
.desc-green{background:var(--green-light);color:#007A65}
.del-btn{width:32px;height:32px;border-radius:50%;background:transparent;border:0.5px solid var(--border);color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.del-btn:hover{background:var(--red-light);border-color:var(--red);color:var(--red)}
.league-clickable{cursor:pointer;flex:1;display:flex;align-items:center;gap:14px;min-width:0}
#screen-celebrate{background:var(--card)}
.celebrate-wrap{position:relative;overflow:hidden;min-height:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 32px;text-align:center}
.confetti-canvas{position:absolute;inset:0;pointer-events:none}
.trophy-anim{font-size:72px;animation:trophyBounce 0.7s cubic-bezier(.36,1.56,.64,1) forwards;opacity:0;margin-bottom:12px}
@keyframes trophyBounce{0%{transform:scale(0.3) translateY(40px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
.winner-label{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;opacity:0;animation:fadeUp 0.5s 0.5s forwards}
.winner-name-big{font-size:42px;font-weight:800;color:var(--text1);letter-spacing:-1px;line-height:1.1;opacity:0;animation:fadeUp 0.6s 0.7s forwards;margin-bottom:6px}
.winner-teams-txt{font-size:14px;color:var(--text2);opacity:0;animation:fadeUp 0.5s 0.9s forwards;margin-bottom:24px}
.celebrate-btn{opacity:0;animation:fadeUp 0.5s 1.1s forwards}
@keyframes fadeUp{0%{transform:translateY(16px);opacity:0}100%{transform:translateY(0);opacity:1}}
.score-summary-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border)}
.score-summary-row:last-child{border-bottom:none}
.ss-player{font-size:13px;font-weight:600;color:var(--text1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-player.right{text-align:right}
.ss-score{font-size:16px;font-weight:800;color:var(--text1);padding:0 12px;white-space:nowrap}
.ss-score span{color:var(--blue)}
.team-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.team-edit-input{flex:1;padding:9px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--text1);font-family:inherit;outline:none}
.team-edit-input:focus{border-color:var(--blue);background:var(--card)}
.team-edit-input.error{border-color:var(--red)}
</style>
</head>
<body>
<div style="padding:0.75rem 0.75rem" id="app">
<div class="screen active" id="screen-home">
  <div class="topbar"><div class="t-head">미니리그</div><button class="btn-sm" onclick="openCreateModal()">+ 새 리그</button></div>
  <div class="card" style="padding:0" id="league-list-wrap"><div id="league-list"></div></div>
  <div id="empty-state" style="display:none;text-align:center;padding:3rem 1rem">
    <div style="font-size:40px;margin-bottom:12px">⚽</div>
    <div class="t-title" style="margin-bottom:6px">아직 리그가 없어요</div>
    <div class="t-sub">새 리그 버튼으로 시작해보세요</div>
  </div>
</div>
<div class="screen" id="screen-setup">
  <div class="topbar"><button class="btn-ghost" onclick="goHome()">← 목록</button><div class="t-title" id="setup-title"></div><div style="width:48px"></div></div>
  <div class="section-label">참가 인원</div><div class="sel-grid" id="player-count-grid" style="grid-template-columns:repeat(6,1fr)"></div>
  <div class="section-label">참가자 이름</div><div class="card" style="padding:16px 20px;display:flex;flex-direction:column;gap:12px" id="player-inputs"></div>
  <div class="section-label">라운드 수</div><div class="sel-grid" id="round-grid" style="grid-template-columns:repeat(5,1fr)"></div>
  <div style="margin-top:10px;padding:12px 14px;background:var(--blue-light);border-radius:var(--radius-sm)"><span id="round-desc" style="font-size:13px;color:var(--blue-dark);font-weight:500"></span></div>
  <div class="section-label">라운드별 팀 중복</div>
  <div class="toggle-row">
    <div class="toggle-opt sel" id="dup-no" onclick="setDup(false)">중복 불가<br><span style="font-size:11px;font-weight:400">이전 라운드 팀 재사용 불가</span></div>
    <div class="toggle-opt" id="dup-yes" onclick="setDup(true)">중복 허용<br><span style="font-size:11px;font-weight:400">같은 팀을 다시 써도 됨</span></div>
  </div>
  <div class="opt-desc desc-blue" id="dup-desc">각 라운드마다 이전에 쓴 팀은 선택할 수 없어요</div>
  <div class="section-label">승점 동률 시 우선순위</div>
  <div class="toggle-row">
    <div class="toggle-opt sel" id="tb-gd" onclick="setTiebreak('gd')">골득실 우선<br><span style="font-size:11px;font-weight:400">득실차 → 다득점</span></div>
    <div class="toggle-opt" id="tb-gf" onclick="setTiebreak('gf')">다득점 우선<br><span style="font-size:11px;font-weight:400">총득점 → 득실차</span></div>
  </div>
  <div class="opt-desc desc-blue" id="tb-desc">승점 동률 → 골득실 → 다득점 순으로 순위를 결정해요</div>
  <div style="height:20px"></div>
  <button class="btn-main" onclick="goToTeamPick(1)">다음 · 1라운드 팀 선택 →</button>
</div>
<div class="screen" id="screen-teampick">
  <div class="topbar"><button class="btn-ghost" id="pick-back-btn">← 뒤로</button><div class="t-title" id="pick-screen-title"></div><div style="width:48px"></div></div>
  <div id="pick-content"></div><div style="height:8px"></div>
  <button class="btn-main" id="pick-confirm-btn" onclick="confirmTeamPick()" style="display:none">확인</button>
</div>
<div class="screen" id="screen-league">
  <div class="topbar"><button class="btn-ghost" onclick="goHome()">← 목록</button>
    <div style="text-align:center"><div class="t-title" id="league-title-label"></div><div class="t-caption" id="league-date-label"></div></div>
    <div style="width:48px"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="progress-row"><span class="t-caption" id="progress-text"></span><span style="font-size:12px;font-weight:600;color:var(--blue)" id="phase-label"></span></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('tab-fixtures')">경기 결과</div>
    <div class="tab" onclick="showTab('tab-standings')">순위표</div>
    <div class="tab" onclick="showTab('tab-teams')">팀 배정</div>
  </div>
  <div id="tab-fixtures"><div id="fixtures-list"></div></div>
  <div id="tab-standings" style="display:none">
    <div class="card" style="overflow-x:auto;padding:16px 12px"><table class="rank-table" id="standings-table"></table></div>
    <div class="t-caption" style="text-align:center;margin-top:4px" id="standings-rule-desc"></div>
  </div>
  <div id="tab-teams" style="display:none"><div id="team-assignment-view"></div></div>
</div>
<div class="screen" id="screen-celebrate">
  <canvas class="confetti-canvas" id="confetti-canvas"></canvas>
  <div class="celebrate-wrap">
    <div class="trophy-anim" id="cel-trophy">🏆</div>
    <div class="winner-label">우승</div>
    <div class="winner-name-big" id="cel-name"></div>
    <div class="winner-teams-txt" id="cel-teams"></div>
    <div class="celebrate-btn"><button class="btn-main" style="width:auto;padding:14px 32px" onclick="goToFinal()">최종 순위 보기 →</button></div>
  </div>
</div>
<div class="screen" id="screen-final">
  <div class="topbar"><button class="btn-ghost" onclick="goHome()">← 목록</button>
    <div style="text-align:center"><div class="t-title" id="final-title-label"></div><div class="t-caption" id="final-date-label"></div></div>
    <div style="width:48px"></div>
  </div>
  <div class="card" style="overflow-x:auto;padding:16px 12px"><table class="rank-table" id="final-table"></table></div>
  <div class="t-caption" style="text-align:center;margin-top:-4px;margin-bottom:12px" id="final-rule-desc"></div>
</div>
<div id="modal-area"></div>
</div>
<script>
var leagues=[];var currentLeagueId=null;var pickingRound=1;var currentTiebreak='gd';var currentAllowDup=false;
var AVCOLORS=['#3182F6','#00B493','#FF9500','#F04452','#7B61FF','#E91E8C','#00BCD4','#FF6B35'];
var PILL_COLORS=[{bg:'#EBF3FF',color:'#1B64DA'},{bg:'#E6FAF6',color:'#007A65'},{bg:'#FFF4E0',color:'#B86A00'},{bg:'#FFF0F1',color:'#C0392B'},{bg:'#F0EEFF',color:'#5B3FC8'},{bg:'#FFE8F5',color:'#A0266E'},{bg:'#E0F7FA',color:'#00838F'},{bg:'#FFF3EE',color:'#BF4A1A'},{bg:'#F3E5FF',color:'#6A1B9A'},{bg:'#E8F5E9',color:'#2E7D32'}];
try{leagues=JSON.parse(localStorage.getItem('wl_v13')||'[]');}catch(e){}
function save(){try{localStorage.setItem('wl_v13',JSON.stringify(leagues));}catch(e){}}
function getL(){for(var i=0;i<leagues.length;i++){if(leagues[i].id===currentLeagueId)return leagues[i];}return null;}

function launchConfetti(){var canvas=document.getElementById('confetti-canvas');if(!canvas)return;var W=canvas.offsetWidth||320;var H=canvas.offsetHeight||340;canvas.width=W;canvas.height=H;confettiParticles=[];for(var i=0;i<120;i++){confettiParticles.push({x:Math.random()*W,y:Math.random()*H*0.4-H*0.2,w:6+Math.random()*8,h:3+Math.random()*5,color:CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)],rot:Math.random()*360,vx:(Math.random()-0.5)*4,vy:1+Math.random()*4,vr:(Math.random()-0.5)*8,opacity:1});}if(confettiRaf)cancelAnimationFrame(confettiRaf);drawConfetti();}
function drawConfetti(){var canvas=document.getElementById('confetti-canvas');if(!canvas)return;var ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);var alive=false;for(var i=0;i<confettiParticles.length;i++){var p=confettiParticles[i];p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.07;if(p.y>canvas.height+20)p.opacity-=0.05;else alive=true;if(p.opacity<=0)continue;ctx.save();ctx.globalAlpha=Math.max(0,p.opacity);ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}if(alive)confettiRaf=requestAnimationFrame(drawConfetti);}

function buildBasePairs(n){var pairs=[];for(var i=0;i<n;i++)for(var j=i+1;j<n;j++)pairs.push([i,j]);return pairs;}
function buildSets(n){var allPairs=buildBasePairs(n);var sets=[];var used=[];for(var i=0;i<allPairs.length;i++)used.push(false);while(true){var setMatches=[];var inSet=[];for(var i=0;i<n;i++)inSet.push(false);var anyAdded=false;for(var i=0;i<allPairs.length;i++){if(used[i])continue;var h=allPairs[i][0],a=allPairs[i][1];if(!inSet[h]&&!inSet[a]){setMatches.push(allPairs[i]);inSet[h]=true;inSet[a]=true;used[i]=true;anyAdded=true;}}if(!anyAdded)break;sets.push(setMatches);}return sets;}
function generateFixtures(l){var n=l.players.length;var baseSets=buildSets(n);var r1Sets=shuffle(baseSets.map(function(set){return shuffle(set);}));var r1Fixtures=[];for(var si=0;si<r1Sets.length;si++){var matches=r1Sets[si];for(var mi=0;mi<matches.length;mi++){var flip=Math.random()<0.5;var p0=matches[mi][0],p1=matches[mi][1];r1Fixtures.push({home:flip?p1:p0,away:flip?p0:p1,setIdx:si});}}l.fixtures=[];l.sets=[];var fi=0;for(var r=1;r<=l.totalRounds;r++){var isFlipRound=(r%2===0);var setOrder=[];for(var si=0;si<r1Sets.length;si++)setOrder.push(si);setOrder=shuffle(setOrder);for(var soi=0;soi<setOrder.length;soi++){var si=setOrder[soi];var setInfo={round:r,setIdx:soi,fixtureIdxs:[]};var sf=[];for(var k=0;k<r1Fixtures.length;k++){if(r1Fixtures[k].setIdx===si)sf.push(r1Fixtures[k]);}sf=shuffle(sf);for(var mi=0;mi<sf.length;mi++){var h,a;if(isFlipRound){h=sf[mi].away;a=sf[mi].home;}else{h=sf[mi].home;a=sf[mi].away;}l.fixtures.push({home:h,away:a,round:r,setIdx:soi});setInfo.fixtureIdxs.push(fi);fi++;}l.sets.push(setInfo);}}}

function openLeague(){var l=getL();document.getElementById('league-title-label').textContent=l.name;document.getElementById('league-date-label').textContent=fmtDate(l.date);var tb=l.tiebreak||'gd';document.getElementById('standings-rule-desc').textContent=tb==='gd'?'승 3점 · 무 1점 · 패 0점 · 동률 시 골득실 → 다득점':'승 3점 · 무 1점 · 패 0점 · 동률 시 다득점 → 골득실';renderFixtures();renderStandings();renderTeams();updateProgress();showScreen('screen-league');showTab('tab-fixtures');}
function renderFixtures(){var l=getL();var cp=currentPlayableRound(l);var curR=cp.round;var needsPick=cp.needsPick;var h='';var lastRound=0;var sets=l.sets||[];if(needsPick&&curR<=l.totalRounds){h+='<div class="banner-amber"><div><div style="font-size:14px;font-weight:700;color:#B86A00">'+(curR>1?(curR-1)+'라운드 완료! ':'')+curR+'라운드 팀 선택 필요</div><div style="font-size:12px;color:#B86A00;margin-top:2px">팀을 선택해야 경기를 입력할 수 있어요</div></div><button class="btn-sm" style="background:var(--amber);flex-shrink:0" onclick="goToTeamPick('+curR+')">'+curR+'R 팀 선택</button></div>';}for(var si=0;si<sets.length;si++){var set=sets[si];var r=set.round;var gameNum=set.setIdx+1;if(r!==lastRound){var rPicked=!!l.teamPicks[r];var rFinished=roundDone(l,r);var rLabel=r+'라운드'+(rFinished?' · 완료':rPicked?' · 진행중':' · 팀 미선택');h+='<div class="round-divider"><span>'+rLabel+'</span></div>';lastRound=r;}var hasPick=!!l.teamPicks[r];var locked=!hasPick||(r>curR)||(r===curR&&needsPick);var allDone=true;for(var mi=0;mi<set.fixtureIdxs.length;mi++){var fi=set.fixtureIdxs[mi];if(!l.results[getKey(fi)]||l.results[getKey(fi)].hg===undefined){allDone=false;break;}}var headerRight='';if(allDone)headerRight='<span class="set-done" data-si="'+si+'">✓ 완료</span>';else if(locked)headerRight='<span class="set-locked-badge" data-si="'+si+'">팀 선택 후 입력</span>';else headerRight='<span data-si="'+si+'" style="font-size:12px;font-weight:600;color:var(--blue)">결과 입력</span>';h+='<div class="set-block" data-si="'+si+'"><div class="set-header"><span class="set-header-left">'+gameNum+'경기</span>'+headerRight+'</div>';for(var mi=0;mi<set.fixtureIdxs.length;mi++){var fi=set.fixtureIdxs[mi];var f=l.fixtures[fi];var res=l.results[getKey(fi)]||{};var done=res.hg!==undefined&&res.ag!==undefined;var hTeam=hasPick?getTeam(l,f.home,r):'?';var aTeam=hasPick?getTeam(l,f.away,r):'?';var hVal=res.hg!==undefined?String(res.hg):'';var aVal=res.ag!==undefined?String(res.ag):'';var hName=l.players[f.home].name;var aName=l.players[f.away].name;var dis=(locked&&!done)?'disabled':'';var subLabel=set.fixtureIdxs.length>1?'매치 '+(mi+1):'';h+='<div class="match-wrap'+(locked&&!done?' locked':'')+'" data-fi="'+fi+'">'+(subLabel?'<div class="match-sub">'+subLabel+'</div>':'')+'<div class="match-top-row"><span class="side-tag tag-home">홈</span><span class="side-tag tag-away">어웨이</span></div><div class="match-name-row"><span class="home-name">'+hName+'</span><span class="away-name">'+aName+'</span></div><div class="match-team-row"><span class="home-team">'+hTeam+'</span><span class="away-team">'+aTeam+'</span></div><div class="score-row"><input type="number" min="0" class="score-input" id="hg'+fi+'" value="'+hVal+'" inputmode="numeric" pattern="[0-9]*" oninput="saveResult('+fi+')" onchange="saveResult('+fi+')" onblur="saveResult('+fi+')" '+dis+'><span class="score-sep">:</span><input type="number" min="0" class="score-input" id="ag'+fi+'" value="'+aVal+'" inputmode="numeric" pattern="[0-9]*" oninput="saveResult('+fi+')" onchange="saveResult('+fi+')" onblur="saveResult('+fi+')" '+dis+'></div></div>';}h+='</div>';}document.getElementById('fixtures-list').innerHTML=h;}
function saveResult(i){var l=getL();var hEl=document.getElementById('hg'+i);var aEl=document.getElementById('ag'+i);if(!hEl||!aEl)return;var hv=hEl.value;var av=aEl.value;if(hv===''||av==='')return;var hg=parseInt(hv),ag=parseInt(av);if(isNaN(hg)||isNaN(ag)||hg<0||ag<0)return;l.results[getKey(i)]={hg:hg,ag:ag};save();var sets=l.sets||[];var cp=currentPlayableRound(l);var curR=cp.round;var needsPick=cp.needsPick;for(var si=0;si<sets.length;si++){var set=sets[si];if(set.fixtureIdxs.indexOf(i)<0)continue;var allDone=true;for(var mi=0;mi<set.fixtureIdxs.length;mi++){var fi=set.fixtureIdxs[mi];if(!l.results[getKey(fi)]||l.results[getKey(fi)].hg===undefined){allDone=false;break;}}var block=document.querySelector('.set-block[data-si="'+si+'"]');if(block){var hdr=block.querySelector('.set-header>span:last-child');if(hdr){if(allDone){hdr.className='set-done';hdr.removeAttribute('style');hdr.textContent='✓ 완료';}else{hdr.className='';hdr.style.cssText='font-size:12px;font-weight:600;color:var(--blue)';hdr.textContent='결과 입력';}}}break;}renderStandings();updateProgress();var allDoneAll=l.fixtures.every(function(_,idx){var r=l.results[getKey(idx)];return r&&r.hg!==undefined&&r.ag!==undefined;});if(allDoneAll){setTimeout(showFinalConfirmModal,300);}}
function calcStandings(l){var s=[];for(var i=0;i<l.players.length;i++)s.push({idx:i,w:0,d:0,l:0,gf:0,ga:0,pts:0,played:0});for(var i=0;i<l.fixtures.length;i++){var f=l.fixtures[i];var r=l.results[getKey(i)];if(!r)continue;var h=s[f.home],a=s[f.away];h.gf+=r.hg;h.ga+=r.ag;h.played++;a.gf+=r.ag;a.ga+=r.hg;a.played++;if(r.hg>r.ag){h.w++;h.pts+=3;a.l++;}else if(r.hg<r.ag){a.w++;a.pts+=3;h.l++;}else{h.d++;h.pts++;a.d++;a.pts++;}}var tb=l.tiebreak||'gd';s.sort(function(a,b){if(b.pts!==a.pts)return b.pts-a.pts;if(tb==='gd'){var gdA=a.gf-a.ga,gdB=b.gf-b.ga;if(gdB!==gdA)return gdB-gdA;return b.gf-a.gf;}else{if(b.gf!==a.gf)return b.gf-a.gf;return(b.gf-b.ga)-(a.gf-a.ga);}});return s;}
function rankClass(rank){return rank===0?'r1':rank===1?'r2':rank===2?'r3':'rX';}
function buildStandingsTable(l,s){var h='<tr><th>#</th><th style="text-align:left">이름</th><th>경기</th><th>승</th><th>무</th><th>패</th><th>득</th><th>실</th><th>득실</th><th>승점</th></tr>';for(var rank=0;rank<s.length;rank++){var p=s[rank];var gd=p.gf-p.ga;var pl=l.players[p.idx];var pills='';var teams=pl.teams||[];for(var ri=0;ri<teams.length;ri++)pills+='<span class="team-pill" style="background:'+PILL_COLORS[ri].bg+';color:'+PILL_COLORS[ri].color+'">'+teams[ri]+'</span>';var gdColor=gd>0?'var(--blue)':gd<0?'var(--red)':'var(--text2)';h+='<tr><td><span class="rank-num '+rankClass(rank)+'">'+(rank+1)+'</span></td><td><div style="font-size:12px;font-weight:600">'+pl.name+'</div><div style="margin-top:2px">'+pills+'</div></td><td>'+p.played+'</td><td>'+p.w+'</td><td>'+p.d+'</td><td>'+p.l+'</td><td style="color:var(--blue);font-weight:600">'+p.gf+'</td><td style="color:var(--red);font-weight:600">'+p.ga+'</td><td style="font-weight:600;color:'+gdColor+'">'+(gd>0?'+':'')+gd+'</td><td style="font-size:14px;font-weight:700;color:var(--blue)">'+p.pts+'</td></tr>';}return h;}
function renderStandings(){var l=getL();document.getElementById('standings-table').innerHTML=buildStandingsTable(l,calcStandings(l));}
function renderTeams(){var l=getL();var h='<div class="card" style="padding:16px 20px">';for(var r=1;r<=l.totalRounds;r++){var picks=l.teamPicks[r];h+='<div style="margin-bottom:'+(r<l.totalRounds?'20px':'0')+'px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:13px;font-weight:700;color:var(--text1)">'+r+'라운드 팀 배정</div>'+(picks?'<button class="btn-sm-gray" onclick="openTeamEditModal('+r+')">수정</button>':'<span class="t-caption">미선택</span>')+'</div>';for(var i=0;i<l.players.length;i++){var p=l.players[i];var team=picks?picks[i]:'—';h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)"><div class="avatar" style="background:'+AVCOLORS[i]+'22;color:'+AVCOLORS[i]+';width:28px;height:28px;font-size:11px">'+p.name[0]+'</div><div style="flex:1;font-size:13px;font-weight:600;color:var(--text1)">'+p.name+'</div><div style="font-size:13px;color:'+(picks?'var(--text1)':'var(--text3)')+'">'+team+'</div></div>';}h+='</div>';if(r<l.totalRounds)h+='<div style="height:1px;background:var(--border);margin-bottom:20px"></div>';}h+='</div>';document.getElementById('team-assignment-view').innerHTML=h;}
function updateProgress(){var l=getL();var done=Object.keys(l.results).length,total=l.fixtures.length;document.getElementById('progress').style.width=Math.round(done/total*100)+'%';document.getElementById('progress-text').textContent=done+' / '+total+' 매치 완료';var curR=currentPlayableRound(l).round;document.getElementById('phase-label').textContent=done===total?'완료':curR+'라운드 진행중';}
function showCelebrate(){var l=getL();var s=calcStandings(l);var winner=l.players[s[0].idx];document.getElementById('cel-name').textContent=winner.name;var wt=winner.teams||[];var wtStr='';for(var i=0;i<wt.length;i++)wtStr+=(i>0?' · ':'')+(i+1)+'R: '+wt[i];document.getElementById('cel-teams').textContent=wtStr;showScreen('screen-celebrate');var trophy=document.getElementById('cel-trophy');trophy.style.animation='none';trophy.offsetHeight;trophy.style.animation='';setTimeout(launchConfetti,300);}
function goToFinal(){if(confettiRaf){cancelAnimationFrame(confettiRaf);confettiRaf=null;}var l=getL();var s=calcStandings(l);var tb=l.tiebreak||'gd';document.getElementById('final-title-label').textContent=l.name;document.getElementById('final-date-label').textContent=fmtDate(l.date);document.getElementById('final-rule-desc').textContent=tb==='gd'?'승 3점 · 무 1점 · 패 0점 · 동률 시 골득실 → 다득점':'승 3점 · 무 1점 · 패 0점 · 동률 시 다득점 → 골득실';document.getElementById('final-table').innerHTML=buildStandingsTable(l,s);showScreen('screen-final');}
function showFinal(){var l=getL();var s=calcStandings(l);var tb=l.tiebreak||'gd';document.getElementById('final-title-label').textContent=l.name;document.getElementById('final-date-label').textContent=fmtDate(l.date);document.getElementById('final-rule-desc').textContent=tb==='gd'?'승 3점 · 무 1점 · 패 0점 · 동률 시 골득실 → 다득점':'승 3점 · 무 1점 · 패 0점 · 동률 시 다득점 → 골득실';document.getElementById('final-table').innerHTML=buildStandingsTable(l,s);showScreen('screen-final');}
function renderLeagueList(){var list=document.getElementById('league-list');var empty=document.getElementById('empty-state');var wrap=document.getElementById('league-list-wrap');if(!leagues.length){wrap.style.display='none';empty.style.display='block';return;}wrap.style.display='block';empty.style.display='none';list.innerHTML='';for(var idx=0;idx<leagues.length;idx++){var l=leagues[idx];var sm={new:['dot-new','badge-gray','대기중'],active:['dot-active','badge-blue','진행중'],done:['dot-done','badge-green','완료']};var info=sm[l.status]||sm['new'];var done=Object.keys(l.results||{}).length,total=(l.fixtures||[]).length;var n=l.playerCount||l.players.length||4;var tbLabel=l.tiebreak==='gf'?'다득점 우선':'골득실 우선';var dupLabel=l.allowDup?'팀 중복 허용':'팀 중복 불가';var row=document.createElement('div');row.className='league-row';var clickable=document.createElement('div');clickable.className='league-clickable';clickable.onclick=(function(id){return function(){enterLeague(id);};})(l.id);var dot=document.createElement('div');dot.className='league-dot '+info[0];var info_div=document.createElement('div');info_div.style.cssText='flex:1;min-width:0';var nameDiv=document.createElement('div');nameDiv.style.cssText='font-size:15px;font-weight:600;color:var(--text1)';nameDiv.textContent=l.name;var metaDiv=document.createElement('div');metaDiv.className='t-caption';metaDiv.style.marginTop='2px';var names='';if(l.players&&l.players.length){for(var i=0;i<l.players.length;i++)names+=(i>0?', ':'')+l.players[i].name;}metaDiv.textContent=fmtDate(l.date)+' · '+n+'명 · '+(l.totalRounds||2)+'라운드 · '+dupLabel+' · '+tbLabel+(total?' · '+done+'/'+total+'매치':'')+(names?' · '+names:'');var badge=document.createElement('span');badge.className='badge '+info[1];badge.textContent=info[2];info_div.appendChild(nameDiv);info_div.appendChild(metaDiv);clickable.appendChild(dot);clickable.appendChild(info_div);clickable.appendChild(badge);var delBtn=document.createElement('button');delBtn.className='del-btn';delBtn.textContent='✕';delBtn.title='삭제';delBtn.onclick=(function(id){return function(e){e.stopPropagation();confirmDelete(id);};})(l.id);row.appendChild(clickable);row.appendChild(delBtn);list.appendChild(row);}}
function enterLeague(id){currentLeagueId=id;var l=getL();if(l.status==='new')openSetup();else if(l.status==='done')showFinal();else openLeague();}
function goHome(){if(confettiRaf){cancelAnimationFrame(confettiRaf);confettiRaf=null;}renderLeagueList();showScreen('screen-home');}
function showTab(id){var tabs=['tab-fixtures','tab-standings','tab-teams'];for(var i=0;i<tabs.length;i++)document.getElementById(tabs[i]).style.display=tabs[i]===id?'block':'none';var els=document.querySelectorAll('.tab');for(var i=0;i<els.length;i++)els[i].classList.toggle('active',tabs[i]===id);}
function showScreen(id){var screens=document.querySelectorAll('.screen');for(var i=0;i<screens.length;i++)screens[i].classList.remove('active');document.getElementById(id).classList.add('active');}
renderLeagueList();
</script>
