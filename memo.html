<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="GZ기획팀" />
<meta name="theme-color" content="#185FA5" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>회의 메모장</title>
<style>
/* ── Reset & 변수 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ee;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a8a8a8;
  --border:#e5e5e3;--border2:#d0d0cc;
  --radius:10px;--radius-sm:6px;--pill:999px;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --green:#639922;--green-bg:#EAF3DE;--green-t:#27500A;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-t:#791F1F;
  --orange:#EF9F27;
  --purple-bg:#EEEDFE;--purple-t:#3C3489;
  --sw:220px;
}

/* ── 앱 레이아웃 ── */
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}

/* ── 사이드바 ── */
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:300;transition:transform .25s ease}
.sb-brand{padding:20px 16px 16px;border-bottom:0.5px solid var(--bg3)}
.sb-brand-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.sb-brand-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--bg3)}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--bg);flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:500;color:var(--text)}
.sb-user-role{font-size:11px;color:var(--text3)}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-sec{padding:4px 16px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;margin:1px 8px;border-radius:var(--radius-sm);transition:background .12s}
.sb-item:hover{background:var(--bg2)}
.sb-item.active{background:var(--bg3)}
.sb-item.active .sb-label,.sb-item.active .sb-icon{color:var(--text);font-weight:500}
.sb-icon{font-size:14px;width:20px;text-align:center;color:var(--text2);flex-shrink:0}
.sb-label{font-size:13px;color:var(--text2);flex:1}
.sb-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:var(--pill);background:var(--red-bg);color:var(--red)}
.sb-bottom{padding:12px 16px;border-top:0.5px solid var(--bg3);display:flex;flex-direction:column;gap:8px}
.sb-sync{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--orange);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 메인 ── */
.main-wrap{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── 탑바 ── */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0}
.page-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;gap:8px;align-items:center}

/* ── 햄버거 버튼 (모바일) ── */
.hamburger{display:none;width:36px;height:36px;border:none;background:transparent;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:4px;border-radius:var(--radius-sm);flex-shrink:0}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px;transition:all .2s}
.hamburger:hover{background:var(--bg2)}

/* ── 모바일 딤 ── */
.sidebar-dim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:290}
.sidebar-dim.show{display:block}

/* ── 공통 버튼 ── */
.btn-ghost{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-solid{padding:6px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;background:var(--text);color:var(--bg);cursor:pointer}
.btn-solid:hover{opacity:.82}

/* ── 모달/오버레이 ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:400;padding:1rem}
.overlay.show{display:flex}
.modal{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:1.5rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{padding:7px 16px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer}
.btn-ok{padding:7px 18px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.btn-danger{padding:7px 16px;font-size:12px;border:none;border-radius:var(--radius-sm);background:var(--red);color:#fff;cursor:pointer;margin-right:auto}
.fg{margin-bottom:1rem}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--border2)}

/* ── 토스트 ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);font-size:12px;font-weight:500;padding:8px 18px;border-radius:var(--pill);opacity:0;transition:all .25s;pointer-events:none;z-index:500;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 통계 ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:24px;font-weight:600;color:var(--text);line-height:1}
.stat-value.warn{color:#BA7517}.stat-value.danger{color:var(--red)}

/* ── 필터 ── */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.chip{padding:5px 14px;border-radius:var(--pill);font-size:12px;border:0.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--border2);color:var(--text)}.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ── 업무 카드 ── */
.task-list{display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.task-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s;position:relative}
.task-card:hover{border-color:var(--border2)}.task-card.selected{border-color:var(--text)}
.task-card.pinned{border-left:3px solid var(--blue)}.task-card.overdue{border-left:3px solid var(--red)}.task-card.stale{border-left:3px solid var(--orange)}
.task-card.dragging-card{opacity:.4}.task-card.drag-over-card{border-top:2px solid var(--blue)}
.priority-bar{width:3px;border-radius:var(--pill);align-self:stretch;flex-shrink:0;min-height:32px}
.drag-handle{color:var(--text3);font-size:14px;cursor:grab;user-select:none;flex-shrink:0}
.task-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.task-check:hover{border-color:var(--text)}.task-check.done{background:var(--text);border-color:var(--text)}
.task-check.done::after{content:'';width:5px;height:3px;border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600}
.badge-todo{background:var(--blue-bg);color:var(--blue-t)}.badge-inprogress{background:var(--amber-bg);color:var(--amber-t)}.badge-done{background:var(--green-bg);color:var(--green-t)}
.badge-status{cursor:pointer;user-select:none}.badge-status:hover{opacity:.75}
.badge-reporter{background:var(--purple-bg);color:var(--purple-t)}
.member-badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;background:var(--bg3);color:var(--text2)}
.task-date{font-size:11px;color:var(--text3)}.task-date.ov{color:var(--red);font-weight:600}
.card-right{position:absolute;top:10px;right:12px;display:flex;gap:4px;align-items:center}
.pin-btn,.del-btn{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.pin-btn:hover{background:var(--bg3);color:var(--text)}.pin-btn.on{color:var(--blue)}.del-btn:hover{background:var(--red-bg);color:var(--red)}
.priority-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block}
.priority-badge.p1{background:#f0f0ee;color:#888}.priority-badge.p2{background:var(--blue-bg);color:var(--blue-t)}
.priority-badge.p3{background:var(--amber-bg);color:var(--amber-t)}.priority-badge.p4{background:var(--red-bg);color:var(--red)}.priority-badge.p5{background:var(--red);color:#fff}
.reporter-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block;background:var(--purple-bg);color:var(--purple-t)}

/* ── 상세 패널 ── */
.resizer{width:12px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center}
.resizer::after{content:'';width:3px;height:30px;background:var(--border);border-radius:var(--pill)}
.resizer:hover::after{background:var(--border2);height:46px}
.detail-panel{width:300px;min-width:240px;flex-shrink:0;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);display:none;position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto}
.detail-panel.open{display:block}
.dp-head{padding:14px 16px;border-bottom:0.5px solid var(--bg3);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;position:sticky;top:0;background:var(--bg);z-index:1}
.dp-member{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:3px}
.dp-title-input{font-size:14px;font-weight:500;border:none;background:transparent;color:var(--text);font-family:inherit;padding:2px 4px;border-radius:4px;border:0.5px solid transparent;outline:none;width:100%;line-height:1.45}
.dp-title-input:hover{border-color:var(--border);background:var(--bg2)}.dp-title-input:focus{border-color:var(--border2);background:var(--bg2)}
.dp-close{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.dp-close:hover{background:var(--bg2);color:var(--text)}
.dp-meta{padding:10px 16px;display:flex;flex-direction:column}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--bg3)}
.dp-row:last-child{border-bottom:none}
.dp-lbl{font-size:11px;color:var(--text3)}.dp-val{font-size:12px;font-weight:500;color:var(--text)}
.dp-edit{font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text);font-family:inherit;padding:2px 5px;border-radius:4px;border:0.5px solid transparent;outline:none;width:150px;text-align:right}
.dp-edit:hover{border-color:var(--border);background:var(--bg2)}.dp-edit:focus{border-color:var(--border2);background:var(--bg2)}
.dp-sec{font-size:10px;font-weight:600;color:var(--text3);padding:12px 16px 6px;letter-spacing:.06em;text-transform:uppercase}
.progress-wrap{padding:0 16px 12px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:var(--pill);background:var(--text)}
.progress-bar-fill.done-bar{background:var(--green)}.progress-bar-fill.over-bar{background:var(--red)}
.timeline{padding:0 16px 12px;display:flex;flex-direction:column}
.tl-item{display:flex;gap:8px;position:relative}
.tl-line{position:absolute;left:5px;top:13px;bottom:-2px;width:1px;background:var(--border)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);background:var(--bg);position:relative;z-index:1}
.tl-dot.create{background:var(--blue);border-color:var(--blue)}.tl-dot.status{background:var(--orange);border-color:var(--orange)}.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-body{flex:1;padding-bottom:12px;min-width:0}
.tl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.tl-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;flex-shrink:0;opacity:0;display:flex;align-items:center;justify-content:center}
.tl-item:hover .tl-del{opacity:1}.tl-del:hover{background:var(--red-bg);color:var(--red)}
.tl-author{font-size:10px;font-weight:600;padding:1px 5px;border-radius:var(--pill);background:var(--purple-bg);color:var(--purple-t);margin-right:4px}
.tl-text{font-size:12px;line-height:1.5;color:var(--text2)}.tl-date{font-size:10px;color:var(--text3);margin-top:2px}
.dp-note{padding:12px 16px}
.note-input{width:100%;padding:8px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;resize:none;height:58px}
.note-input:focus{outline:none;border-color:var(--border2)}
.note-submit{width:100%;margin-top:6px;padding:7px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.note-submit:hover{opacity:.82}
.divider{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;padding:4px 0 6px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex}
  .main-wrap{margin-left:0}
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-panel{position:fixed;inset:0;width:100%;max-width:100%;border-radius:0;z-index:350;max-height:100vh;overflow-y:auto}
  .resizer{display:none}
  .topbar{padding:0 16px}
}

/* ── 터치 이벤트 지원 ── */
button, [onclick], [data-nav], .sb-item, .task-card, .chip {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

</style>
</head>
<body>
<!-- 모바일 딤 -->
<div class="sidebar-dim" id="sidebarDim"></div>
<div class="app">
<div class="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">GZ Plan</div><div class="sb-brand-sub">경영기획팀</div></div>
  <div class="sb-user">
    <div class="sb-avatar" id="sbAvatar">--</div>
    <div><div class="sb-user-name" id="sbUserName"></div><div class="sb-user-role" id="sbUserRole"></div></div>
  </div>
  <div class="sb-nav" id="sbNav">
    <div class="sb-sec">업무</div>
    <div class="sb-item" data-nav="member.html" id="sbTaskItem"><div class="sb-icon">☐</div><div class="sb-label" id="sbTaskLabel">내 업무</div></div>
    <div class="sb-sec">도구</div>
    <div class="sb-item" data-nav="calendar.html"><div class="sb-icon">▦</div><div class="sb-label">캘린더</div></div>
    <div class="sb-item" data-nav="meeting.html"><div class="sb-icon">◈</div><div class="sb-label">회의록</div></div>
    <div class="sb-item active" data-nav="memo.html"><div class="sb-icon">◉</div><div class="sb-label">메모장</div></div>
  </div>
  <div class="sb-bottom">
    <div class="sb-sync" style="display:none"></div>
    <button class="btn-ghost" id="logoutBtn" style="width:100%;font-size:11px;padding:5px">로그아웃</button>
  </div>
</div>
<div class="main-wrap">

<div class="header">
  <button class="hamburger" id="hamburgerBtn" aria-label="메뉴"><span></span><span></span><span></span></button>
  <div class="header-left">
    <h1>메모장</h1>
    <p><span class="sync-dot" id="syncDot"></span>실시간 저장</p>
  </div>
  <div class="header-right">
    
    <button class="icon-btn" onclick="exportMemos()">&#8593; 내보내기</button>

  </div>
</div>
<div class="app">
  <div class="input-card">
    <textarea id="memoInput" placeholder="회의 내용, 메모, 아이디어를 자유롭게 적어주세요&#10;#태그 로 분류할 수 있어요 (예: #업무 #회의 #아이디어)"></textarea>
    <div class="quick-tags" id="quickTags"></div>
    <div class="input-bottom">
      <button class="tag-setting-btn" onclick="openTagSetting()">⚙ 태그 설정</button>
      <button class="save-btn" onclick="saveMemo()">저장</button>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" id="searchInput" placeholder="&#128269; 검색..." oninput="render()"/>
    <button class="clear-btn" onclick="clearSearch()">초기화</button>
  </div>
  <div class="tag-chips" id="tagChips"></div>
  <div style="margin-bottom:1rem"></div>
  <div class="stats-bar" id="statsBar"></div>
  <div id="memoList"></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>메모 수정</h3>
    <textarea id="editInput"></textarea>
    <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-ok" onclick="saveEdit()">저장</button></div>
  </div>
</div>
<div class="overlay" id="tagSettingOverlay">
  <div class="modal">
    <h3>기본 태그 설정</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6">메모 작성 시 버튼 한 번으로 추가할 태그를 설정해요.<br>쉼표(,)로 구분해서 입력해주세요.</p>
    <div class="fg"><label>기본 태그 목록</label><input id="tagSettingInput" placeholder="예: #회의, #업무, #아이디어, #공지" /></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeTagSetting()">취소</button>
      <button class="btn-ok" onclick="saveTagSetting()">저장</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

</div>
</div>
<script>
(function() {
  var sess = localStorage.getItem('tt_user');
  if (!sess) { location.href = 'index.html'; return; }
  var u;
  try { u = JSON.parse(sess); } catch(e) { localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html'; return; }
  if (!u || !u.id || !u.role) { localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html'; return; }
  var isMgr = u.role === 'manager' || u.role === 'admin';
  var av = document.getElementById('sbAvatar');
  var nm = document.getElementById('sbUserName');
  var rl = document.getElementById('sbUserRole');
  if (av) av.textContent = (u.displayName||'--').slice(0,2);
  if (nm) nm.textContent = u.displayName||'';
  if (rl) rl.textContent = isMgr ? '팀장' : '팀원';
  var taskItem = document.getElementById('sbTaskItem');
  var taskLabel = document.getElementById('sbTaskLabel');
  if (taskItem && isMgr) taskItem.dataset.nav = 'manager.html';
  if (taskLabel && isMgr) taskLabel.textContent = '팀 업무 현황';
  if (u.role === 'admin' && !document.querySelector('[data-nav="admin.html"]')) {
    var nav = document.getElementById('sbNav');
    if (nav) {
      var sec = document.createElement('div'); sec.className='sb-sec'; sec.textContent='관리';
      var item = document.createElement('div'); item.className='sb-item'; item.dataset.nav='admin.html';
      item.innerHTML='<div class="sb-icon">◯</div><div class="sb-label">계정 관리</div>';
      item.addEventListener('click', function() { location.href = 'admin.html'; });
      nav.appendChild(sec); nav.appendChild(item);
    }
  }
  document.getElementById('logoutBtn').onclick = function() {
    localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html';
  };
  document.querySelectorAll('[data-nav]').forEach(function(el) {
    el.addEventListener('click', function() { location.href = el.dataset.nav; });
  });
})();


// ── 모바일 햄버거 ──
(function() {
  function openSB() {
    var s = document.querySelector('.sidebar');
    var d = document.getElementById('sidebarDim');
    if (s) s.classList.add('open');
    if (d) d.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeSB() {
    var s = document.querySelector('.sidebar');
    var d = document.getElementById('sidebarDim');
    if (s) s.classList.remove('open');
    if (d) d.classList.remove('show');
    document.body.style.overflow = '';
  }
  var hb = document.getElementById('hamburgerBtn');
  var dim = document.getElementById('sidebarDim');
  if (hb) { hb.onclick = openSB; }
  if (dim) { dim.onclick = closeSB; }
  // 사이드바 nav 클릭시 닫기
  document.querySelectorAll('.sidebar [data-nav]').forEach(function(el) {
    el.addEventListener('click', closeSB);
  });
  // window에 노출 (외부에서 호출 가능)
  window.openSidebar = openSB;
  window.closeSidebar = closeSB;
})();


</script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,deleteDoc,serverTimestamp,query,orderBy}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const C={apiKey:"AIzaSyA7KylsSyT3_0oQvhBtcrPc-gcdfVq90IQ",authDomain:"gzplan.firebaseapp.com",projectId:"gzplan",storageBucket:"gzplan.firebasestorage.app",messagingSenderId:"186255862586",appId:"1:186255862586:web:f36d21f76012ca43b8fe03"};
const db=getFirestore(initializeApp(C));
const sess=localStorage.getItem('tt_user');
if(!sess)location.href='index.html';
const ME=JSON.parse(sess||'{}');
document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>location.href=el.dataset.nav));
// 모든 역할 접근 가능 (팀원 개인별 메모)
let memos=[],activeTag=null,editingId=null;
const mRef=()=>collection(db,'memos',ME.id,'items');
const mDoc=id=>doc(db,'memos',ME.id,'items',id);
const nStr=()=>new Date().toISOString();
const fmtDate=s=>{const d=new Date(s),days=['일','월','화','수','목','금','토'];return d.getFullYear()+'. '+(d.getMonth()+1)+'. '+d.getDate()+'. ('+days[d.getDay()]+')';};
const fmtTime=s=>{const d=new Date(s);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
const dateKey=s=>new Date(s).toISOString().split('T')[0];
const exTags=t=>[...new Set((t.match(/#[\w가-힣]+/g)||[]))];
const setSync=v=>document.getElementById('syncDot').classList.toggle('syncing',v);
const toast=m=>{const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);};
function hlText(text,search){
  let h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/(#[\w가-힣]+)/g,`<span class="hashtag" onclick="filterTag('$1')">$1</span>`);
  if(search){const e=search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');h=h.replace(new RegExp(`(${e})`,'gi'),'<mark style="background:#FFF3CD;border-radius:2px;">$1</mark>');}
  return h;
}
onSnapshot(query(mRef(),orderBy('createdAt','desc')),snap=>{memos=snap.docs.map(d=>({_id:d.id,...d.data()}));render();setSync(false);});
// 기본 태그 설정
const DEFAULT_TAGS_KEY='gz_default_tags';
let defaultTags=JSON.parse(localStorage.getItem(DEFAULT_TAGS_KEY)||'["#회의","#업무","#아이디어"]');
function renderQuickTags(){
  document.getElementById('quickTags').innerHTML=defaultTags.map(t=>`<button class="quick-tag-btn" onclick="insertTag('${t}')">${t}</button>`).join('');
}
window.insertTag=tag=>{
  const el=document.getElementById('memoInput');
  const v=el.value;
  const needSpace=v.length>0&&!v.endsWith(' ')&&!v.endsWith('\n');
  el.value=(needSpace?v+' ':v)+tag+' ';
  el.focus();
};
window.openTagSetting=()=>{
  document.getElementById('tagSettingInput').value=defaultTags.join(', ');
  document.getElementById('tagSettingOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('tagSettingInput').focus(),80);
};
window.closeTagSetting=()=>document.getElementById('tagSettingOverlay').classList.remove('show');
window.saveTagSetting=()=>{
  const val=document.getElementById('tagSettingInput').value;
  defaultTags=val.split(',').map(t=>t.trim()).filter(t=>t).map(t=>t.startsWith('#')?t:'#'+t);
  localStorage.setItem(DEFAULT_TAGS_KEY,JSON.stringify(defaultTags));
  renderQuickTags();
  closeTagSetting();
  toast('태그 설정을 저장했어요 ✓');
};
renderQuickTags();
window.saveMemo=async()=>{const text=document.getElementById('memoInput').value.trim();if(!text)return;setSync(true);await addDoc(mRef(),{text,date:nStr(),tags:exTags(text),author:ME.displayName,createdAt:serverTimestamp()});document.getElementById('memoInput').value='';toast('저장됐어요 ✓');};
window.editMemo=id=>{const m=memos.find(m=>m._id===id);if(!m)return;editingId=id;document.getElementById('editInput').value=m.text;document.getElementById('overlay').classList.add('show');setTimeout(()=>document.getElementById('editInput').focus(),100);};
window.saveEdit=async()=>{const text=document.getElementById('editInput').value.trim();if(!text)return;setSync(true);await updateDoc(mDoc(editingId),{text,tags:exTags(text),edited:nStr()});closeModal();toast('수정됐어요 ✓');};
window.deleteMemo=async id=>{if(!confirm('이 메모를 삭제할까요?'))return;setSync(true);await deleteDoc(mDoc(id));toast('삭제됐어요');};
window.closeModal=()=>{document.getElementById('overlay').classList.remove('show');editingId=null;};
window.filterTag=tag=>{activeTag=activeTag===tag?null:tag;render();};
window.clearSearch=()=>{document.getElementById('searchInput').value='';activeTag=null;render();};
window.exportMemos=()=>{
  const lines=memos.map(m=>`[${fmtDate(m.date)} ${fmtTime(m.date)}]\n${m.author?'작성: '+m.author+'\n':''}${m.text}\n`).join('\n---\n\n');
  const blob=new Blob([lines],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const now=new Date(),pad=n=>String(n).padStart(2,'0');
  a.download=`메모_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}.txt`;
  a.click();toast('내보내기 완료 ✓');
};
function render(){
  const search=document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered=memos.filter(m=>{const tagOk=activeTag?m.tags.includes(activeTag):true;const searchOk=search?m.text.toLowerCase().includes(search):true;return tagOk&&searchOk;});
  const allTags=[...new Set(memos.flatMap(m=>m.tags))].sort();
  document.getElementById('tagChips').innerHTML=allTags.map(tag=>`<span class="tag-chip${activeTag===tag?' active':''}" onclick="filterTag('${tag}')">${tag}</span>`).join('');
  const totalDays=new Set(memos.map(m=>dateKey(m.date))).size;
  document.getElementById('statsBar').innerHTML=`<div class="stat-pill">전체 메모 <span>${memos.length}개</span></div><div class="stat-pill">기록일 <span>${totalDays}일</span></div><div class="stat-pill">태그 <span>${allTags.length}개</span></div>${filtered.length!==memos.length?`<div class="stat-pill">검색 결과 <span>${filtered.length}개</span></div>`:''}`;
  const el=document.getElementById('memoList');
  if(!filtered.length){el.innerHTML='<div class="empty">메모가 없어요</div>';return;}
  const groups={};filtered.forEach(m=>{const k=dateKey(m.date);if(!groups[k])groups[k]=[];groups[k].push(m);});
  el.innerHTML=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(key=>{
    const items=groups[key].map(m=>`<div class="memo-card"><div class="memo-time">${fmtTime(m.date)}${m.author?' · '+m.author:''}${m.edited?' · 수정됨':''}</div><div class="memo-text">${hlText(m.text,search)}</div>${m.tags.length?`<div class="memo-tags">${m.tags.map(t=>`<span class="memo-tag" onclick="filterTag('${t}')">${t}</span>`).join('')}</div>`:''}<div class="memo-actions"><button class="act-btn" onclick="editMemo('${m._id}')" title="수정">&#9999;</button><button class="act-btn del" onclick="deleteMemo('${m._id}')" title="삭제">&#10005;</button></div></div>`).join('');
    return`<div class="date-group"><div class="date-label">${fmtDate(key+'T00:00:00')}</div>${items}</div>`;
  }).join('');
}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)window.closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')window.closeModal();});
document.getElementById('memoInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))window.saveMemo();});
</script>
</div><!-- main -->
</div><!-- flex -->

</body>
