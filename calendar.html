<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./apple-touch-icon.png"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="GZ기획팀"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>캘린더 — GZ 경영기획팀</title>
<style>
/* ── Reset & 변수 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ee;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a8a8a8;
  --border:#e5e5e3;--border2:#d0d0cc;
  --radius:10px;--radius-sm:6px;--pill:999px;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --green:#639922;--green-bg:#EAF3DE;--green-t:#27500A;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-t:#791F1F;
  --orange:#EF9F27;
  --purple-bg:#EEEDFE;--purple-t:#3C3489;
  --sw:220px;
}

/* ── 앱 레이아웃 ── */
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}

/* ── 사이드바 ── */
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:300;transition:transform .25s ease}
.sb-brand{padding:20px 16px 16px;border-bottom:0.5px solid var(--bg3)}
.sb-brand-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.sb-brand-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--bg3)}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--bg);flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:500;color:var(--text)}
.sb-user-role{font-size:11px;color:var(--text3)}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-sec{padding:4px 16px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;margin:1px 8px;border-radius:var(--radius-sm);transition:background .12s}
.sb-item:hover{background:var(--bg2)}
.sb-item.active{background:var(--bg3)}
.sb-item.active .sb-label,.sb-item.active .sb-icon{color:var(--text);font-weight:500}
.sb-icon{font-size:14px;width:20px;text-align:center;color:var(--text2);flex-shrink:0}
.sb-label{font-size:13px;color:var(--text2);flex:1}
.sb-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:var(--pill);background:var(--red-bg);color:var(--red)}
.sb-bottom{padding:12px 16px;border-top:0.5px solid var(--bg3);display:flex;flex-direction:column;gap:8px}
.sb-sync{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--orange);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 메인 ── */
.main-wrap{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── 탑바 ── */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0}
.page-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;gap:8px;align-items:center}

/* ── 햄버거 버튼 (모바일) ── */
.hamburger{display:none;width:36px;height:36px;border:none;background:transparent;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:4px;border-radius:var(--radius-sm);flex-shrink:0}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px;transition:all .2s}
.hamburger:hover{background:var(--bg2)}

/* ── 모바일 딤 ── */
.sidebar-dim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:290}
.sidebar-dim.show{display:block}

/* ── 공통 버튼 ── */
.btn-ghost{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-solid{padding:6px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;background:var(--text);color:var(--bg);cursor:pointer}
.btn-solid:hover{opacity:.82}

/* ── 모달/오버레이 ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:400;padding:1rem}
.overlay.show{display:flex}
.modal{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:1.5rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{padding:7px 16px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer}
.btn-ok{padding:7px 18px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.btn-danger{padding:7px 16px;font-size:12px;border:none;border-radius:var(--radius-sm);background:var(--red);color:#fff;cursor:pointer;margin-right:auto}
.fg{margin-bottom:1rem}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--border2)}

/* ── 토스트 ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);font-size:12px;font-weight:500;padding:8px 18px;border-radius:var(--pill);opacity:0;transition:all .25s;pointer-events:none;z-index:500;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 통계 ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:24px;font-weight:600;color:var(--text);line-height:1}
.stat-value.warn{color:#BA7517}.stat-value.danger{color:var(--red)}

/* ── 필터 ── */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.chip{padding:5px 14px;border-radius:var(--pill);font-size:12px;border:0.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--border2);color:var(--text)}.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ── 업무 카드 ── */
.task-list{display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.task-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s;position:relative}
.task-card:hover{border-color:var(--border2)}.task-card.selected{border-color:var(--text)}
.task-card.pinned{border-left:3px solid var(--blue)}.task-card.overdue{border-left:3px solid var(--red)}.task-card.stale{border-left:3px solid var(--orange)}
.task-card.dragging-card{opacity:.4}.task-card.drag-over-card{border-top:2px solid var(--blue)}
.priority-bar{width:3px;border-radius:var(--pill);align-self:stretch;flex-shrink:0;min-height:32px}
.drag-handle{color:var(--text3);font-size:14px;cursor:grab;user-select:none;flex-shrink:0}
.task-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.task-check:hover{border-color:var(--text)}.task-check.done{background:var(--text);border-color:var(--text)}
.task-check.done::after{content:'';width:5px;height:3px;border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600}
.badge-todo{background:var(--blue-bg);color:var(--blue-t)}.badge-inprogress{background:var(--amber-bg);color:var(--amber-t)}.badge-done{background:var(--green-bg);color:var(--green-t)}
.badge-status{cursor:pointer;user-select:none}.badge-status:hover{opacity:.75}
.badge-reporter{background:var(--purple-bg);color:var(--purple-t)}
.member-badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;background:var(--bg3);color:var(--text2)}
.task-date{font-size:11px;color:var(--text3)}.task-date.ov{color:var(--red);font-weight:600}
.card-right{position:absolute;top:10px;right:12px;display:flex;gap:4px;align-items:center}
.pin-btn,.del-btn{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.pin-btn:hover{background:var(--bg3);color:var(--text)}.pin-btn.on{color:var(--blue)}.del-btn:hover{background:var(--red-bg);color:var(--red)}
.priority-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block}
.priority-badge.p1{background:#f0f0ee;color:#888}.priority-badge.p2{background:var(--blue-bg);color:var(--blue-t)}
.priority-badge.p3{background:var(--amber-bg);color:var(--amber-t)}.priority-badge.p4{background:var(--red-bg);color:var(--red)}.priority-badge.p5{background:var(--red);color:#fff}
.reporter-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block;background:var(--purple-bg);color:var(--purple-t)}

/* ── 상세 패널 ── */
.resizer{width:12px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center}
.resizer::after{content:'';width:3px;height:30px;background:var(--border);border-radius:var(--pill)}
.resizer:hover::after{background:var(--border2);height:46px}
.detail-panel{width:300px;min-width:240px;flex-shrink:0;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);display:none;position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto}
.detail-panel.open{display:block}
.dp-head{padding:14px 16px;border-bottom:0.5px solid var(--bg3);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;position:sticky;top:0;background:var(--bg);z-index:1}
.dp-member{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:3px}
.dp-title-input{font-size:14px;font-weight:500;border:none;background:transparent;color:var(--text);font-family:inherit;padding:2px 4px;border-radius:4px;border:0.5px solid transparent;outline:none;width:100%;line-height:1.45}
.dp-title-input:hover{border-color:var(--border);background:var(--bg2)}.dp-title-input:focus{border-color:var(--border2);background:var(--bg2)}
.dp-close{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.dp-close:hover{background:var(--bg2);color:var(--text)}
.dp-meta{padding:10px 16px;display:flex;flex-direction:column}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--bg3)}
.dp-row:last-child{border-bottom:none}
.dp-lbl{font-size:11px;color:var(--text3)}.dp-val{font-size:12px;font-weight:500;color:var(--text)}
.dp-edit{font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text);font-family:inherit;padding:2px 5px;border-radius:4px;border:0.5px solid transparent;outline:none;width:150px;text-align:right}
.dp-edit:hover{border-color:var(--border);background:var(--bg2)}.dp-edit:focus{border-color:var(--border2);background:var(--bg2)}
.dp-sec{font-size:10px;font-weight:600;color:var(--text3);padding:12px 16px 6px;letter-spacing:.06em;text-transform:uppercase}
.progress-wrap{padding:0 16px 12px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:var(--pill);background:var(--text)}
.progress-bar-fill.done-bar{background:var(--green)}.progress-bar-fill.over-bar{background:var(--red)}
.timeline{padding:0 16px 12px;display:flex;flex-direction:column}
.tl-item{display:flex;gap:8px;position:relative}
.tl-line{position:absolute;left:5px;top:13px;bottom:-2px;width:1px;background:var(--border)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);background:var(--bg);position:relative;z-index:1}
.tl-dot.create{background:var(--blue);border-color:var(--blue)}.tl-dot.status{background:var(--orange);border-color:var(--orange)}.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-body{flex:1;padding-bottom:12px;min-width:0}
.tl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.tl-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;flex-shrink:0;opacity:0;display:flex;align-items:center;justify-content:center}
.tl-item:hover .tl-del{opacity:1}.tl-del:hover{background:var(--red-bg);color:var(--red)}
.tl-author{font-size:10px;font-weight:600;padding:1px 5px;border-radius:var(--pill);background:var(--purple-bg);color:var(--purple-t);margin-right:4px}
.tl-text{font-size:12px;line-height:1.5;color:var(--text2)}.tl-date{font-size:10px;color:var(--text3);margin-top:2px}
.dp-note{padding:12px 16px}
.note-input{width:100%;padding:8px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;resize:none;height:58px}
.note-input:focus{outline:none;border-color:var(--border2)}
.note-submit{width:100%;margin-top:6px;padding:7px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.note-submit:hover{opacity:.82}
.divider{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;padding:4px 0 6px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex}
  .main-wrap{margin-left:0}
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-panel{position:fixed;inset:0;width:100%;max-width:100%;border-radius:0;z-index:350;max-height:100vh;overflow-y:auto}
  .resizer{display:none}
  .topbar{padding:0 16px}
}

/* ── 터치 이벤트 지원 ── */
button, [onclick], [data-nav], .sb-item, .task-card, .chip {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

</style>
</head>
<body>
<!-- 모바일 딤 -->
<div class="sidebar-dim" id="sidebarDim"></div>
<div class="app">
<div class="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">GZ Plan</div><div class="sb-brand-sub">경영기획팀</div></div>
  <div class="sb-user">
    <div class="sb-avatar" id="sbAvatar">--</div>
    <div><div class="sb-user-name" id="sbUserName"></div><div class="sb-user-role" id="sbUserRole"></div></div>
  </div>
  <div class="sb-nav">
    <div class="sb-sec">업무</div>
    <div class="sb-item" data-nav="member.html" id="sbTaskItem"><div class="sb-icon">☐</div><div class="sb-label" id="sbTaskLabel">내 업무</div></div>
    <div class="sb-sec">도구</div>
    <div class="sb-item active"><div class="sb-icon">▦</div><div class="sb-label">캘린더</div></div>
    <div class="sb-item" data-nav="meeting.html"><div class="sb-icon">◈</div><div class="sb-label">회의록</div></div>
    <div class="sb-item" data-nav="memo.html"><div class="sb-icon">◉</div><div class="sb-label">메모장</div></div>
    <div class="sb-sec" id="sbAdminSec" style="display:none">관리</div>
    <div class="sb-item" data-nav="admin.html" id="sbAdminItem" style="display:none"><div class="sb-icon">◯</div><div class="sb-label">계정 관리</div></div>
  </div>
  <div class="sb-bottom">
    <div class="sb-sync"><div class="sync-dot" id="syncDot"></div><span>실시간 동기화</span></div>
    <button class="btn-ghost" id="logoutBtn" style="width:100%;font-size:11px;padding:5px">로그아웃</button>
  </div>
</div>
<div class="main-wrap">
  <div class="topbar">
  <button class="hamburger" id="hamburgerBtn" aria-label="메뉴">
    <span></span><span></span><span></span>
  </button>
    <div class="page-title">캘린더</div>
    <div class="topbar-right">
      <button class="add-btn" id="addCommonBtnTop" style="display:none">🏢 공통 일정</button>
      <button class="btn-solid" id="addPersonalBtn">+ 개별 일정 추가</button>
    </div>
  </div>
  <div class="tab-row">
    <button class="tab-btn active" id="tab-cal" data-view="cal">📅 캘린더</button>
    <button class="tab-btn" id="tab-cat" data-view="cat">🏷 카테고리 관리</button>
  </div>
  <div id="view-cal" style="padding:1.25rem 24px">
    <div class="cal-header">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="nav-btn" id="prevBtn">‹</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="nav-btn" id="nextBtn">›</button>
        <button class="today-btn" id="todayBtn">오늘</button>
      </div>
      <button class="add-btn" id="addCommonBtn" style="display:none">🏢 공통 일정 추가</button>
    </div>
    <div class="filter-row" id="typeFilterRow"></div>
    <div class="filter-row" id="memberFilterRow"></div>
    <div class="legend" id="legend"></div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-weekday">일</div><div class="cal-weekday">월</div><div class="cal-weekday">화</div>
        <div class="cal-weekday">수</div><div class="cal-weekday">목</div><div class="cal-weekday">금</div><div class="cal-weekday">토</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
  </div>
  <div id="view-cat" style="display:none">
    <div class="cat-manage">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:1.25rem">카테고리 관리</h2>

function getNthWeek(year,month,nth){let n=0,d=new Date(year,month,1);while(d.getDay()!==0)d=new Date(year,month,d.getDate()+1);while(true){const sat=new Date(d.getFullYear(),d.getMonth(),d.getDate()+6);if(sat.getMonth()===month){n++;if(n===nth)return d}d=new Date(d.getFullYear(),d.getMonth(),d.getDate()+7);if(d.getMonth()!==month)break}return null}
function getWeekSun(year,month,td){const d=new Date(year,month,td);return new Date(year,month,td-d.getDay())}
function getRepeatDates(ev,year,month){
  const r=ev.repeat;if(!r||r.type==='none')return[];
  const exc=ev.exceptions||[],res=[];
  if(r.type==='monthly_nth_weekday'){const ws=getNthWeek(year,month,r.week);if(!ws)return[];const d=new Date(ws.getFullYear(),ws.getMonth(),ws.getDate()+r.weekday);if(d.getMonth()===month)res.push(toStr(d))}
  else if(r.type==='monthly_day_weekday'){const dim=new Date(year,month+1,0).getDate();if(r.targetDay>dim)return[];const sun=getWeekSun(year,month,r.targetDay);const d=new Date(sun.getFullYear(),sun.getMonth(),sun.getDate()+r.weekday);res.push(toStr(d))}
  else if(r.type==='monthly_date'){const dim=new Date(year,month+1,0).getDate();if(r.date>dim)return[];res.push(toStr(new Date(year,month,r.date)))}
  return res.filter(s=>(!r.endDate||s<=r.endDate)&&(!ev.startDate||s>=ev.startDate)&&!exc.includes(s));
}
function collect(year,month){
  const fd=toStr(new Date(year,month,1)),ld=toStr(new Date(year,month+1,0)),inst=[];
  if(typeFilter==='all'||typeFilter==='task'){
    taskEvents.filter(t=>memberFilter==='all'||t._mid===memberFilter).filter(t=>t.startDate<=ld&&t.endDate>=fd).forEach(t=>inst.push({...t,_type:'task'}));
  }
  schedules.forEach(ev=>{
    if(typeFilter==='task')return;
    if(typeFilter==='personal'&&ev.type!=='personal')return;
    if(typeFilter==='common'&&ev.type!=='common')return;
    if(ev.type==='personal'&&memberFilter!=='all'&&ev.authorId!==memberFilter)return;
    if(!isMgr&&ev.type==='personal'&&ev.authorId!==ME.id)return;
    if(!ev.repeat||ev.repeat.type==='none'){if(ev.startDate<=ld&&ev.endDate>=fd)inst.push({...ev,_type:ev.type||'personal'})}
    else{getRepeatDates(ev,year,month).forEach(ds=>inst.push({...ev,startDate:ds,endDate:ds,instanceDate:ds,isRepeatInstance:true,_type:ev.type||'personal'}))}
  });
  return inst.sort((a,b)=>a.startDate.localeCompare(b.startDate));
}
function layout(inst,cells){return inst.map(ev=>({event:ev,cells:cells.map((d,i)=>({d,i})).filter(({d})=>d>=ev.startDate&&d<=ev.endDate).map(({i})=>i)})).filter(r=>r.cells.length>0)}
function renderCalendar(){
  renderFilters();
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent=`${curYear}년 ${MN[curMonth]}`;
  const fl=new Date(curYear,curMonth,1),ll=new Date(curYear,curMonth+1,0),ts=toStr(new Date());
  const st=new Date(fl);st.setDate(st.getDate()-st.getDay());
  const en=new Date(ll);en.setDate(en.getDate()+(6-en.getDay()));
  const cells=[];const d=new Date(st);while(d<=en){cells.push(toStr(d));d.setDate(d.getDate()+1)}
  const inst=collect(curYear,curMonth),rows=layout(inst,cells);
  document.getElementById('calDays').innerHTML=cells.map((ds,idx)=>{
    const date=parse(ds),isO=date.getMonth()!==curMonth,isTd=ds===ts,dow=date.getDay();
    let cls='cal-day';if(isO)cls+=' other-month';if(isTd)cls+=' today';
    let nc='day-num';if(dow===0)nc+=' sun';if(dow===6)nc+=' sat';
    const dr=rows.filter(r=>r.cells.includes(idx));
    let bars='<div class="event-bars">';let shown=0;
    dr.forEach(r=>{
      if(shown>=3)return;
      const isSt=r.cells[0]===idx,isEn=r.cells[r.cells.length-1]===idx,isSi=r.cells.length===1;
      const showTxt=isSt||idx%7===0;
      let bc='event-bar ';bc+=isSi?'bar-single':isSt?'bar-start':isEn?'bar-end':'bar-mid';
      let color='#888',label='';
      if(r.event._type==='task'){
        bc+=' task-bar';
        const p=r.event.priority||3;
        color=r.event.status==='done'?'#bbb':(PRIORITY_COLORS[p]||'#888');
        if(isMgr&&memberFilter==='all'){const mi=MEMBER_IDS.indexOf(r.event._mid);if(mi>=0)color=MEMBER_COLORS[mi]}
        label=showTxt?`${isMgr?`[${r.event._mid}] `:''}${r.event.title}`:'';
      }else if(r.event._type==='common'){bc+=' common-bar';color='#5F5E5A';label=showTxt?`🏢 ${r.event.title}`:''}
      else{const cat=CAT_MAP[r.event.category]||{color:'#888'};color=cat.color;label=showTxt?`${r.event.isRepeatInstance?'🔁 ':''}${isMgr?`[${r.event.author||''}] `:''}${r.event.title}`:''}
      const op=r.event.status==='done'?'opacity:.5;':'';
      bars+=`<div class="${bc}" style="background:${color};${op}" onclick="openDetail('${r.event.id}','${r.event.instanceDate||r.event.startDate}','${r.event._type}','${r.event._mid||''}')">${label||'&nbsp;'}</div>`;
      shown++;
    });
    if(dr.length-shown>0)bars+=`<div class="more-label">+${dr.length-shown}개</div>`;
    bars+='</div>';
    return`<div class="${cls}"><div class="${nc}">${date.getDate()}</div>${bars}</div>`;
  }).join('');
}
window.moveMonth=d=>{curMonth+=d;if(curMonth<0){curMonth=11;curYear--}if(curMonth>11){curMonth=0;curYear++}renderCalendar()};
window.goToday=()=>{const n=new Date();curYear=n.getFullYear();curMonth=n.getMonth();renderCalendar()};
window.openDetail=(id,instanceDate,type,mid)=>{
  if(type==='task'){
    const t=taskEvents.find(x=>x.id===id&&x._mid===mid);if(!t)return;
    const sl={todo:'대기',inprogress:'진행 중',done:'완료'};
    document.getElementById('detailContent').innerHTML=`<div class="detail-cat" style="background:${PRIORITY_COLORS[t.priority||3]}">업무 스케줄</div><h3 style="font-size:16px;font-weight:600;margin-bottom:12px">${t.title}</h3><div class="detail-row"><span class="detail-lbl">담당자</span><span class="detail-val">${t._mid}</span></div><div class="detail-row"><span class="detail-lbl">기간</span><span class="detail-val">${fmt(t.startDate)} ~ ${fmt(t.endDate)}</span></div><div class="detail-row"><span class="detail-lbl">상태</span><span class="detail-val">${sl[t.status]||'-'}</span></div><div class="detail-row"><span class="detail-lbl">중요도</span><span class="detail-val">${t.priority||3}</span></div>`;
    document.getElementById('detailBtns').innerHTML=`<button class="btn-cancel" onclick="closeModal('detailOverlay')" style="margin-left:auto">닫기</button>`;
    document.getElementById('detailOverlay').classList.add('show');return;
  }
  const ev=schedules.find(e=>e.id===id);if(!ev)return;
  const isC=ev.type==='common',canEdit=isC?isMgr:(isMgr||ev.authorId===ME.id);
  const isR=ev.repeat&&ev.repeat.type!=='none';
  const cat=CAT_MAP[ev.category]||{label:'기타',color:'#888'};
  const rl=getRL(ev.repeat);
  document.getElementById('detailContent').innerHTML=`<div class="detail-cat" style="background:${isC?'#5F5E5A':cat.color}">${isC?'🏢 공통 일정':cat.label}</div><h3 style="font-size:16px;font-weight:600;margin-bottom:12px">${ev.title}</h3><div class="detail-row"><span class="detail-lbl">날짜</span><span class="detail-val">${fmt(ev.startDate)}${ev.startDate!==ev.endDate?' ~ '+fmt(ev.endDate):''}</span></div>${isR?`<div class="detail-row"><span class="detail-lbl">반복</span><span class="detail-val"><span class="repeat-badge">🔁 ${rl}</span></span></div>`:''}${ev.memo?`<div class="detail-row"><span class="detail-lbl">메모</span><span class="detail-val">${ev.memo}</span></div>`:''}<div class="detail-row"><span class="detail-lbl">작성자</span><span class="detail-val">${ev.author||'-'}</span></div>`;
  document.getElementById('detailBtns').innerHTML=canEdit?`<button class="btn-danger" onclick="reqDel('${id}','${instanceDate}')">삭제</button><button class="btn-cancel" onclick="closeModal('detailOverlay')">닫기</button><button class="btn-ok" onclick="openEdit('${id}','${instanceDate}')">수정</button>`:`<button class="btn-cancel" onclick="closeModal('detailOverlay')" style="margin-left:auto">닫기</button>`;
  document.getElementById('detailOverlay').classList.add('show');
};
function getRL(r){if(!r||r.type==='none')return'';if(r.type==='monthly_nth_weekday')return`매월 ${r.week}번째 주 ${WD[r.weekday]}요일`;if(r.type==='monthly_day_weekday')return`매월 ${r.targetDay}일 포함 주 ${WD[r.weekday]}요일`;if(r.type==='monthly_date')return`매월 ${r.date}일`;return''}
window.openAddModal=(type='personal')=>{
  editingId=null;editScope=null;editInstanceDate=null;editType=type;
  document.getElementById('addModalTitle').textContent=type==='common'?'🏢 공통 일정 추가':'개별 일정 추가';
  document.getElementById('addSubmitBtn').textContent='추가하기';
  document.getElementById('eTitle').value='';document.getElementById('eCategory').value=CAT_LIST[0]?.id||'meeting';
  document.getElementById('eMemo').value='';document.getElementById('eRepeatType').value='none';
  document.getElementById('addErrLine').textContent='';
  const td=toStr(new Date());document.getElementById('eStart').value=td;document.getElementById('eEnd').value=td;
  toggleRepeatOpts();document.getElementById('addOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('eTitle').focus(),80);
};
window.toggleRepeatOpts=()=>{
  const t=document.getElementById('eRepeatType').value;
  document.getElementById('repeatOpts').style.display=t==='none'?'none':'';
  document.getElementById('rNthWeekday').style.display=t==='monthly_nth_weekday'?'':'none';
  document.getElementById('rDayWeekday').style.display=t==='monthly_day_weekday'?'':'none';
  document.getElementById('rMonthlyDate').style.display=t==='monthly_date'?'':'none';
};
window.toggleRepeatEnd=()=>{document.getElementById('rEndDate').style.display=document.getElementById('rEndType').value==='date'?'':'none'};
window.submitEvent=async()=>{
  const title=document.getElementById('eTitle').value.trim(),cat=document.getElementById('eCategory').value;
  const sd=document.getElementById('eStart').value,ed=document.getElementById('eEnd').value;
  const memo=document.getElementById('eMemo').value.trim(),rt=document.getElementById('eRepeatType').value;
  const err=document.getElementById('addErrLine');err.textContent='';
  if(!title){err.textContent='제목을 입력해주세요';return}
  if(!sd){err.textContent='시작일을 입력해주세요';return}
  if(!ed){err.textContent='종료일을 입력해주세요';return}
  if(ed<sd){err.textContent='종료일이 시작일보다 빨라요';return}
  let repeat={type:'none'};
  if(rt!=='none'){
    const ret=document.getElementById('rEndType').value,red=ret==='date'?document.getElementById('rEndDate').value:null;
    if(rt==='monthly_nth_weekday')repeat={type:rt,week:Number(document.getElementById('rNth').value),weekday:Number(document.getElementById('rWeekday1').value),endDate:red};
    else if(rt==='monthly_day_weekday')repeat={type:rt,targetDay:Number(document.getElementById('rTargetDay').value),weekday:Number(document.getElementById('rWeekday2').value),endDate:red};
    else if(rt==='monthly_date')repeat={type:rt,date:Number(document.getElementById('rDate').value),endDate:red};
  }
  const btn=document.getElementById('addSubmitBtn');btn.disabled=true;btn.textContent='저장 중...';
  try{
    const data={title,category:cat,startDate:sd,endDate:ed,memo,repeat,author:ME.displayName,authorId:ME.id,updatedAt:new Date().toISOString()};
    if(editingId){
      if(editScope==='this'){
        const orig=schedules.find(e=>e.id===editingId);
        await updateDoc(doc(db,'schedules',editingId),{exceptions:[...(orig?.exceptions||[]),editInstanceDate]});
        await addDoc(collection(db,'schedules'),{...data,type:orig?.type||'personal',repeat:{type:'none'},isException:true,seriesId:orig?.seriesId||editingId,createdAt:new Date().toISOString()});
        toast('이 일정만 수정됐어요 ✓');
      }else if(editScope==='future'){
        const orig=schedules.find(e=>e.id===editingId);
        const prev=toStr(new Date(parse(editInstanceDate).getTime()-86400000));
        await updateDoc(doc(db,'schedules',editingId),{repeat:{...orig?.repeat,endDate:prev}});
        await addDoc(collection(db,'schedules'),{...data,type:orig?.type||'personal',seriesId:Date.now()+'_'+ME.id,createdAt:new Date().toISOString()});
        toast('이후 일정이 수정됐어요 ✓');
      }else{await updateDoc(doc(db,'schedules',editingId),data);toast('일정이 수정됐어요 ✓')}
    }else{
      if(repeat.type!=='none')data.seriesId=Date.now()+'_'+ME.id;
      data.type=editType;data.createdAt=new Date().toISOString();
      await addDoc(collection(db,'schedules'),data);toast('일정을 추가했어요 ✓');
    }
    closeModal('addOverlay');
  }catch(e){document.getElementById('addErrLine').textContent='오류: '+e.message}
  finally{btn.disabled=false;btn.textContent=editingId?'저장하기':'추가하기'}
};
window.openEdit=(id,instanceDate)=>{
  const ev=schedules.find(e=>e.id===id);if(!ev)return;closeModal('detailOverlay');
  if(ev.repeat&&ev.repeat.type!=='none'){pendingRepeatAction={id,instanceDate};document.getElementById('repeatEditOverlay').classList.add('show');return}
  fillEdit(ev);
};
window.confirmRepeatEdit=()=>{
  const scope=document.querySelector('input[name="repeatEdit"]:checked').value;closeModal('repeatEditOverlay');
  const ev=schedules.find(e=>e.id===pendingRepeatAction.id);if(!ev)return;
  fillEdit(ev,pendingRepeatAction.instanceDate,scope);
};
function fillEdit(ev,instanceDate=null,scope=null){
  editingId=ev.id;editScope=scope;editInstanceDate=instanceDate;editType=ev.type||'personal';
  document.getElementById('addModalTitle').textContent=ev.type==='common'?'🏢 공통 일정 수정':'일정 수정';
  document.getElementById('addSubmitBtn').textContent='저장하기';
  document.getElementById('eTitle').value=ev.title;document.getElementById('eCategory').value=ev.category||CAT_LIST[0]?.id;
  document.getElementById('eStart').value=ev.startDate;document.getElementById('eEnd').value=ev.endDate;
  document.getElementById('eMemo').value=ev.memo||'';document.getElementById('addErrLine').textContent='';
  const r=ev.repeat||{type:'none'};document.getElementById('eRepeatType').value=r.type||'none';
  if(r.type==='monthly_nth_weekday'){document.getElementById('rNth').value=r.week;document.getElementById('rWeekday1').value=r.weekday}
  else if(r.type==='monthly_day_weekday'){document.getElementById('rTargetDay').value=r.targetDay;document.getElementById('rWeekday2').value=r.weekday}
  else if(r.type==='monthly_date'){document.getElementById('rDate').value=r.date}
  if(r.endDate){document.getElementById('rEndType').value='date';document.getElementById('rEndDate').value=r.endDate;document.getElementById('rEndDate').style.display=''}
  else{document.getElementById('rEndType').value='endless';document.getElementById('rEndDate').style.display='none'}
  toggleRepeatOpts();document.getElementById('addOverlay').classList.add('show');
}
window.reqDel=(id,instanceDate)=>{
  const ev=schedules.find(e=>e.id===id);if(!ev)return;closeModal('detailOverlay');
  if(ev.repeat&&ev.repeat.type!=='none'){pendingDelId={id,instanceDate};document.getElementById('repeatDelOverlay').classList.add('show');return}
  if(confirm('이 일정을 삭제할까요?'))deleteDoc(doc(db,'schedules',id)).then(()=>toast('일정을 삭제했어요'));
};
window.confirmRepeatDel=async()=>{
  const scope=document.querySelector('input[name="repeatDel"]:checked').value;closeModal('repeatDelOverlay');
  const{id,instanceDate}=pendingDelId;const ev=schedules.find(e=>e.id===id);if(!ev)return;
  if(scope==='this'){await updateDoc(doc(db,'schedules',id),{exceptions:[...(ev.exceptions||[]),instanceDate]});toast('이 일정을 삭제했어요')}
  else if(scope==='future'){const prev=toStr(new Date(parse(instanceDate).getTime()-86400000));await updateDoc(doc(db,'schedules',id),{repeat:{...ev.repeat,endDate:prev}});toast('이후 일정을 삭제했어요')}
  else{await deleteDoc(doc(db,'schedules',id));toast('모든 반복 일정을 삭제했어요')}
};
window.switchView=tab=>{
  document.getElementById('view-cal').style.display=tab==='cal'?'':'none';
  document.getElementById('view-cat').style.display=tab==='cat'?'':'none';
  document.getElementById('tab-cal').classList.toggle('active',tab==='cal');
  document.getElementById('tab-cat').classList.toggle('active',tab==='cat');
};
window.closeModal=id=>document.getElementById(id).classList.remove('show');
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===e.currentTarget)e.target.classList.remove('show')}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.show').forEach(o=>o.classList.remove('show'))});
loadCategories();renderCalendar();
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var lb = document.getElementById('logoutBtn');
  if (lb) lb.addEventListener('click', function() {
    localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html';
  });
  document.querySelectorAll('[data-nav]').forEach(function(el) {
    el.addEventListener('click', function() { location.href = el.dataset.nav; });
  });
  // 캘린더 버튼 바인딩
  var addPersonal = document.getElementById('addPersonalBtn');
  if (addPersonal) addPersonal.addEventListener('click', function() { if(window.openAddModal) window.openAddModal('personal'); });
  var addCommonTop = document.getElementById('addCommonBtnTop');
  if (addCommonTop) addCommonTop.addEventListener('click', function() { if(window.openAddModal) window.openAddModal('common'); });
  var addCommon = document.getElementById('addCommonBtn');
  if (addCommon) addCommon.addEventListener('click', function() { if(window.openAddModal) window.openAddModal('common'); });
  var prevBtn = document.getElementById('prevBtn');
  if (prevBtn) prevBtn.addEventListener('click', function() { if(window.moveMonth) window.moveMonth(-1); });
  var nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.addEventListener('click', function() { if(window.moveMonth) window.moveMonth(1); });
  var todayBtn = document.getElementById('todayBtn');
  if (todayBtn) todayBtn.addEventListener('click', function() { if(window.goToday) window.goToday(); });
  var addCatBtn = document.getElementById('addCatBtn');
  if (addCatBtn) addCatBtn.addEventListener('click', function() { if(window.addCategory) window.addCategory(); });
  // 탭 전환
  document.querySelectorAll('[data-tab]').forEach(function(btn) {
    btn.addEventListener('click', function() { if(window.switchView) window.switchView(btn.dataset.tab); });
  });
  var typeFilterRow = document.getElementById('typeFilterRow');
  if (typeFilterRow) typeFilterRow.addEventListener('click', function(e) {
    var b = e.target.closest('[data-tf]');
    if (b && window.setTF) window.setTF(b.dataset.tf);
  });
  var memberFilterRow = document.getElementById('memberFilterRow');
  if (memberFilterRow) memberFilterRow.addEventListener('click', function(e) {
    var b = e.target.closest('[data-mf]');
    if (b && window.setMF) window.setMF(b.dataset.mf);
  });
});

// 초기화
loadCategories();
renderCalendar();
</script>
