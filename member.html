<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="GZ기획팀"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GZ Plan — 내 업무</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ee;--text:#1a1a1a;--text2:#6b6b6b;--text3:#a8a8a8;--border:#e5e5e3;--border2:#d0d0cc;--radius:10px;--radius-sm:6px;--pill:999px;--blue:#378ADD;--blue-bg:#E6F1FB;--blue-t:#0C447C;--amber-bg:#FAEEDA;--amber-t:#633806;--green:#639922;--green-bg:#EAF3DE;--green-t:#27500A;--red:#A32D2D;--red-bg:#FCEBEB;--red-t:#791F1F;--orange:#EF9F27;--purple-bg:#EEEDFE;--purple-t:#3C3489;--sw:220px}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sb-brand{padding:20px 16px 16px;border-bottom:0.5px solid var(--bg3)}
.sb-brand-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.sb-brand-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--bg3)}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--bg);flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:500;color:var(--text)}
.sb-user-role{font-size:11px;color:var(--text3)}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-sec{padding:4px 16px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;margin:1px 8px;border-radius:var(--radius-sm);transition:background .12s}
.sb-item:hover{background:var(--bg2)}.sb-item.active{background:var(--bg3)}
.sb-item.active .sb-label,.sb-item.active .sb-icon{color:var(--text);font-weight:500}
.sb-icon{font-size:14px;width:20px;text-align:center;color:var(--text2);flex-shrink:0}
.sb-label{font-size:13px;color:var(--text2);flex:1}
.sb-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:var(--pill);background:var(--red-bg);color:var(--red)}
.sb-bottom{padding:12px 16px;border-top:0.5px solid var(--bg3);display:flex;flex-direction:column;gap:8px}
.sb-sync{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--orange);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.main-wrap{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0}
.page-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn-ghost{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-solid{padding:6px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;background:var(--text);color:var(--bg);cursor:pointer}
.btn-solid:hover{opacity:.82}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:24px;font-weight:600;color:var(--text);line-height:1}
.stat-value.warn{color:#BA7517}.stat-value.danger{color:var(--red)}
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.chip{padding:5px 14px;border-radius:var(--pill);font-size:12px;border:0.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer}
.chip:hover{border-color:var(--border2);color:var(--text)}.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.task-list{display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.divider{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;padding:4px 0 6px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.task-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s;position:relative}
.task-card:hover{border-color:var(--border2)}.task-card.selected{border-color:var(--text)}
.task-card.pinned{border-left:3px solid var(--blue)}.task-card.overdue{border-left:3px solid var(--red)}.task-card.stale{border-left:3px solid var(--orange)}
.task-card.dragging-card{opacity:.4}.task-card.drag-over-card{border-top:2px solid var(--blue)}
.priority-bar{width:3px;border-radius:var(--pill);align-self:stretch;flex-shrink:0;min-height:32px}
.drag-handle{color:var(--text3);font-size:14px;cursor:grab;user-select:none;flex-shrink:0}
.task-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.task-check:hover{border-color:var(--text)}.task-check.done{background:var(--text);border-color:var(--text)}
.task-check.done::after{content:'';width:5px;height:3px;border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600}
.badge-todo{background:var(--blue-bg);color:var(--blue-t)}.badge-inprogress{background:var(--amber-bg);color:var(--amber-t)}.badge-done{background:var(--green-bg);color:var(--green-t)}
.badge-status{cursor:pointer;user-select:none}.badge-status:hover{opacity:.75}
.badge-reporter{background:var(--purple-bg);color:var(--purple-t)}
.member-badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;background:var(--bg3);color:var(--text2)}
.task-date{font-size:11px;color:var(--text3)}.task-date.ov{color:var(--red);font-weight:600}
.card-right{position:absolute;top:10px;right:12px;display:flex;gap:4px;align-items:center}
.pin-btn,.del-btn{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.pin-btn:hover{background:var(--bg3);color:var(--text)}.pin-btn.on{color:var(--blue)}.del-btn:hover{background:var(--red-bg);color:var(--red)}
.resizer{width:12px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center}
.resizer::after{content:'';width:3px;height:30px;background:var(--border);border-radius:var(--pill)}
.resizer:hover::after{background:var(--border2);height:46px}
.detail-panel{width:300px;min-width:240px;max-width:480px;flex-shrink:0;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);display:none;position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto}
.detail-panel.open{display:block}
.dp-head{padding:14px 16px;border-bottom:0.5px solid var(--bg3);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;position:sticky;top:0;background:var(--bg);z-index:1}
.dp-member{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:3px}
.dp-title-input{font-size:14px;font-weight:500;border:none;background:transparent;color:var(--text);font-family:inherit;padding:2px 4px;border-radius:4px;border:0.5px solid transparent;outline:none;width:100%;line-height:1.45}
.dp-title-input:hover{border-color:var(--border);background:var(--bg2)}.dp-title-input:focus{border-color:var(--border2);background:var(--bg2)}
.dp-close{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.dp-close:hover{background:var(--bg2);color:var(--text)}
.dp-meta{padding:10px 16px;border-bottom:0.5px solid var(--bg3);display:flex;flex-direction:column}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--bg3)}
.dp-row:last-child{border-bottom:none}
.dp-lbl{font-size:11px;color:var(--text3)}.dp-val{font-size:12px;font-weight:500;color:var(--text)}
.dp-edit{font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text);font-family:inherit;padding:2px 5px;border-radius:4px;border:0.5px solid transparent;outline:none;width:150px;text-align:right}
.dp-edit:hover{border-color:var(--border);background:var(--bg2)}.dp-edit:focus{border-color:var(--border2);background:var(--bg2)}
.dp-sec{font-size:10px;font-weight:600;color:var(--text3);padding:12px 16px 6px;letter-spacing:.06em;text-transform:uppercase}
.progress-wrap{padding:0 16px 12px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:var(--pill);background:var(--text)}
.progress-bar-fill.done-bar{background:var(--green)}.progress-bar-fill.over-bar{background:var(--red)}
.timeline{padding:0 16px 12px;display:flex;flex-direction:column}
.tl-item{display:flex;gap:8px;position:relative}
.tl-line{position:absolute;left:5px;top:13px;bottom:-2px;width:1px;background:var(--border)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);background:var(--bg);position:relative;z-index:1}
.tl-dot.create{background:var(--blue);border-color:var(--blue)}.tl-dot.status{background:var(--orange);border-color:var(--orange)}.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-body{flex:1;padding-bottom:12px;min-width:0}
.tl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.tl-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;flex-shrink:0;opacity:0;display:flex;align-items:center;justify-content:center}
.tl-item:hover .tl-del{opacity:1}.tl-del:hover{background:var(--red-bg);color:var(--red)}
.tl-author{font-size:10px;font-weight:600;padding:1px 5px;border-radius:var(--pill);background:var(--purple-bg);color:var(--purple-t);margin-right:4px}
.tl-text{font-size:12px;line-height:1.5;color:var(--text2)}.tl-date{font-size:10px;color:var(--text3);margin-top:2px}
.dp-note{padding:12px 16px}
.note-input{width:100%;padding:8px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;resize:none;height:58px}
.note-input:focus{outline:none;border-color:var(--border2)}
.note-submit{width:100%;margin-top:6px;padding:7px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.note-submit:hover{opacity:.82}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);align-items:center;justify-content:center;z-index:200}
.overlay.show{display:flex}
.modal{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:1.5rem;width:100%;max-width:420px;margin:1rem;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.fg{margin-bottom:1rem}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--border2)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{padding:7px 16px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer}
.btn-ok{padding:7px 18px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);font-size:12px;font-weight:500;padding:8px 18px;border-radius:var(--pill);opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:768px){.sidebar{display:none}.main-wrap{margin-left:0}.stats{grid-template-columns:repeat(2,1fr)}.detail-panel{position:fixed;inset:0;width:100%;max-width:100%;border-radius:0;z-index:150;max-height:100vh}.resizer{display:none}}

</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">GZ Plan</div><div class="sb-brand-sub">경영기획팀</div></div>
  <div class="sb-user">
    <div class="sb-avatar" id="sbAvatar">--</div>
    <div><div class="sb-user-name" id="sbUserName"></div><div class="sb-user-role" id="sbUserRole">팀원</div></div>
  </div>
  <div class="sb-nav">
    <div class="sb-sec">업무</div>
    <div class="sb-item active" data-nav="member.html"><div class="sb-icon">☐</div><div class="sb-label">내 업무</div><div class="sb-badge" id="urgentBadge" style="display:none"></div></div>
    <div class="sb-sec">도구</div>
    <div class="sb-item" data-nav="calendar.html"><div class="sb-icon">▦</div><div class="sb-label">캘린더</div></div>
    <div class="sb-item" data-nav="meeting.html"><div class="sb-icon">◈</div><div class="sb-label">회의록</div></div>
    <div class="sb-item" data-nav="memo.html"><div class="sb-icon">◉</div><div class="sb-label">메모장</div></div>
  </div>
  <div class="sb-bottom">
    <div class="sb-sync"><div class="sync-dot" id="syncDot"></div><span>실시간 동기화</span></div>
    <button class="btn-ghost" id="logoutBtn" style="width:100%;font-size:11px;padding:5px">로그아웃</button>
    <button class="btn-ghost" id="notifBtn" style="width:100%;font-size:11px;padding:5px">🔔 알림 설정</button>
  </div>
</div>
<div class="main-wrap">
  <div class="topbar">
    <div class="page-title" id="pageTitle">내 업무</div>
    <div class="topbar-right">
      <button class="btn-solid" id="addTaskBtn">+ 업무 추가</button>
    </div>
  </div>
  <div style="flex:1;padding:20px 24px 80px;display:flex;gap:16px;align-items:flex-start">
    <div style="flex:1;min-width:0">
      <div class="stats" id="statsRow"></div>
      <div class="filter-row" id="filterRow">
        <button class="chip active" data-f="active">전체</button>
        <button class="chip" data-f="todo">대기</button>
        <button class="chip" data-f="inprogress">진행 중</button>
        <button class="chip" data-f="done">완료</button>
        <button class="chip" data-f="stale">⚠ 오래된 업무</button>
      </div>
      <div class="filter-row" id="assigneeRow"></div>
      <div class="task-list" id="taskList"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="dp-head">
        <div style="flex:1;min-width:0">
          <input class="dp-title-input" id="dpTitle"/>
        </div>
        <button class="dp-close" id="closeDetailBtn">✕</button>
      </div>
      <div class="dp-meta" id="dpMeta"></div>
      <div class="dp-sec">히스토리</div>
      <div class="timeline" id="dpTimeline"></div>
      <div class="dp-note">
        <textarea class="note-input" id="noteInput" placeholder="메모 또는 업데이트 입력..."></textarea>
        <button class="note-submit" id="addNoteBtn">메모 추가</button>
      </div>
    </div>
  </div>
</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>새 업무 추가</h3>
    <div class="fg"><label>업무명</label><input id="iTitle" placeholder="업무 내용을 입력하세요"/></div>
    <div class="fg"><label>설명 (선택)</label><input id="iDesc" placeholder="상세 설명"/></div>
    <div class="fg"><label>중요도</label>
      <select id="iPriority">
        <option value="3">3 — 보통</option><option value="5">5 — 매우 긴급</option>
        <option value="4">4 — 긴급</option><option value="2">2 — 낮음</option><option value="1">1 — 매우 낮음</option>
      </select>
    </div>
    <div class="fg"><label>시작일</label><input id="iStart" type="date"/></div>
    <div class="fg"><label>마감일</label><input id="iDue" type="date"/></div>
    <div class="fg"><label>최종보고자 (선택)</label><select id="iReporter"><option value="">없음</option></select></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="modalCancelBtn">취소</button>
      <button class="btn-ok" id="addTaskOkBtn">추가하기</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc, getDoc,
  onSnapshot, addDoc, updateDoc, deleteDoc,
  serverTimestamp, query, orderBy
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyA7KylsSyT3_0oQvhBtcrPc-gcdfVq90IQ",
  authDomain:        "gzplan.firebaseapp.com",
  projectId:         "gzplan",
  storageBucket:     "gzplan.firebasestorage.app",
  messagingSenderId: "186255862586",
  appId:             "1:186255862586:web:f36d21f76012ca43b8fe03",
};
const DAY_MS    = 86400000;
const STALE_DAYS = 14;
let REPORTERS   = [];

const db  = getFirestore(initializeApp(FIREBASE_CONFIG));
const sess = localStorage.getItem('tt_user');
if (!sess) { location.href = 'index.html'; throw ''; }
let ME;
try { ME = JSON.parse(sess); } catch { localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html'; throw ''; }
if (!ME?.id || !ME?.role) { localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html'; throw ''; }
if (ME.role === 'manager' || ME.role === 'admin') { location.href = 'manager.html'; throw ''; }
if (ME.role !== 'member') { localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html'; throw ''; }



async function loadReporters() {
  try {
    const snap = await getDoc(doc(db, 'settings', 'reporters'));
    REPORTERS = snap.exists() ? (snap.data().list || []) : ['CEO', '홀딩스', '본부장'];
  } catch { REPORTERS = ['CEO', '홀딩스', '본부장']; }
  const sel = document.getElementById('iReporter');
  if (sel) sel.innerHTML = '<option value="">없음</option>' +
    REPORTERS.map(r => `<option value="${r}">${r}</option>`).join('');
}

const col = ()     => collection(db, 'tasks', ME.id, 'items');
const dr  = id     => doc(db, 'tasks', ME.id, 'items', id);

const fsAdd = data   => addDoc(col(), { ...data, createdAt: serverTimestamp() });
const fsUpd = (id, data) => updateDoc(dr(id), data);
const fsDel = id     => deleteDoc(dr(id));

// ════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════
let tasks   = [];
let selId   = null;
let filter  = 'active';  // 기본값: 대기+진행중
let filterA = 'all';

let dragId  = null;

// ════════════════════════════════════════════
// 유틸 함수
// ════════════════════════════════════════════
const now   = ()  => new Date().toISOString();
const setSync = v => { const _sd=document.getElementById('syncDot');if(_sd)_sd.classList.toggle('syncing',v); };

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// 날짜 포맷: "2026. 3. 31. 14:30" 형식
function fmtDate(s) {
  if (!s) return '-';
  const d = new Date(s);
  const isDateOnly = s.length <= 10;
  const base = `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}.`;
  if (isDateOnly) return base;
  return `${base} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

// 날짜 포맷: "3/31" 형식 (카드 표시용)
function fmtShort(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

// 업데이트 경과 시간: "방금" / "30분" / "3시간" / "2일"
function timeAgo(s) {
  const diff = Date.now() - new Date(s).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1)  return '방금';
  if (mins < 60) return `${mins}분`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}시간`;
  return `${Math.floor(hrs / 24)}일`;
}

// 업무 상태 판별
const isOverdue = t => t.due && t.status !== 'done' && new Date(t.due) < new Date();
const isStale   = t => {
  if (t.status === 'done') return false;
  return Date.now() - new Date(t.updated).getTime() >= STALE_DAYS * DAY_MS;
};

// 중요도 바 색상

function priorityColor(p){return['','#c0c0bc','#378ADD','#EF9F27','#E24B4A','#A32D2D'][p||3]||'#c0c0bc'}
// 중요도 배지 클래스
function priorityCls(p) {
  const n = p || 3;
  return 'priority-badge ' + ['','p1','p2','p3','p4','p5'][n];
}

// 상세패널 토글
window.togglePriorityEdit = id => {
  document.getElementById('dp-priority-row-' + id).style.display =
    document.getElementById('dp-priority-row-' + id).style.display === 'none' ? '' : 'none';
  const edit = document.getElementById('dp-priority-edit-' + id);
  edit.style.display = edit.style.display === 'none' ? '' : 'none';
  if (edit.style.display !== 'none') edit.querySelector('select').focus();
};

window.toggleReporterEdit = id => {
  document.getElementById('dp-reporter-row-' + id).style.display =
    document.getElementById('dp-reporter-row-' + id).style.display === 'none' ? '' : 'none';
  const edit = document.getElementById('dp-reporter-edit-' + id);
  edit.style.display = edit.style.display === 'none' ? '' : 'none';
  if (edit.style.display !== 'none') edit.querySelector('select').focus();
};

// 중요도 배지 HTML
function priorityBadge(p) {
  const n = p || 3;
  const cls   = ['','p1','p2','p3','p4','p5'][n];
  const label = ['','','','','','🔴'][n] || '';
  const dots  = '●'.repeat(n) + '○'.repeat(5 - n);
  return `<span class="priority-badge ${cls}" title="중요도 ${n}">${label} ${dots}</span>`;
}

// 상태 배지 HTML
function statusBadge(status, id) {
  const labels = { todo: '대기 →', inprogress: '진행 중 →', done: '완료 →' };
  const classes = { todo: 'badge-todo', inprogress: 'badge-inprogress', done: 'badge-done' };
  return `<span class="badge ${classes[status]} badge-status"
    onclick="cycleStat('${id}', event)"
    title="클릭하면 상태 변경">${labels[status]}</span>`;
}

// ════════════════════════════════════════════
// 실시간 데이터 구독
// ════════════════════════════════════════════
onSnapshot(query(col(), orderBy('order', 'asc')), snap => {
  tasks = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
  if (selId) {
    const t = tasks.find(t => t._id === selId);
    if (t) renderDetail(t);
  }
  render();
  setSync(false);
  checkAndNotify(tasks);
});

// ════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════
function render() {
  renderStats();
  renderAssigneeFilter();
  renderTaskList();
}

function renderStats() {
  const total   = tasks.length;
  const inprog  = tasks.filter(t => t.status === 'inprogress').length;
  const stale   = tasks.filter(isStale).length;
  const overdue = tasks.filter(isOverdue).length;

  // 사이드바 긴급 배지
  const urgent = tasks.filter(t => t.status !== 'done' && (isOverdue(t) || (t.priority||3) >= 4)).length;
  const badge  = document.getElementById('urgentBadge');
  if (badge) { badge.style.display = urgent ? '' : 'none'; badge.textContent = urgent; }

  // 통계 카드
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">전체 업무</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">진행 중</div><div class="stat-value">${inprog}</div></div>
    <div class="stat-card"><div class="stat-label">오래된 업무</div><div class="stat-value warn">${stale}</div></div>
    <div class="stat-card"><div class="stat-label">기한 초과</div><div class="stat-value danger">${overdue}</div>`;
}

function renderAssigneeFilter() {
  const aRow = document.getElementById('assigneeRow');
  const assignees = [...new Set(tasks.map(t => t.assignee).filter(Boolean))];
  if (!assignees.length) { aRow.innerHTML = ''; return; }
  let html = '<span class="assignee-label">담당자</span>';
  html += `<button class="chip achip${filterA === 'all' ? ' active' : ''}" data-a="all">전체</button>`;
  assignees.forEach(a => {
    html += `<button class="chip achip${filterA === a ? ' active' : ''}" data-a="${a}">${a}</button>`;
  });
  aRow.innerHTML = html;
  aRow.querySelectorAll('.achip').forEach(btn => {
    btn.addEventListener('click', function () {
      filterA = this.dataset.a;
      aRow.querySelectorAll('.achip').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      render();
    });
  });
}

function renderTaskList() {
  const filtered = tasks.filter(t => {
    const byStatus = filter === 'active' ? t.status !== 'done' : filter === 'all' ? true : filter === 'stale' ? isStale(t) : t.status === filter;
    const byAssign = filterA === 'all' || t.assignee === filterA;
    return byStatus && byAssign;
  });
  // 중요도 내림차순 → 핀 우선 → 마감일 오름차순
  filtered.sort((a, b) => {
    if (b.pinned !== a.pinned) return b.pinned ? 1 : -1;
    const pa = b.priority || 3, pb = a.priority || 3;
    if (pa !== pb) return pa - pb;
    if (a.due && b.due) return new Date(a.due) - new Date(b.due);
    if (a.due) return -1;
    if (b.due) return 1;
    return 0;
  });
  const pinned   = filtered.filter(t => t.pinned);
  const unpinned = filtered.filter(t => !t.pinned);
  const list     = [...pinned, ...unpinned];
  const hasBoth  = pinned.length > 0 && unpinned.length > 0;

  const el = document.getElementById('taskList');
  if (!list.length) { el.innerHTML = '<div class="empty">해당하는 업무가 없습니다</div>'; return; }

  let html = '';
  let dividerShown = false;

  list.forEach(t => {
    // 고정/비고정 구분선
    if (hasBoth && !t.pinned && !dividerShown) {
      html += '<div class="divider">고정되지 않은 업무 · 등록 순</div>';
      dividerShown = true;
    }

    const ov  = isOverdue(t);
    const st  = isStale(t);
    let cls = 'task-card';
    if (t.pinned)    cls += ' pinned';
    else if (ov)     cls += ' overdue';
    else if (st)     cls += ' stale';
    if (selId === t._id) cls += ' selected';

    let flag = '';
    if (t.pinned)    flag = '<span class="flag flag-pinned">📌 고정됨</span>';
    else if (ov)     flag = '<span class="flag flag-overdue">기한 초과</span>';
    else if (st)     flag = '<span class="flag flag-stale">업데이트 필요</span>';

    const ago = timeAgo(t.updated);
    const agoText = ago === '방금' ? '방금 업데이트' : `${ago} 전 업데이트`;

    html += `
      <div class="${cls}" draggable="true" data-id="${t._id}" onclick="selTask('${t._id}')">
        <div class="priority-bar" style="background:${priorityColor(t.priority)}"></div>
        <div class="drag-handle" onclick="event.stopPropagation()">⠿</div>
        <div class="task-check${t.status === 'done' ? ' done' : ''}" onclick="toggleDone('${t._id}', event)"></div>
        <div class="task-body">
          <div class="task-title${t.status === 'done' ? ' done-text' : ''}">${t.title}</div>
          <div class="task-meta">
            ${priorityBadge(t.priority)}
            ${statusBadge(t.status, t._id)}
            ${t.reporter ? `<span class="reporter-badge">${t.reporter}</span>` : ''}
            ${t.due      ? `<span class="task-date${ov ? ' ov' : ''}">마감 ${fmtShort(t.due)}</span>` : ''}
            <span class="task-date">${agoText}</span>
          </div>
        </div>
        <div class="card-right">
          ${flag}
          <button class="pin-btn${t.pinned ? ' on' : ''}" onclick="togglePin('${t._id}', event)">
            ${t.pinned ? '📌' : '☆'}
          </button>
          <button class="del-btn" onclick="deleteTask('${t._id}', event)">✕</button>
        </div>
      </div>`;
  });

  el.innerHTML = html;
  initDrag();
}

function renderDetail(t) {
  document.getElementById('dpTitle').value = t.title;

  const statusLabel = { todo: '대기', inprogress: '진행 중', done: '완료' };
  const descRow = t.desc
    ? `<div class="dp-row" style="align-items:flex-start;gap:8px">
        <span class="dp-lbl" style="flex-shrink:0">설명</span>
        <span class="dp-val" style="text-align:right;word-break:break-all;line-height:1.5">${t.desc}</span>
       </div>`
    : '';

  const priorityOpts = [5,4,3,2,1].map(p =>
    `<option value="${p}" ${(t.priority||3)==p?'selected':''}>${p} — ${{5:'매우 긴급',4:'긴급',3:'보통',2:'낮음',1:'매우 낮음'}[p]}</option>`
  ).join('');
  const reporterOpts = ['', ...REPORTERS].map(r =>
    `<option value="${r}" ${(t.reporter||'')==r?'selected':''}>${r||'없음'}</option>`
  ).join('');

  // 진행 바 계산
  const progressBar = (() => {
    if (!t.startDate || !t.due) return '';
    const start   = new Date(t.startDate);
    const end     = new Date(t.due);
    const today   = new Date(); today.setHours(0,0,0,0);
    const total   = Math.ceil((end - start) / 86400000);
    const elapsed = Math.ceil((today - start) / 86400000);
    if (total <= 0) return '';
    const pct     = Math.min(100, Math.max(0, Math.round(elapsed / total * 100)));
    const isDone  = t.status === 'done';
    const isOver  = elapsed > total && !isDone;
    const fillCls = isDone ? 'done-bar' : isOver ? 'over-bar' : '';
    const label   = isDone ? '완료' : isOver
      ? `기한 초과 +${elapsed - total}일`
      : `${Math.max(0, elapsed)}일 / ${total}일 (${pct}%)`;
    return `<div class="progress-wrap">
      <div class="progress-label"><span>진행</span><span>${label}</span></div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill ${fillCls}" style="width:${pct}%"></div>
      </div>
    </div>`;
  })();

  document.getElementById('dpMeta').innerHTML = `
    ${descRow}
    <div class="dp-row" id="dp-priority-row-${t._id}">
      <span class="dp-lbl">중요도</span>
      <span class="${priorityCls(t.priority)}" onclick="togglePriorityEdit('${t._id}')">
        ${{5:'매우 긴급',4:'긴급',3:'보통',2:'낮음',1:'매우 낮음'}[t.priority||3]} ✎
      </span>
    </div>
    <div class="dp-row" id="dp-priority-edit-${t._id}" style="display:none">
      <span class="dp-lbl">중요도</span>
      <select class="dp-edit" style="width:160px;text-align:right"
        onchange="updatePriority('${t._id}',this.value);togglePriorityEdit('${t._id}')">${priorityOpts}</select>
    </div>
    <div class="dp-row">
      <span class="dp-lbl">시작일</span>
      <input class="dp-edit" type="date" value="${t.startDate || ''}"
        onchange="updateStartDate('${t._id}', this.value)" style="width:140px;text-align:right" />
    </div>
    <div class="dp-row">
      <span class="dp-lbl">마감일</span>
      <input class="dp-edit" type="date" value="${t.due || ''}"
        onchange="updateDue('${t._id}', this.value)" style="width:140px;text-align:right" />
    </div>
    <div class="dp-row">
      <span class="dp-lbl">마지막 업데이트</span>
      <span class="dp-val">${fmtDate(t.updated)}</span>
    </div>
    ${progressBar ? `<div style="padding:4px 0">${progressBar}</div>` : ''}
    <div class="dp-row">
      <span class="dp-lbl">상태</span>
      <span class="badge ${t.status==='todo'?'badge-todo':t.status==='inprogress'?'badge-inprogress':'badge-done'}">${statusLabel[t.status]||'-'}</span>
    </div>
    <div class="dp-row" id="dp-reporter-row-${t._id}">
      <span class="dp-lbl">최종보고자</span>
      <span class="reporter-badge" onclick="toggleReporterEdit('${t._id}')">
        ${t.reporter || '없음'} ✎
      </span>
    </div>
    <div class="dp-row" id="dp-reporter-edit-${t._id}" style="display:none">
      <span class="dp-lbl">최종보고자</span>
      <select class="dp-edit" style="width:160px;text-align:right"
        onchange="updateReporter('${t._id}',this.value);toggleReporterEdit('${t._id}')">${reporterOpts}</select>
    </div>`;

  // 타임라인(히스토리)
  const history = [...(t.history || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
  document.getElementById('dpTimeline').innerHTML = history.map((h, i) => `
    <div class="tl-item">
      <div class="tl-dot ${h.type}"></div>
      ${i < history.length - 1 ? '<div class="tl-line"></div>' : ''}
      <div class="tl-body">
        <div class="tl-row">
          <div class="tl-text">
            ${h.author ? `<span class="tl-author">${h.author}</span>` : ''}
            ${h.text}
          </div>
          <button class="tl-del" onclick="deleteHistory('${t._id}', '${h.id}')">✕</button>
        </div>
        <div class="tl-date">${fmtDate(h.date)}</div>
      </div>
    </div>`).join('');
}

// ════════════════════════════════════════════
// 이벤트 핸들러 — 필터
// ════════════════════════════════════════════
window.setFilter = (f, el) => {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
};

// ════════════════════════════════════════════
// 이벤트 핸들러 — 상세 패널
// ════════════════════════════════════════════
window.selTask = id => {
  selId = id;
  const t = tasks.find(t => t._id === id);
  if (!t) return;
  document.getElementById('detailPanel').classList.add('open');
  renderDetail(t);
  render();
};

window.closeDetail = () => {
  selId = null;
  document.getElementById('detailPanel').classList.remove('open');
  render();
};

// ════════════════════════════════════════════
// 이벤트 핸들러 — 업무 CRUD
// ════════════════════════════════════════════
window.togglePin = async (id, e) => {
  e.stopPropagation();
  setSync(true);
  const t = tasks.find(t => t._id === id);
  if (t) await fsUpd(id, { pinned: !t.pinned });
};

window.toggleDone = async (id, e) => {
  e.stopPropagation();
  setSync(true);
  const t = tasks.find(t => t._id === id);
  if (!t) return;
  const ts = now();
  const newStatus = t.status === 'done' ? 'todo' : 'done';
  const histEntry = newStatus === 'done'
    ? { id: Date.now() + '', type: 'done',   text: '업무 완료 처리되었습니다.', date: ts }
    : { id: Date.now() + '', type: 'status', text: '완료 취소 처리되었습니다.', date: ts };
  await fsUpd(id, { status: newStatus, updated: ts, history: [...(t.history || []), histEntry] });
};

window.cycleStat = async (id, e) => {
  e.stopPropagation();
  setSync(true);
  const t = tasks.find(t => t._id === id);
  if (!t) return;
  const ts = now();
  const next  = { todo: 'inprogress', inprogress: 'done', done: 'todo' };
  const label = { todo: '대기', inprogress: '진행 중', done: '완료' };
  const newStatus = next[t.status];
  await fsUpd(id, {
    status: newStatus, updated: ts,
    history: [...(t.history || []), {
      id: Date.now() + '', type: 'status',
      text: `상태 변경: ${label[t.status]} → ${label[newStatus]}`,

window.addTask = async () => {

  setSync(true);

    title,
    desc:    document.getElementById('iDesc').value.trim(),
    assignee: ME.id,
    startDate: document.getElementById('iStart').value || '',

    status:   'todo',

// ════════════════════════════════════════════
// 드래그 앤 드롭 정렬
// ════════════════════════════════════════════
function initDrag() {
  const list = document.getElementById('taskList');
  list.querySelectorAll('.task-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', () => {
      dragId = card.dataset.id;
      setTimeout(() => card.classList.add('dragging-card'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging-card');
      list.querySelectorAll('.drag-over-card').forEach(c => c.classList.remove('drag-over-card'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      list.querySelectorAll('.drag-over-card').forEach(c => c.classList.remove('drag-over-card'));
      card.classList.add('drag-over-card');
    });
    card.addEventListener('drop', async e => {
      e.preventDefault();
      card.classList.remove('drag-over-card');
      const dropId = card.dataset.id;
      if (dragId === dropId) return;
      setSync(true);
      const from = tasks.find(t => t._id === dragId);
      const to   = tasks.find(t => t._id === dropId);
      if (from && to) await fsUpd(dragId, { order: (to.order || 0) - 1 });
    });
  });
}

// ════════════════════════════════════════════
// 상세 패널 리사이즈
// ════════════════════════════════════════════
(function initResizer() {
  const resizer = document.getElementById('resizer');
  const panel   = document.getElementById('detailPanel');
  let startX, startW;

  resizer.addEventListener('mousedown', e => {
    if (!panel.classList.contains('open')) return;
    startX = e.clientX;
    startW = panel.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const onMove = e => {
      panel.style.width = Math.min(560, Math.max(220, startW + (startX - e.clientX))) + 'px';
    };
    const onUp = () => {
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ════════════════════════════════════════════
const VAPID_PUBLIC_KEY = ''; // ★ 선택사항: VAPID 키 없이도 로컬 알림 작동

// Service Worker 등록

// 알림 권한 상태 표시
function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  if (!('Notification' in window)) { btn.style.display = 'none'; return; }
  if (Notification.permission === 'granted') {
    btn.textContent = '🔔 알림 ON';
    btn.style.color = '#27500A';
  } else if (Notification.permission === 'denied') {
    btn.textContent = '🔕 알림 차단됨';
    btn.style.color = 'var(--text3)';
  } else {
    btn.textContent = '🔔 알림';
  }
}
updateNotifBtn();

// 알림 권한 요청 / 해제
window.toggleNotification = async () => {
  if (!('Notification' in window)) { toast('이 브라우저는 알림을 지원하지 않아요'); return; }
  if (Notification.permission === 'denied') {
    toast('브라우저 설정에서 알림 차단을 해제해주세요');
    return;
  }
  const perm = await Notification.requestPermission();
  updateNotifBtn();
  if (perm === 'granted') {
    toast('알림이 활성화됐어요 ✓');
    checkAndNotify(tasks); // 즉시 한 번 체크
  } else {
    toast('알림 권한이 거부됐어요');
  }
};

// 알림 체크 — onSnapshot 업데이트마다 호출
function checkAndNotify(taskList) {
  if (Notification.permission !== 'granted') return;
  if (document.visibilityState === 'visible') return; // 앱 보고 있으면 알림 안 띄움

  const today    = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);

  taskList.forEach(t => {
    if (t.status === 'done') return;
    const notifKey = `notified_${t._id}`;

    // 마감 D-1 알림
    if (t.due) {
      const due = new Date(t.due);
      const isDue     = due.getTime() === today.getTime();
      const isTomorrow = due.getTime() === tomorrow.getTime();
      if ((isDue || isTomorrow) && !localStorage.getItem(notifKey + '_due_' + t.due)) {
        const label = isDue ? '오늘 마감' : '내일 마감';
        showNotification(`⚠️ ${label}: ${t.title}`, `마감일이 ${isDue ? '오늘' : '내일'}이에요`);
        localStorage.setItem(notifKey + '_due_' + t.due, '1');
      }
    }

    // 오래된 업무 알림 (14일 이상)
    if (isStale(t) && !localStorage.getItem(notifKey + '_stale')) {
      showNotification(`📋 오래된 업무: ${t.title}`, '14일 이상 업데이트가 없어요');
      localStorage.setItem(notifKey + '_stale', '1');
    }
  });
}

function showNotification(title, body) {
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'notify', title, body });
  } else {
    new Notification(title, { body, icon: '/favicon.ico' });
  }
}

// Service Worker 메시지 → 알림 표시
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'notify') {
      new Notification(e.data.title, { body: e.data.body, icon: '/favicon.ico' });
    }
  });
}

// ── 버튼 바인딩 (일반 script - 즉시 실행) ──
// window.xxx 함수는 module 스크립트에서 등록되므로 DOMContentLoaded 후 바인딩
document.addEventListener('DOMContentLoaded', function() {
  // 로그아웃
  var logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) logoutBtn.addEventListener('click', function() {
    localStorage.removeItem('tt_user');
    sessionStorage.clear();
    location.href = 'index.html';
  });

  // 사이드바 네비
  document.querySelectorAll('[data-nav]').forEach(function(el) {
    el.addEventListener('click', function() { location.href = el.dataset.nav; });
  });

  // 업무 추가 버튼
  var addTaskBtn = document.getElementById('addTaskBtn');
  if (addTaskBtn) addTaskBtn.addEventListener('click', function() {
    if (window.openModal) window.openModal();
  });

  // 알림 버튼
  var notifBtn = document.getElementById('notifBtn');
  if (notifBtn) notifBtn.addEventListener('click', function() {
    if (window.toggleNotification) window.toggleNotification();
  });

  // 모달 버튼들
  var cancelBtn = document.getElementById('modalCancelBtn');
  if (cancelBtn) cancelBtn.addEventListener('click', function() {
    if (window.closeModal) window.closeModal();
  });
  var okBtn = document.getElementById('addTaskOkBtn');
  if (okBtn) okBtn.addEventListener('click', function() {
    if (window.addTask) window.addTask();
  });
  var noteBtn = document.getElementById('addNoteBtn');
  if (noteBtn) noteBtn.addEventListener('click', function() {
    if (window.addNote) window.addNote();
  });
  var closeDetailBtn = document.getElementById('closeDetailBtn');
  if (closeDetailBtn) closeDetailBtn.addEventListener('click', function() {
    if (window.closeDetail) window.closeDetail();
  });

  // 필터 칩 (이벤트 위임)
  var filterRow = document.getElementById('filterRow');
  if (filterRow) filterRow.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-f]');
    if (btn && window.setFilter) window.setFilter(btn.dataset.f, btn);
  });

  // 오버레이 닫기
  var overlay = document.getElementById('overlay');
  if (overlay) overlay.addEventListener('click', function(e) {
    if (e.target === e.currentTarget && window.closeModal) window.closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && window.closeModal) window.closeModal();
  });
});
</script>
