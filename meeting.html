<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="GZ기획팀" />
<meta name="theme-color" content="#185FA5" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>회의록 — GZ 경영기획팀</title>
<style>
/* ════════════════════════════════════════════
   GZ Plan — 공통 반응형 CSS
   PC(1024+) / Tablet(768-1023) / Mobile(~767)
════════════════════════════════════════════ */

/* ── Reset & 변수 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ee;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a8a8a8;
  --border:#e5e5e3;--border2:#d0d0cc;
  --radius:10px;--radius-sm:6px;--pill:999px;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --green:#639922;--green-bg:#EAF3DE;--green-t:#27500A;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-t:#791F1F;
  --orange:#EF9F27;
  --purple-bg:#EEEDFE;--purple-t:#3C3489;
  --sw:220px;
  --topbar-h:52px;
  --touch-min:44px;
}

/* ── 기본 ── */
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;
  background:var(--bg2);color:var(--text);min-height:100vh;font-size:14px;
  -webkit-text-size-adjust:100%}
.app{display:flex;min-height:100vh}

/* ── 사이드바 ── */
.sidebar{
  width:var(--sw);flex-shrink:0;
  background:var(--bg);border-right:0.5px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;z-index:300;
  transition:transform .25s ease;overflow:hidden;
}
.sb-brand{padding:18px 16px 14px;border-bottom:0.5px solid var(--bg3);flex-shrink:0}
.sb-brand-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.sb-brand-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--bg3);flex-shrink:0}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--text);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:var(--bg);flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:11px;color:var(--text3)}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto;overflow-x:hidden}
.sb-sec{padding:4px 16px;font-size:10px;font-weight:600;color:var(--text3);
  letter-spacing:.08em;text-transform:uppercase;margin-top:10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;
  cursor:pointer;margin:1px 8px;border-radius:var(--radius-sm);
  transition:background .12s;min-height:var(--touch-min)}
.sb-item:hover{background:var(--bg2)}
.sb-item.active{background:var(--bg3)}
.sb-item.active .sb-label,.sb-item.active .sb-icon{color:var(--text);font-weight:500}
.sb-icon{font-size:15px;width:22px;text-align:center;color:var(--text2);flex-shrink:0}
.sb-label{font-size:13px;color:var(--text2);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--pill);
  background:var(--red-bg);color:var(--red);flex-shrink:0}
.sb-bottom{padding:12px 16px;border-top:0.5px solid var(--bg3);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.sb-sync{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--orange);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 메인 ── */
.main-wrap{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}

/* ── 탑바 ── */
.topbar{
  background:var(--bg);border-bottom:0.5px solid var(--border);
  padding:0 24px;height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;flex-shrink:0;gap:12px;
}
.page-title{font-size:15px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.topbar-right{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}

/* ── 햄버거 ── */
.hamburger{
  display:none;width:36px;height:36px;border:none;background:transparent;
  cursor:pointer;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;padding:4px;border-radius:var(--radius-sm);flex-shrink:0;
}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px}
.hamburger:hover{background:var(--bg2)}
.sidebar-dim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:290}
.sidebar-dim.show{display:block}

/* ── 버튼 ── */
.btn-ghost{
  padding:0 14px;height:34px;border-radius:var(--radius-sm);font-size:12px;
  border:0.5px solid var(--border);background:transparent;color:var(--text2);
  cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;
}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-solid{
  padding:0 16px;height:34px;border-radius:var(--radius-sm);font-size:12px;
  font-weight:600;border:none;background:var(--text);color:var(--bg);
  cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;
}
.btn-solid:hover{opacity:.82}

/* ── 모달/오버레이 ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
  z-index:400;padding:1rem;overflow-y:auto;
}
.overlay.show{display:flex}
.modal{
  background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);
  padding:1.5rem;width:100%;max-width:440px;
  max-height:calc(100vh - 2rem);overflow-y:auto;
  position:relative;
}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}
.btn-cancel{
  padding:0 16px;height:34px;font-size:12px;
  border:0.5px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text2);cursor:pointer;
}
.btn-ok{
  padding:0 18px;height:34px;font-size:12px;font-weight:600;
  border:none;border-radius:var(--radius-sm);
  background:var(--text);color:var(--bg);cursor:pointer;
}
.btn-danger{
  padding:0 16px;height:34px;font-size:12px;
  border:none;border-radius:var(--radius-sm);
  background:var(--red);color:#fff;cursor:pointer;margin-right:auto;
}
.fg{margin-bottom:1rem}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;
  font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{
  width:100%;padding:8px 10px;font-size:13px;
  border:0.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg2);color:var(--text);font-family:inherit;outline:none;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--border2)}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:2rem;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--text);color:var(--bg);
  font-size:12px;font-weight:500;padding:8px 18px;
  border-radius:var(--pill);opacity:0;transition:all .25s;
  pointer-events:none;z-index:500;white-space:nowrap;
  max-width:calc(100vw - 2rem);text-overflow:ellipsis;overflow:hidden;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 통계 카드 ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px;white-space:nowrap}
.stat-value{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.stat-value.warn{color:#BA7517}.stat-value.danger{color:var(--red)}

/* ── 필터 칩 ── */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.chip{
  padding:5px 12px;border-radius:var(--pill);font-size:12px;
  border:0.5px solid var(--border);background:var(--bg);color:var(--text2);
  cursor:pointer;white-space:nowrap;min-height:30px;
  display:inline-flex;align-items:center;
}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ── 업무 카드 ── */
.task-list{display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px}
.task-card{
  background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:border-color .12s;position:relative;
  min-height:var(--touch-min);
}
.task-card:hover{border-color:var(--border2)}.task-card.selected{border-color:var(--text)}
.task-card.pinned{border-left:3px solid var(--blue)}
.task-card.overdue{border-left:3px solid var(--red)}
.task-card.stale{border-left:3px solid var(--orange)}
.priority-bar{width:3px;border-radius:var(--pill);align-self:stretch;flex-shrink:0;min-height:32px}
.drag-handle{color:var(--text3);font-size:14px;cursor:grab;user-select:none;flex-shrink:0}
.task-check{
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid var(--border2);flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.task-check:hover{border-color:var(--text)}
.task-check.done{background:var(--text);border-color:var(--text)}
.task-check.done::after{content:'';width:5px;height:3px;
  border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);
  transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{
  font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;white-space:nowrap}
.badge-todo{background:var(--blue-bg);color:var(--blue-t)}
.badge-inprogress{background:var(--amber-bg);color:var(--amber-t)}
.badge-done{background:var(--green-bg);color:var(--green-t)}
.badge-status{cursor:pointer;user-select:none}.badge-status:hover{opacity:.75}
.badge-reporter{background:var(--purple-bg);color:var(--purple-t)}
.member-badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;background:var(--bg3);color:var(--text2)}
.task-date{font-size:11px;color:var(--text3);white-space:nowrap}
.task-date.ov{color:var(--red);font-weight:600}
.card-right{position:absolute;top:10px;right:12px;display:flex;gap:4px;align-items:center}
.pin-btn,.del-btn{
  width:28px;height:28px;border-radius:var(--radius-sm);
  border:none;background:transparent;cursor:pointer;
  font-size:13px;color:var(--text3);
  display:flex;align-items:center;justify-content:center;
}
.pin-btn:hover{background:var(--bg3);color:var(--text)}.pin-btn.on{color:var(--blue)}
.del-btn:hover{background:var(--red-bg);color:var(--red)}

/* ── 중요도/보고자 배지 ── */
.priority-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block;white-space:nowrap}
.priority-badge.p1{background:#f0f0ee;color:#888}
.priority-badge.p2{background:var(--blue-bg);color:var(--blue-t)}
.priority-badge.p3{background:var(--amber-bg);color:var(--amber-t)}
.priority-badge.p4{background:var(--red-bg);color:var(--red)}
.priority-badge.p5{background:var(--red);color:#fff}
.reporter-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block;background:var(--purple-bg);color:var(--purple-t);white-space:nowrap}

/* ── 상세 패널 ── */
.resizer{width:12px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center}
.resizer::after{content:'';width:3px;height:30px;background:var(--border);border-radius:var(--pill)}
.resizer:hover::after{background:var(--border2);height:46px}
.detail-panel{
  width:300px;min-width:260px;flex-shrink:0;
  background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);
  display:none;position:sticky;top:calc(var(--topbar-h) + 20px);
  max-height:calc(100vh - var(--topbar-h) - 40px);overflow-y:auto;
}
.detail-panel.open{display:block}
.dp-head{
  padding:14px 16px;border-bottom:0.5px solid var(--bg3);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  position:sticky;top:0;background:var(--bg);z-index:1;
}
.dp-member{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:3px}
.dp-title-input{
  font-size:14px;font-weight:500;border:none;background:transparent;
  color:var(--text);font-family:inherit;padding:2px 4px;
  border-radius:4px;border:0.5px solid transparent;outline:none;
  width:100%;line-height:1.45;
}
.dp-title-input:hover{border-color:var(--border);background:var(--bg2)}
.dp-title-input:focus{border-color:var(--border2);background:var(--bg2)}
.dp-close{
  width:28px;height:28px;border-radius:var(--radius-sm);
  border:none;background:transparent;color:var(--text3);
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dp-close:hover{background:var(--bg2);color:var(--text)}
.dp-meta{padding:10px 16px;display:flex;flex-direction:column}
.dp-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:0.5px solid var(--bg3);gap:8px;
}
.dp-row:last-child{border-bottom:none}
.dp-lbl{font-size:11px;color:var(--text3);flex-shrink:0}
.dp-val{font-size:12px;font-weight:500;color:var(--text);text-align:right;word-break:break-word}
.dp-edit{
  font-size:12px;font-weight:500;border:none;background:transparent;
  color:var(--text);font-family:inherit;padding:2px 5px;
  border-radius:4px;border:0.5px solid transparent;outline:none;
  max-width:150px;text-align:right;width:auto;
}
.dp-edit:hover{border-color:var(--border);background:var(--bg2)}
.dp-edit:focus{border-color:var(--border2);background:var(--bg2)}
.dp-sec{font-size:10px;font-weight:600;color:var(--text3);padding:12px 16px 6px;letter-spacing:.06em;text-transform:uppercase}
.progress-wrap{padding:0 16px 12px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:var(--pill);background:var(--text)}
.progress-bar-fill.done-bar{background:var(--green)}.progress-bar-fill.over-bar{background:var(--red)}
.timeline{padding:0 16px 12px;display:flex;flex-direction:column}
.tl-item{display:flex;gap:8px;position:relative}
.tl-line{position:absolute;left:5px;top:13px;bottom:-2px;width:1px;background:var(--border)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);background:var(--bg);position:relative;z-index:1}
.tl-dot.create{background:var(--blue);border-color:var(--blue)}
.tl-dot.status{background:var(--orange);border-color:var(--orange)}
.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-body{flex:1;padding-bottom:12px;min-width:0}
.tl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.tl-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;flex-shrink:0;opacity:0;display:flex;align-items:center;justify-content:center}
.tl-item:hover .tl-del{opacity:1}.tl-del:hover{background:var(--red-bg);color:var(--red)}
.tl-author{font-size:10px;font-weight:600;padding:1px 5px;border-radius:var(--pill);background:var(--purple-bg);color:var(--purple-t);margin-right:4px}
.tl-text{font-size:12px;line-height:1.5;color:var(--text2);word-break:break-word}
.tl-date{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap}
.dp-note{padding:12px 16px}
.note-input{width:100%;padding:8px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;resize:none;height:58px}
.note-input:focus{outline:none;border-color:var(--border2)}
.note-submit{width:100%;margin-top:6px;padding:0;height:34px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.note-submit:hover{opacity:.82}
.divider{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;padding:4px 0 6px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* ── 터치 지원 ── */
button,[onclick],[data-nav],.sb-item,.task-card,.chip{
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}

/* ══════════════════════════════════════════
   반응형 — 태블릿 (768px ~ 1023px)
══════════════════════════════════════════ */
@media(max-width:1023px){
  :root{--sw:200px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-panel{width:280px;min-width:240px}
}

/* ══════════════════════════════════════════
   반응형 — 모바일 (~ 767px)
══════════════════════════════════════════ */
@media(max-width:767px){
  :root{--sw:240px;--topbar-h:48px}

  /* 사이드바 슬라이드 */
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}

  /* 햄버거 표시 */
  .hamburger{display:flex}

  /* 메인 영역 */
  .main-wrap{margin-left:0}
  .topbar{padding:0 14px;gap:8px}
  .page-title{font-size:14px}

  /* 통계 2열 */
  .stats{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
  .stat{padding:12px}
  .stat-value{font-size:18px}

  /* 필터 스크롤 */
  .filter-row{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .filter-row::-webkit-scrollbar{display:none}

  /* 카드 */
  .task-card{padding:10px 12px;gap:8px}
  .task-title{font-size:12px}
  .card-right{position:static;margin-left:auto;flex-shrink:0}

  /* 상세 패널 전체화면 */
  .detail-panel{
    position:fixed;inset:0;width:100%;max-width:100%;
    border-radius:0;z-index:350;max-height:100vh;
    top:0!important;
  }
  .resizer{display:none}

  /* 모달 */
  .modal{max-width:100%;margin:0;border-radius:var(--radius) var(--radius) 0 0;
    position:fixed;bottom:0;left:0;right:0;max-height:90vh;}
  .overlay{align-items:flex-end;padding:0}

  /* 버튼 크기 */
  .btn-ghost,.btn-solid,.btn-ok,.btn-cancel{height:38px;font-size:13px}
  .chip{min-height:34px;padding:5px 12px}
}

/* ── 페이지 고유 CSS ── */

/* ── 회의록 모바일 레이아웃 ── */
@media(max-width:767px) {
  .meet-layout {

<script>
(function() {
  var sess = localStorage.getItem('tt_user');
  if (!sess) { location.href = 'index.html'; return; }
  var u;
  try { u = JSON.parse(sess); } catch(e) { localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html'; return; }
  if (!u || !u.id || !u.role) { localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html'; return; }
  var isMgr = u.role === 'manager' || u.role === 'admin';
  var av = document.getElementById('sbAvatar');
  var nm = document.getElementById('sbUserName');
  var rl = document.getElementById('sbUserRole');
  if (av) av.textContent = (u.displayName||'--').slice(0,2);
  if (nm) nm.textContent = u.displayName||'';
  if (rl) rl.textContent = isMgr ? '팀장' : '팀원';
  // 팀원이면 내업무, 팀장이면 팀업무로 링크
  var taskItem = document.getElementById('sbTaskItem');
  var taskLabel = document.getElementById('sbTaskLabel');
  if (taskItem && isMgr) { taskItem.dataset.nav = 'manager.html'; }
  if (taskLabel && isMgr) { taskLabel.textContent = '팀 업무 현황'; }
  // 어드민이면 관리메뉴 추가
  if (u.role === 'admin' && !document.querySelector('[data-nav="admin.html"]')) {
    var nav = document.getElementById('sbNav');
    if (nav) {
      var sec = document.createElement('div'); sec.className='sb-sec'; sec.textContent='관리';
      var item = document.createElement('div'); item.className='sb-item'; item.dataset.nav='admin.html';
      item.innerHTML='<div class="sb-icon">◯</div><div class="sb-label">계정 관리</div>';
      nav.appendChild(sec); nav.appendChild(item);
    }
  }
  document.getElementById('logoutBtn').onclick = function() {
    localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html';
  };
  document.querySelectorAll('[data-nav]').forEach(function(el) {
    el.addEventListener('click', function() { location.href = el.dataset.nav; });
  });

  // ── 버튼 바인딩 (module defer 대응) ──
  document.addEventListener('DOMContentLoaded', function() {
    function bind(id, fn) {
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('click', function() {
        if (typeof fn === 'function') fn();
        else if (window[fn]) window[fn]();
      });
    }
    bind('newMeetingBtn',   'newMeeting');
    bind('saveMeetingBtn',  'saveMeeting');
    bind('copySummaryBtn',  'copySummary');
    bind('deleteMeetingBtn','deleteMeeting');
    bind('summarizeBtn',    'summarize');
    // recBtn - touchstart + click 둘 다 바인딩
    (function() {
      var rb = document.getElementById('recBtn');
      if (!rb) return;
      var fired = false;
      rb.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (fired) return;
        fired = true;
        setTimeout(function() { fired = false; }, 500);
        if (window.toggleRec) window.toggleRec();
      }, { passive: false });
      rb.addEventListener('click', function() {
        if (fired) return;
        if (window.toggleRec) window.toggleRec();
      });
    })();
    bind('delConfirmBtn',   'confirmDelete');
    bind('tagSettingBtn',   'openTagSetting');
    bind('tagSettingOkBtn', 'saveTagSetting');
    bind('tagSettingCancelBtn', function() { document.getElementById('tagSettingOverlay').classList.remove('show'); });
    bind('delCancelBtn', function() { document.getElementById('delOverlay').classList.remove('show'); });

    // 탭 전환
    var tabP = document.getElementById('tabPersonal');
    var tabS = document.getElementById('tabShared');
    function setTab(mode) {
      if (window._setCurMode) window._setCurMode(mode);
      if (tabP) { tabP.style.borderBottomColor = mode==='personal'?'var(--text)':'transparent'; tabP.style.color = mode==='personal'?'var(--text)':'var(--text2)'; tabP.style.fontWeight = mode==='personal'?'500':'400'; }
      if (tabS) { tabS.style.borderBottomColor = mode==='shared'?'var(--text)':'transparent'; tabS.style.color = mode==='shared'?'var(--text)':'var(--text2)'; tabS.style.fontWeight = mode==='shared'?'500':'400'; }
    }
    if (tabP) tabP.addEventListener('click', function() { setTab('personal'); });
    if (tabS) tabS.addEventListener('click', function() { setTab('shared'); });

    // 오버레이 닫기
    document.querySelectorAll('.overlay').forEach(function(o) {
      o.addEventListener('click', function(e) { if (e.target===e.currentTarget) o.classList.remove('show'); });
    });
    document.addEventListener('keydown', function(e) {
      if (e.key==='Escape') document.querySelectorAll('.overlay.show').forEach(function(o) { o.classList.remove('show'); });
    });
  });
})();


// ── 모바일 햄버거 ──
(function() {
  function openSB() {
    var s = document.querySelector('.sidebar');
    var d = document.getElementById('sidebarDim');
    if (s) s.classList.add('open');
    if (d) d.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeSB() {
    var s = document.querySelector('.sidebar');
    var d = document.getElementById('sidebarDim');
    if (s) s.classList.remove('open');
    if (d) d.classList.remove('show');
    document.body.style.overflow = '';
  }
  var hb = document.getElementById('hamburgerBtn');
  var dim = document.getElementById('sidebarDim');
  if (hb) { hb.onclick = openSB; }
  if (dim) { dim.onclick = closeSB; }
  // 사이드바 nav 클릭시 닫기
  document.querySelectorAll('.sidebar [data-nav]').forEach(function(el) {
    el.addEventListener('click', closeSB);
  });
  // window에 노출 (외부에서 호출 가능)
  window.openSidebar = openSB;
  window.closeSidebar = closeSB;
})();


</script>

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2400);
}
function toDatetimeLocal(d=new Date()){
  const pad=n=>String(n).padStart(2,"0");
  return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDate(s){
  if(!s)return"-";
  const d=new Date(s);
  return`${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function renderSidebar(){

          ${m.tags&&m.tags.length?`<div style="margin-top:3px;font-size:10px;color:var(--blue-t)">${m.tags.join(' ')}</div>`:''}
        </div>
        ${curMode==='personal'?`<button onclick="event.stopPropagation();toggleShare('${m.id}')"
          style="flex-shrink:0;padding:2px 7px;font-size:10px;border-radius:var(--pill);border:0.5px solid ${isShared?'var(--green)':'var(--border)'};background:${isShared?'var(--green-bg)':'transparent'};color:${isShared?'var(--green-t)':'var(--text3)'};cursor:pointer;white-space:nowrap">

window.toggleShare=async(id)=>{

    if(existing){

      toast('공유가 해제됐어요');

      await addDoc(collection(db,'meetings_shared'),{...m,srcId:id,sharedAt:new Date().toISOString()});

function initSpeechRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById("recContent").innerHTML=`
      <div style="padding:1rem;text-align:center;color:var(--text2)">
        <p style="font-size:14px;font-weight:500;margin-bottom:8px">🚫 녹음 기능 미지원</p>
        <p style="font-size:13px">이 브라우저는 녹음을 지원하지 않아요.<br>Chrome 또는 Edge를 사용해주세요.</p>
      </div>`;
    return false;
  }
  recognition=new SR();
  recognition.lang="ko-KR";
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.onstart=()=>{
    isRecording=true;
    recSeconds=0;
    const btn=document.getElementById("recBtn");
    if(btn){btn.textContent="⏹";btn.disabled=false;btn.classList.add("recording");}
    const st=document.getElementById("recStatus");
    if(st){st.textContent="녹음 중...";st.className="rec-status active";}
    recInterval=setInterval(()=>{
      recSeconds++;
      const m=Math.floor(recSeconds/60),s=recSeconds%60;
      const rt=document.getElementById("recTimer");
      if(rt)rt.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    },1000);
  };
  recognition.onresult=e=>{
    let interim="",final="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final){
      transcript+=final+" ";
      document.getElementById("transcriptArea").value=transcript+interim;
    }else{
      document.getElementById("transcriptArea").value=transcript+interim;
    }
  };
  recognition.onerror=e=>{
    if(e.error==="no-speech")return;
    if(e.error==="not-allowed"){
      toast("마이크 권한이 필요해요. 브라우저 설정에서 허용해주세요.");
      const btn=document.getElementById("recBtn");
      if(btn){btn.textContent="🎙";btn.disabled=false;}
      const st=document.getElementById("recStatus");
      if(st)st.textContent="마이크 권한이 거부됐어요";
      isRecording=false;return;
    }
    toast("녹음 오류: "+e.error);
    stopRec();
  };
  recognition.onend=()=>{
    if(isRecording){
      try{recognition.start();}catch(e){}
    }
  };
  return true;
}

function startRec(){
  if(!recognition&&!initSpeechRecognition())return;
  // 권한 요청 중 상태
  const btn=document.getElementById("recBtn");
  btn.textContent="⏳";btn.disabled=true;
  document.getElementById("recStatus").textContent="마이크 권한 확인 중...";

  // 실제 시작은 onstart 콜백에서 처리
  try {
    recognition.start();
  } catch(e) {
    btn.textContent="🎙";btn.disabled=false;
    document.getElementById("recStatus").textContent="녹음을 시작할 수 없어요: "+e.message;
    isRecording=false;
  }
}

function stopRec(){
  isRecording=false;
  clearInterval(recInterval);
  recInterval=null;
  if(recognition)try{recognition.stop();}catch(e){}
  const btn=document.getElementById("recBtn");
  if(btn){btn.textContent="🎙";btn.disabled=false;btn.classList.remove("recording");}
  const st=document.getElementById("recStatus");
  if(st){st.textContent="녹음이 중지됐어요";st.className="rec-status";}
  const rt=document.getElementById("recTimer");
  if(rt)rt.textContent="00:00";
}

위 내용을 바탕으로 아래 형식으로 회의록을 작성해주세요. 각 항목이 없으면 "없음"으로 표시하세요.
내 메모에 포함된 #태그는 요약 끝에 그대로 포함해주세요.

📅 일시: (회의 일시)

// 저장
// ════════════════════════════════════════════
window.saveMeeting=async()=>{
  const title=document.getElementById("meetTitle").value.trim();
  const date=document.getElementById("meetDate").value;
  const transcript=document.getElementById("transcriptArea").value.trim();
  const userNote=document.getElementById("userNoteArea").value.trim();
  const summary=document.getElementById("summaryArea").value.trim();
  const isShared=document.getElementById("shareChk")?.checked||false;
  if(!title){toast("회의 제목을 입력해주세요");return}

  const tags=[...new Set([
    ...(userNote.match(/#[\w가-힣]+/g)||[]),
    ...(summary.match(/#[\w가-힣]+/g)||[])
  ])];
  const attendeeText=document.getElementById('attendeeInput')?.value||'';
  const attendees_arr=attendeeText?attendeeText.split(',').map(s=>s.trim()).filter(Boolean):[];
  const data={title,date,attendees:attendees_arr,transcript,userNote,summary,tags,
    authorId:ME.id,author:ME.displayName,updatedAt:new Date().toISOString()};

  try{
    if(curId){
      const wasShared=curMode==='shared';
      if(wasShared===isShared){
        // 공유 상태 그대로 — 현재 위치에서 업데이트
        await updateDoc(
          wasShared ? doc(db,'meetings_shared',curId) : doc(db,'meetings',ME.id,'items',curId),
          data);
        toast("회의록이 수정됐어요 ✓");
      }else if(!wasShared&&isShared){
        // 개인 → 공유: meetings_shared로 이동
        const orig=(meetings).find(x=>x.id===curId);
        const newRef=await addDoc(collection(db,'meetings_shared'),{...data,createdAt:orig?.createdAt||new Date().toISOString()});
        await deleteDoc(doc(db,'meetings',ME.id,'items',curId));
        curId=newRef.id; curMode='shared';
        toast("팀 전체에 공유됐어요 ✓");
      }else{
        // 공유 → 개인: 개인 컬렉션으로 이동
        const orig=sharedMeetings.find(x=>x.id===curId);
        const newRef=await addDoc(collection(db,'meetings',ME.id,'items'),{...data,createdAt:orig?.createdAt||new Date().toISOString()});
        await deleteDoc(doc(db,'meetings_shared',curId));
        curId=newRef.id; curMode='personal';
        toast("개인 회의록으로 변경됐어요 ✓");
      }
    }else{
      data.createdAt=new Date().toISOString();
      // 캘린더 자동 등록
      const calData={
        title:"📋 "+title,
        category:"meeting",
        startDate:date?date.split("T")[0]:new Date().toISOString().split("T")[0],
        endDate:date?date.split("T")[0]:new Date().toISOString().split("T")[0],
        memo:`참석자: ${attendees.join(", ")||"미기록"}`,
        type:"personal",
        author:ME.displayName,
        authorId:ME.id,
        repeat:{type:"none"},
        createdAt:new Date().toISOString(),
        updatedAt:new Date().toISOString(),
      };
      const calRef=await addDoc(collection(db,"schedules"),calData);
      data.calendarId=calRef.id;
      const ref=await addDoc(
        isShared ? collection(db,'meetings_shared') : collection(db,'meetings',ME.id,'items'),
        data);
      curId=ref.id;
      document.getElementById("deleteMeetingBtn").style.display="";
      document.getElementById("calNote").style.display="";
      toast("회의록이 저장됐어요 ✓ 캘린더에도 등록됐어요");
    }
    document.getElementById("savedBadge").style.display="";
  }catch(e){
    toast("저장 오류: "+e.message);
  }
};

};
